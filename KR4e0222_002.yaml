body:
  text: 淡然軒集卷二明余繼登撰疏請朝賀疏為時届中秋天增聖壽恭請聖駕臨御以伸臣子嵩祝微忱事臣等竊惟人主之尊即天也天覆幬萬物故萬物無一日不願望見乎天人主覆幬羣工故羣工無一日不願望見人主從皇上深居以來無論常朝之規已成曠儀即萬壽朝賀亦皆傳免然曰靜攝則安養為重不敢以禮文而輕勞起居也自我皇上御樓受俘大小臣工仰瞻聖體充和遙聆聖音清逺莫不歡欣讃頌以為靜攝之效如此由此可望以時御門復視朝之舊典矣乃以時漸溽暑又復暫輟今聖壽之期正值中秋之候不暄不寒至清至爽天下諸司暨四裔朝賀使臣梯山航海而至者咸思快睹天顔拜舞祝頌於廷伏望皇上至期一御文華殿朝見羣臣俾得遂其瞻天祝聖之私則於聖躬未為甚勞而傳之郡國以及蠻貊無不歡呼歌詠誦勵精之志如日方升祝岡陵之壽與天同久矣年終彚奏灾異疏為彚奏灾異事祠祭清吏司案呈節奉本部送禮科抄出巡撫寧夏等處地方贊理軍務都察院右副都御史楊時寧題稱寧夏衛於本年正月初五日已初二刻地震有聲從西北方動起往東南方去訖又該巡撫山東等處地方都察院右僉都御史尹應元等題稱登州府文登縣於本年正月初八日未時地震自東南而起西北而落二十一日寅時地震有聲房屋搖動自西北而起東南而落福山縣萊陽縣亦於正月初八日午未時分地震房屋搖動又該巡按福建監察御史徐兆魁題稱漳州府於本年正月十六日藥局內不知何故響震一聲局內火藥一萬零八百斤盡從聲中燒去局有一枯井己久不用上有二大石蓋壓亦飛三百餘步一落韭菜巷陳舉人書房長三尺半厚八寸一落吳儒士家長四尺厚一尺藥局碎毁看藥三人尸飛局外周圍居民房屋五十六間盡倒壓死男婦連前三人共二十九名口傷者更多又該巡撫遼東地方贊理軍務兼管備倭都察院右僉都御史張思忠題稱海州參將營中軍潘一元督造鳥銃等器於本年二月十四日辰時在爐正行打造內鳥銃一杆鳴有大聲至午時方止錦州大福堡於本年三月初九日戌時城門上東西椲杆頂上起火許久方落又該總督薊遼保定等處軍務兵部尚書兼都察院右副都御史邢玠等題稱寧逺興水縣堡鎮逺臺於本年三月初九日夜一更時分本臺椲杆三根頂上起火齊鳴初十日午時孤山臺新石嘴臺椲杆起火齊鳴又沙河堡狄家臺椵木衝堡黃土臺俱於初九日酉時分椲杆上起火聞有響聲乂該南京守備等衙門司禮監太監等官邢隆等題稱金川門馬草場於本年三月十五日邜時大雨雷電交作本場草堆上突然起火將經手馬草一堆計五萬盡行燒毁訖又該巡撫甘肅等處地方贊理軍務都察院右都御史兼兵部左侍郎田樂題稱西寧道古浪地方於本年五月初六日戌時分本城東門樓大鐘連鳴三陳每陳約有十數餘聲又該巡撫山東等處地方督理營田提督軍務都察院右僉都御史尹應元等題稱兖州府委千戶髙鎮逺等監造軍器有鐡匠李彥𢎞等爐內打造神鎗已成於本年五月十七日入爐煆光至本日未時分爐內閧然有聲取出用錘打造其爐猶鳴二刻方止六月十一日未時省城地震自東南起往西北去訖又該提督雁門等關兼巡撫山西地方都察院右僉都御史魏允貞等題稱平陽府臨汾縣於本年五月二十三日申時地震從西北來東南去微聲河津縣於五月二十五日未時地震自西北起東南去有聲蒲州於六月十五日寅時地震浮山縣於七月初一日未時地震有聲如雷自東北來西南去並無搖動官民房屋又該整飭薊州等處邊備兼巡撫順天等府地方兵部左侍郎兼都察院右副都御史李頥題稱喜峯路於本年六月十七日午時喜董四十一號臺上層東角雷震一聲火光大作將神器房揭散火藥火箭盡數噴出炸倒墻垜其木料俱未燒燬又該提督軍務巡撫浙江等處地方都察院右僉都御史劉元霖題稱紹興府蕭山縣明月坊居民賈大經家於本年六月二十九日起更時分竈前並水閣板上透出鮮血約髙尺許灑開血跡拾數處凝於板上地下者約血一二升之數又於中堂香火前地板上亦出血一搭樓板亦透血三四處灑開血㸃無數凝於樓板上約二三升之數一刻方止又該總理河道提督軍務兼管漕運太子少保工部尚書兼都察院右副都御史楊一魁等題稱碭山縣於本年七月二十八日因黃河水漲縣治被淹士民俱避於隄上又該巡撫大同地方贊理軍務都察院右副都御史房守士等題稱大同鎮神機庫於本年九月初九日辰時忽從庫內響聲如雷將庫頂五間擊碎甎瓦亂飛牆壁一並翻裂傾倒黑氣升天自辰至已方散並無火光烟臭將磁缸一百箇內盛火藥九千一百五十一斤三兩藥線三萬七千一百一十一根盡數飛化無存本庫竹簍內盛貯硫黃一千八百七十四斤一十二兩絲毫未動滿城房屋動搖震塌鄰近官民房屋一百二十六間震死宗室充熒一位逺近軍民史景鶴等九名口震傷男婦王保等二十五名口庫內地基陷裂乂該整飭薊州等處邊備兼巡撫順天等府地方兵部左侍郎兼都察院右副都御史李頥等題稱喜峯路琵琶稍六十四號臺忽於本年十月十六日午時天降大雪驀從西北樓角旋風大作響聲震地即將旗杆刮折樓內上層火光四出隨有左右鄰臺齊救不及將本樓火藥火箭燒燬鎗炮鉛子等器見在軍兵人口俱各無傷等因節奉聖㫖禮部知道該部知道欽此欽遵陸續抄出到部送司案候在卷今照年終相應一併類奏案呈到部臣等切惟和洽神人宗伯之職今尚書經歲缺人臣等消弭無術灾異之來明示失職之咎敢不思咎省躬勉自䇿勵復思皇上為天之宗子惟天於皇上其仁愛為最深亦惟皇上於天其感格為最速乃類奏之章無歲不上諭戒之㫖無歲不下而今歲四方所報二氣舛錯之狀視往歲殆有甚焉者豈皇上所為格天之道不在於修省之虛文歟書曰天視自我民視天聽自我民聽天之髙逺也而視聽皆寄於氏是民者弱而不可忽者也今近自畿輔逺及郡國百姓之苦於徴調苦於催𣙜苦於織造苦於開採之類者各欲以情仰訴於皇上而不可得計惟有仰天而訴耳天不言故出此變異以告陛下也夫人情愁苦之極鬱為無聊無聊之民昜動難安昔漢臣徐樂以民困而主不惜下怨而上不知為有國者之大戒今民之苦極矣又加以旱䁧之灾十室九空萬一有揭竿斬木之夫乘之而起易動之勢一呼百應誠可寒心故臣等每接奏報寢食不寧若尚欲修舉故事泄泄然以空言而回天意豈不難哉伏望皇上敬天之怒畏天之威敕下大小臣工以愛民之實心為應天之實事事有便於民者明知之明與興之有不便於民者明知之明與除之下勿過疑乎上有所顧忌而不言上勿過疑乎下有所寢閣而不報繹大學入悖出悖之㫖勿倡施奪之風體有子民足君足之言深察相關之義當此履端之候共存寬恤之心俾四海九州各安田里而無嘆息愁苦之聲則人心悅豫天意感通有不反灾為祥者臣等請服欺罔之罪矣歲所上繁詞套語皆皇上所厭聞者故臣等不敢復瀆宸聰敬以天人相與之說進惟聖明留意焉奉聖㫖今年灾異頻仍朕覽類奏仰承上天仁愛之意深用驚惕你每各衙門大小臣工都要痛加修省盡心修職以祈時和民安毋事虛文止礦稅疏為播酋猖獗益甚蜀地殘破可虞懇乞聖明慰民心寬民力以佐兵食以保方隅事臣等昨接邸報見四川巡按御史趙標報稱六月二十一日楊應龍提兵八萬攻陷綦江縣城逰擊等官盡皆殺死等因臣等不勝驚駭應龍蕞爾小醜即數年肆虐未敢逺離巢穴乃一旦親率苖蠻深入內地至於攻屠邑城殺戮將士此必有川中小民為之嚮導為之內應者故敢仗羽翼而狂逞無忌耳維此小民皆陛下之赤子也不為朝廷用以討逆賊而反為賊用此豈樂於從逆哉蓋蜀之民若極矣採木則有砍伐之苦拽運之苦採礦則有供給之苦賠纍之苦榷稅則有搜括之苦攘奪之苦皇上以為不忍加𣲖於民而姑取之於地也不知人固愛財地亦愛寶礦砂不足不得不求足於民故歲進之礦銀什七皆小民之脂膏而差官之私槖不與焉此勢之必至者也皇上以為不忍加𣲖於民而姑取之啇賈也不知商賈不通則財貨不流物價沸騰則百姓困敝京師且然何况遐方此又勢之必至者也愚民何知既已喪其樂生之心計無所之遂謂不若從賊或可延旦夕之命耳楊酋性本強悍而又益以無聊之民則其勢日盛蜀民久已怨恨而况附彼方張之冦則其毒日深今陛下聞綦江之殘破重慶之危急必不肯坐視而不救夫救急非可以虛聲恐喝也勢必須兵兵行必須餉今何處徴兵乎欲調之貴州而貴州已敗傷矣欲調之陜西而强敵積怨日不忘報秋髙馬肥防禦為急顧此失彼恐非完計欲調之廣西雲南湖廣諸省而兵政廢弛之久所在無兵若驅烏合之兵以救燃眉之急未有能濟者也欲俟東征之兵則劉綎所將半多楊姓恐皆逆族且綎不能禁其沿途之生事而乃欲仗之以成事即綎亦自知其不可其以病告非得已也又何處得餉乎欲發之官帑而買辦之需萬千無措年例之發什九未給欲取之本省而府庫空虛閭里蕭條公私無遺上下俱困欲取之鄰省則處處開礦處處抽稅民生處處憔悴民心處處悲愁思亂之民而復加以重征之擾是為楊酋驅民也故我皇上即日責樞臣以發兵日責計臣以轉餉日假督撫之臣以便宜然無米而炊難望療饑徒手而搏難以赴鬪此亦聖明之所洞見也夫兵非天降餉非神輸皆民力之所為也為今之計莫若收拾我之人心解散賊之黨與停止四川之礦稅取回原遣之官民使開山鑿石之輩盡為稱干比戈之徒賠礦給稅之餘悉佐秣馬厲兵之費寬我無知之衆赦其脅從之誅則羣情慰悅士氣歡騰既喜轉禍又幸更生將人自為戰家與為敵或可少須時日以俟大兵之集乎不然恐目前之禍不止綦江而已且古之禦寇者嘗不足而示之以有餘故虞詡增竈道濟量沙今敵人不惜金帛以約結中國之人其絡繹道途潜伏都城者不知其幾而我今日以匱乏而開礦明日以匱乏而抽稅彼敵人聞之將謂中國果空乏如是豈不益生輕侮之心益肆憑陵之志哉且皇上方將捐數十百萬之餉以救此方之倒懸而何愛於數萬之礦稅况皇上曽念貴州方用兵免其𣙜稅今四川屠戮之慘危亡之狀豈但貴州知聖慈必為之動念也臣等書生不知兵事主憂臣辱故敢獻其愚慮如此伏兾俯賜留神地方幸甚臣民幸甚覆楊止菴疏為文體日壞士習漸移懇祈敕諭儒臣申明祖制尊聖諭闢邪說以維世道人心事儀制清吏司案呈奉本部送禮科抄出南京通政使司通政使楊時喬題臣聞世道泰人心正則尚行世道否人心邪則尚言是以孔子致知躬行先行後言為學以理言道别無新竒異說楊墨慕孔子為儒者師不知仁義之理以為我兼愛為言孟子以作心害政作政害事等於洪水猛獸闢之然此其為害猶在外不關心身似於淺近闢之無難家語先子與孔子同時未必的乃其說指人身𤣥牝為竅致虛守靜專氣致柔為功其後流於燒煉採取飛升符術則老氏以為外道者也漢後佛氏興其說主戒律輪回因果慈悲福田利益其後指人心虛靈為竅單傳直指見性成佛作上乘不修善不為惡無障礙無人我相為功視前戒律諸法則釋氏以為外道者也自二說興人反向於內求養生者得之收攝心身其實無修身存心治家國天下之功與孔子異宋儒所謂以之養生愈疾則可以之為道則不可若以為道則所為似是而非彌近理而大亂真者也凡漢唐宋君臣惑於飛升燒煉採取輪回因果福益恆至於殞身敗國此其為害亦粗淺能惑庸衆自單傳直指一入則賢智髙明者先惑深信然猶幸其學老者名老氏學禪者名釋氏不與儒者混為一途又推尊孔子在二氏上不敢以敵言又不敢借孔子語文其說至宋張九成參釋宗果禪始有欲改頭換面說向儒家其後則有參宗果徒得光單傳直指忽悟此心之無所不通遂以一悟入聖不俟修為階級最稱易簡直捷宋儒程皓程頥張載朱熹憂之始力闢之程頥表章六經四書朱熹注之傳注者自孔子傳周易彖辭象辭始朱子法之一隨其原文章句之原字解釋之明其㫖趣非别立一意如今時驅聖言以就已意者也洪惟我太祖髙皇帝首以傳注頒庠序訓士成祖文皇帝首集經書大全羽翼傳注令士非此不言不行凡有一言一行及於老禪者即不録即有釋老之宫之人則亦居於方外令其於山林焚修不與於名教以故二百數十餘年議論正道德一風俗美紀綱肅士人發為文章及科試文字皆渾厚正大可謂盛矣正嘉間始有因養生悟二氏之說竟如所謂改頭換面說向儒家者顧猶言孔子不敢直認為釋老而亦未常以其說攙入於文章數年來始有直以釋老之說為孔子之說又以禪老在孔子上直攙入於文章如科舉文字者又以傳注為支離而其言惟以講為學㑹衆聚徒即是不事修為階級以知為道血氣心知即是不事躬行循理一切皆歸於禪老後學皆不以經書為本領內則心無所主外則其言不歸於禪老則歸於莊列子史文體遂壞矣所慶者今諸士皆從幼學時誦習傳注先入漸摩者尚正猶之不差自今不習傳注為始後數十年將有內而心空外發於文行於政事者皆空文字亦空流弊有難言者歷年禮臣題覆科道部寺諸臣屢疏正文體端士習蒙聖諭敕下改正仰見遵祖制崇聖訓至意昨丁酉今戊戌鄉㑹試諸臣試録前後序皆言此意欲尊孔子闢邪說猶未見士子翕然信從則新竒異說方興喜新好竒樂異者衆亦清本澄源者未講也臣謂清本澄源者則以先進者後學傳習之師世教者使民興行之機兹無論他所即今南都所稱先進世教有大可慨者則原任參政羅汝芳是也汝芳臣鄉先逹聰明才辨英發世稱才士性度溫和寬厚與物無忤世稱長者早講學師事顔鈞其志行相似世稱理學養生師事方士胡清虛談燒煉採取飛升僧𤣥覺談因果福益尤精於單傳直指人心見性成佛上乘以慈悲不計校無障礙無我人相為聖學方士禪流尊為教師臣嘗慕其風度且善養生愈疾及聞其守寧國日集諸生㑹文講學民訟者至則令其趺跏公庭斂目觀心學佛自慈悲為善一時士悅之僧道徒歸之不吝庫藏里甲供餉餽贈故歸者如市及庫藏侵缺推官李惟觀征里甲代償撫按謝登之等參論凡政務法紀悉寬吏書通同為奸貽害蔀簷於時臣里親監生戴珍為南陵縣丞初官被訪珍以金帶篋銀餽贈即受而服之珍固感之每為臣言臣心偕里人薄之及後守東昌參政雲南置印公堂任吏書門役共用票牌混發百弊以生賫捧入都則科道交章論之及歸請托上官先後名守沈子木林烴許孚逺前令黃道年以其煩數厭之遊南都諸臣尊禮嘗以私干尚書傳希摰每見士夫輒言三十三天憑指箕仙稱吕純陽自終南山日寄書至子從丹師斃於廣自言其日左右欲見即出於時名賢如周世選為通政李三才為主事親聞之晚與藩府徴逐飲食致譽甘草遊揚州處聲樂之所其徒稱為聖之和江省撫按訪問地方人才於參議徐用檢乃講學心交則以混於聲色報參議王問臣從遊談𤣥則以有民訟之報儒臣羅洪先者移書非之鄧元錫痛哭規之見存也江省名賢録至不公者亦不録忽世有以理學臣刻録者既非其行即所謂學亦借孔子言仁孝言心性實則専於燒煉採取直指人心見性成佛證聖敢以禪學在孔子上䆒其歸則楊墨為我兼愛老和光同塵釋慈悲不著相又輕施好奪違道干譽正孔孟之所深闢者也特以於養生有可取爾今天下好言養生因其以養生即為聖學其說自由自便其功易簡直捷不待於孔子修德改過徙義工夫一講即在孔子上所以世或從之近南都有稱之為師作祠祀之以祖述憲章名之作為文字刻之南都士大夫居此宦此有學行者甚衆必不為所誤特恐此說一起將來者不知而門戶開標榜立將任情興為悅樂執意見為操持以賄賂干請為通逹黨同伐異為輔仁以行誼禮節為土苴以清議公論為妄語宋儒所謂本以利心得來學者亦以利心向之利勢相尚士習漸移文體益壞漸入清談後難拯維凡有識者皆懼之而主此說者不顧也臣至卑下素矢天日不敢輕出一言議一人乃言及世所謂理學者大非忠厚顧為世道人心計竊附不直則道不見之誼言之顧臣言輕微不足信舊在南京兵部左侍郎許孚逺大理寺少卿李三才寺丞張鳴岡皆賢可問也前此撫按科道諸臣參疏在省掖者可查也乃臣又有僣陳焉孔子之教本與老釋異趣請今諸臣講學惟遵孔子為科式文字惟遵傳注若以養生為老則曰老釋則曰釋若唐宋名臣哲士裴休富弼劉器之張九成者談禪而不混於儒亦可法者也如此乃孔子與釋老各不相混一斯聖祖崇聖訓闢邪說初制可復天下皆知尚躬行不尚空言世道人心以維也惟在聖明敕下禮部一申明之間爾若臣鄙妄無所逃罪又不敢自恕也等因奉聖㫖禮部知道欽此欽遵抄出到部送司案呈到部看得南京通政使楊時喬所疏大意在維世道正人心而所指清本澄源者在闢邪說所指為邪說之魁者則原任參政羅汝芳也汝芳於萬厯五年講學於都城之外為科道所劾我皇上禠其職令致仕去矣不意其徒目之為聖人尊之在孔子之上不俟奏請輒建祠於南京都㑹之地招集徒衆哆口肆談故時喬有感而為此疏今汝芳已死無可論者但疏中闢邪崇正之論有關世道臣等敢竟其說惟陛下裁擇焉竊惟堯舜在上契為司徒所為教民者人倫而已三代迭興庠序學校之教亦不越此孔子萬世帝王之師所以告君者不過君臣父子夫婦兄弟朋友之逹道知仁勇之逹德修身治人治天下國家之常經實理實行原無他竒周末楊墨之言始盈天下孟軻憂而闢之唐尚佛老韓愈憂而闢之宋有單傳直指一悟入聖之論程朱諸儒憂而闢之我太祖法古帝王興道致治既設太學以教於京師設鄉學以教於天下又懼學者惑於異說無所適從頒布經書集注於學宮俾之講習我成祖復擇諸儒論說有禆聖經者纂為大全以羽翼之故成𢎞以前學者各守其師說而無詭異之談仕者各守其官針而無詭異之行心志既定邪僞難惑正德之末始有倡為異學者大槩用佛氏之微言以愚惑人耳目厭常喜新者多往從之一入其門則共相遊揚共相推挽欲名則得名欲利則得利以是智愚賢不肖靡然景從所至千百為羣髙談渺論曰吾學直捷不煩修為曰吾道廣大無所障礙公然謂傳注為支離謂經書為糟粕謂躬行實踐為迂腐謂人倫物理為幻妄謂紀綱法度為桎梏謂禮義亷恥為虛僞惟一了此心則市金可攫處子可摟蕩檢踰間皆為率性總謂無傷反道亂德敗俗傷化此正古人所必闢者而新學小生轉益信從崇尚之或雜入於講義或明入於文章名曰新說諭之不從禁之不止遂使二祖所表章者幾為僞學所廢閣聖明之世豈宜有此大蠧且今天下兵日弱財日匱民日窮法紀日弛政事日廢正賴真實任事之臣振飭而維持之而此輩習為詖謬壞人心術異日逄世不以空言塞責即以虛文罔上欲其修政立事任重致逺胡可得哉臣等職司教化每切隱憂詳時喬所疏服其有見敢此覆請恭候命下容臣等移文南京禮工二部查時喬所指私建祠宇在於何處即為拆毁勿誤後人仍移文都察院轉行直𨽻提學御史及各該巡按遍行各提學官地方中但有罷間官員山人方士學佛學仙者聽其於山林空寂之處各修其業有於通都大邑中聚徒至數十人者即行驅逐其不由撫按具題擅立書院祠宇者即行禁約併禁坊間所刻離經叛道新說諸書不許鬻賣士子行文務依二祖所頒示集注大全為主而參以蒙引存疑諸書各闡理道勿雜禪機提學校文務取不背經義純正典雅者童儒仍用新說者不准入學生員仍用新說者徑自黜革至於鄉試㑹試行文知㑹一體遵行有仍前不遵者容臣部及該科指實參治庶異說漸熄聖學自明士心既定士習自端國家將來或可收得人之效矣陜西山異疏為邊鎮孤懸灾兆異常懇乞聖明預飭文武邊臣修省戒備以保疆場以弭天變事祠祭清吏司案呈奉本部送准巡撫陜西等處地方贊理軍務都察院右都御史兼兵部右侍郎賈待問咨稱該巡按陜西監察御史吳楷㑹稿萬厯二十七年八月三十日據臨鞏兵備道副使荆州俊呈據臨洮府呈本月二十日據狄道縣申稱本月十八日城東五里地名毛家坡官路北山髙二百餘丈午時崩裂一半長一里其下衝成一溝山南舊有居民耕地忽湧出大小山五座約髙二十餘丈等情到府該知府王曰然即親詣其地拘集土民問其緣由有本地居民吐稱未崩之先每夜山下火光四出其內有聲如雷稍稍又聞有鼓樂之音如此者十數夜至十八日遂有此變緣係異常災異理合呈報緣由到道等因轉呈到職職一見之不勝駭愕夫山主於靜動且非宜况於崩乎又况髙者陷入於地而卑者湧出為山乎考之載籍沙鹿兆變應在於韓之役陵谷變遷詩憫西周之衰皆咎徴也方今聖明在上宜禎祥叠見而顧有此咎徴誠可惶懼且臨洮何地也密邇邊方畨民雜處土塉風寒五榖少植加之以災沴頻仍民不堪命正項錢糧既多逋負今且無市而徴稅無洞而包礦民情洶洶相率逃竄似此災異非常其患不淺等因㑹稿到職案查先據該道呈報前來㑹題間今准前因該職㑹同巡按陜西監察御史吳楷議照變不虛生灾必有應洮鎮北接松山西衝邊徼近聞敵人窺伺為謀叵測往雖仰仗天威掃空松山大獲竒捷然和雙被銼每懷報復經此大創蓄憤必深其王之來豈真送佛僧哉善後計當早圖見灾尤宜省懼除職等痛自修省及嚴行各該將吏更加戒備外伏乞敕下兵部議請天語申飭大小邊臣奉行惟謹或可以消灾變於無形而保疆場於孔固再乞聖明軫念邊方災民特罷礦稅以蘇孑遺無驅而資敵人此尤職等之上願也為此除具題外理合移咨查照施行等因到部送司案呈到部臣等不勝驚愕此變異之應恐不止陜西之一隅而消弭之道恐不止邊備之一事也臣等稽之往牒惟唐垂拱二年新豐縣露臺鄉忽湧山出髙二十餘丈此其咎應載在史冊我皇上所明知也說者謂天氣不和而寒暑隔人氣不和而贅疣生地氣不和而堆阜出方今星躔失度水旱降灾迅雷震擊火光時發太白晝見甚且經天此天氣不和之極矣鑿山開礦裂地求砂坤元苞孕之氣發泄而無餘造化含蓄之精流鑠而不韞以至地不能固脉而山崩金不能生水而川竭坤不能奠維而地震此地氣不和之極矣閭閻窮困復加之以必不能止之誅求帑藏空虛復責之以必不能供之珍寶言利之小人蟻聚剝民之中使鴟張徒役枕藉於巉巗流離悲號於道路民命危如纍卵世變紛如亂絲東師未起瘡痍西蜀復遭鋒鏑都城之姦細潜伏畿輔之盜賊公行識者寒心忠言逆耳中外太隔上下不交此人氣不和之極矣戾氣凝而不散怨毒結而成形無怪乎贅疣堆阜之突然而出也夫山者髙而在上地者卑而在下山忽崩而成溝地忽起而成山陵谷變遷髙卑易位是隂乘陽邪干正下叛上之象推理度勢必將有草野奸雄乘民之怨斬木揭竿起而與國家為難者夫天下幸無事耳一旦有事則藏怒蓄忿之民易動土崩瓦解之勢立成是皆羣臣所屢言者特陛下不垂清聽井羣臣者陛下之子也臣子之誠不能動君父故言愈數而聼愈厭陛下者天之子也天以此非常之變感悟陛下尚可恬然不以為意乎漢臣董仲舒有言國家將有失道之敗天乃先出灾害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此天心仁愛人君而欲止其亂也伏願陛下體仁愛之心切傷敗之懼急為社稷之圖早建國家之本忍難割之欲察導諛之奸蠲無藝之征罷流毒之使擴轉圜之度備臺諌之員通臣民之情開壅閼之路然後敕下臣工共加修省俾各守正奉公輸忠報主安民厚下積餉練兵寧綢繆於未事之先勿周章於多事之日庶乎豫悅人心轉回天意若復泄泄然以天變為不足畏人言為不足惜恐天怒人離變故百出追悔已晚收拾甚難勿罪臣等今日不言也皇長子大禮公疏為陽律已回普天稱慶仰懇聖慈明示大禮吉期以便遵行事臣等近年以來屢承諭㫖有曰皇長子齡已過期體已充足者有曰擇吉冠巾與婚笄同行者有曰其冊立並加冠禮少候二宮落成之日行者有曰三皇子五皇子六皇子七皇子俱已長成一併加冠分封庶兔煩擾者恭繹綸音仰度聖意必謂今歲夏秋之間二宮可以落成耳不意工程浩大尚有一二修飾未完者而大工又暫停矣今兹一陽來復歲序將新臣等稽之祖制揆之明諭有萬萬不容再緩者蓋祖宗以來舉行婚禮必於春時而欲行冠婚以正始必先冊立以正名由今及春為時幾何而綸命尚未渙發儀章尚未豫備誠恐臨時遲誤非所以仰體聖懷光昭令典也况淑女之選已經數月皇長子睿齡明春十九知我皇上天性至愛其於室家之願必有惓惓更切者臣等受國厚恩義難緘默不敢不請又不敢連章纍牘致煩天聽故敢合辭以請伏願明敕該部選擇吉期明敕各該衙門製辦冊寶冠服儀仗等物俟元正之後首舉冊立之禮隨舉冠婚之禮並舉諸皇子分封加冠之禮諸禮並舉百福駢臻此宗廟社稷之大慶而中外臣民之大願也黑龍王廟復命疏為欽奉聖諭事先該禮部以金山黑龍王廟井霖應禱加封廟號潭名立碑紀功題請遣官前往潭所相視碑基奉聖㫖是著侍郎余繼登吕鳴珂去欽此臣等遵㫖於二十六日蚤陛辭西行一路隂雲四合細雨淋漓比至祠下天日開霽近祠村民聞臣等至皆扶老擕幼擁列道側歡呼向臣等言今春不雨麥已將稿榖種未布百姓已無生理幸賴皇上慈悲為民䖍禱至誠格神時雨應祈旬日以來麥盡吐穗榖盡布種有秋可望其感戴皇仁如天如地真有莫能名言者臣等竊喜我皇上一念為民真心遂能感神感民至於如此充此心也即堯舜熙皥盛治無難致矣進至廟中見真人張國祥率朝天宮道士正在廟中建謝雨齊醮臣等祗詣龍神起視祠宇見正殿三楹建在山頂廟貌整嚴規制工麗問之乃萬厯十三年我皇上臨幸後所重修者臣等因同國祥上下相視廟前至廟門隙地一假深一丈五尺濶五丈三尺廟門外右為向下階級門左隙地一假止深一丈二尺八寸不足立碑建亭又下一層有三碑亭並列其中一碑乃成化二十二年二月憲宗純皇帝御製碑碑身髙四尺二寸濶二尺一寸下靣石座計四層共髙四尺九寸左靣一碑乃萬厯十四年三月皇上為聖毋慈聖宣文明肅皇太后製禱雨龍潭靈應碑碑身髙六尺五寸濶二尺六寸石座髙二尺三寸濶三尺五寸右面一碑亦同時我皇上御製禱雨靈應碑碑身碑座俱與左一座同碑亭三座各方一丈五尺又下一層左為龍潭右為隙地一假深三丈濶二丈八尺此處立碑建亭正與皇上先所立碑亭在上一層者相對况龍王廟在上龍潭在旁足仰稱我皇上紀述功德之意此去又下一層即為大門門外不逺即為潭水所滙處以南又皆僧舍佛殿去廟潭稍逺不堪作基臣等謹具述所看視據實開奏伏希皇上宸斷如果前地相應立碑乞敕下工部募工礲石擇吉建立奉聖㫖工部知道冊立疏為陽春在邇恭請蚤示冊立冠婚之期以便舉行事臣等待罪禮曹今典禮之大莫有過於冊立冠婚者夫冊立公典也公則宜公言之故臣等曩隨九卿科道合疏以請未敢瑣瀆天聼伏候綸音又踰月矣緣係臣部職掌安敢緘默以誤大典敢披瀝上請惟陛下垂聽焉夫禮者聖王緣人情而為之者也禮有所當行者聖人不能違夫時情有所當體者慈父尤當念其子今皇長子親則皇上之元子也冊立社稷之本也婚禮人道之始冠禮成人之始也三禮並舉我皇上明諭於一年之前而臣等不能將順於一年之後猶可以為人臣乎且臣等在部歲見宗室中有當封當婚者按例而請臣等按例而覆皇上無弗與者夫不吝推恩於宗室之子而顧不早推恩於皇長子臣等知其必不然也數年以來君父之成命未頒臣子之懇請屢格幸於去歲渙發德音欲於冠婚之時先行册立之禮聖見髙明聖裁允當確如金石炳若日星九廟神靈萬邦黎庶日望此舉久矣乃典禮臨近之言雖申於計部而選擇吉期之㫖未明示於春官臣等竊以天下有大本願皇上早定之國家有大禮願皇上早舉之朝廷有大信願皇上早踐之勿更諉曰姑俟兩宫之成也蓋皇上所御即為紫宸發號施仁無所不可既不必候三殿又何必俟兩宮若明春三禮既舉待兩宫落成之日皇上還御之時佳兒佳婦趨拜於前豈不尤為宮闈極樂之事哉臣等於二十六年題行各該衙門造辦錢糧未知完備與否儻或耽延豈不有誤吉禮伏望皇上特降明綸行臣等衙門早擇吉期務及春和舉此盛典宗社幸甚天下幸甚火灾修省疏為禁地火灾頻發天心震怒未回懇乞聖明痛加修省以盡消弭之實事十一月二十七日尚寶司等衙門被灾一時焚燬無遺臣等不勝驚懼竊意我皇上敬畏事天必將遇灾而懼側身修省以仰答仁愛乃伏候數日未見傳示豈以為此常事不足以動聖心與夫人君事天如子事父母父母之怒大而發聲小而徴色人子皆當敬慎以承之安有兩宮三殿之後餘威猶震餘怒未回復此譴告而恬不為意者臣等以為災異可懼也災異而不知懼則無可懼矣伏乞亟降明諭申飭大小臣工同加修省諸可以收拾人心挽回天意者望皇上俯賜施行則宗社生靈不勝幸甚臣等考之傳記火之神曰鬱攸言火之不可鬱也火鬱則必燃猶民之情不可鬱也人情鬱則思亂皇上積年纍歲不接見羣臣下之情欲逹於上但憑章奏乃章奏又有時而不發上之情欲通於下惟憑批答而批答又有時而不下即皇上聖神孰敢有擅自稽留者然積久生玩積玩生奸萬一有煬竈之夫釀成釡鬵之勢則君臣之情得無有鬱而未暢者乎皇上之開礦也此不忍加𣲖小民之心豈有貽纍小民今無論供給之費奔走之勞令民失其農業即煎銀不出至於賣沙賣沙不已至於包銀日復一日俾富者貧貧者死彼其貧苦無聊之情欲仰訴於皇上而不可得也得無有鬱而未暢者乎有店則有貨有貨則有稅是皇上欲稍取之於富商非欲取之於貧民也乃一官出而相隨者至數百人此數百人者又各相隨數十人姦民趨利如蠅聚腥引類呼朋布滿宇內無一日而無抽稅之人無一物而非可稅之貨即今商賈不行百物騰貴貧民無所覔食束手待斃當今水旱灾傷之時何以堪此彼小民不堪情狀欲仰訴於皇上而不可得也又無有鬱而未暢者乎巡撫者天子所使拊循一方者也巡按曰代巡所以代天子循行一方彈壓奸邪肅清吏治者也議及礦稅動被詰責此猶詰責而已至於百姓所以安於田里而無嘆息愁苦之聲惟恃有守令在乃一拂羣小即被誣奏皇上不察有無即纍逮之囚繫之諸臣力救而不聽小民赴訴而不聽夫皇上之威雷霆也逮則逮繫則繫矣然逮不當其罪繫不服其心彼其情得無有鬱而未暢者乎行取諸臣皆有功於地方皇上以為才而召之闕下者也乃以為可用而召之又不用而羈之諸臣疏請稽而不報彼既無民社之司又無官守之寄米珠薪桂進退維谷即人臣之義遲速惟命而諒其一念效忠之忱得無有鬱而未暢者乎夫匹婦含寃足動天意萬人所鬱不火而燃所以通其鬱者是在我皇上而已伏望景然覺悟鋭然改圖於臣下章疏可行與否一一批發勿更留中以滋衆人之疑於礦脉之細微者以漸封閉之於稅貨之瑣屑者一切停免之於官民之不遵明㫖生事害人如打死平民打死生員者按法而誅之假撫按以便宜之權勿輕損其體面待守令以付托之重勿輕至於折摧行取諸臣及時考選使各吐其胸中之竒以共濟艱難之運則人心既鬯天意必回有不轉禍為福者臣等井伏欺罔之罪矣告病疏一為久病陡發不能供職懇乞天恩憐准休致以延殘喘事臣年來多病愈病愈衰愈衰愈病自本年六月感患痰嗽延醫疹治服涼藥不效服熱藥不效服發散之藥亦不效然猶抱病視事未敢一日偷安注籍其憔悴狼狽之狀皆臣同官司屬及滿朝諸臣所共見者自十一月十七日遂支持不前始注籍調理醫官錢藩等皆謂自來痰嗽未有延至半年以後者此其病根己深非旦夕藥餌所能取效見今痰涎壅盛晝夜不得眠卧以至脾虛不能化粥喉啞不能出聲自卧病至今昏暈者二次矣雖視息僅存而肌肉全消伏枕竊念禮曹非養病之地尚書非病卧之官况今大禮在邇必得年力精壯者方可周旋臣病已深臣力已竭矣伏乞聖慈憐臣真病真情毫無假飾特准休致回籍安心醫治儻得延一日之生皆我皇上天地大恩也奉聖㫖卿偶疾准暫假調理痊可即出供職吏部知道告病疏二為痼病難痊治療罔效仰懇天恩慈悲憐憫早放生還事先該臣以患病乞休奉聖㫖卿偶疾准暫假調理痊可即出供職吏部知道欽此以臣病困之極皇上猶不肯遽棄賜以暫假望之供職臣伏枕誦讀感激泣零誓當捐糜以答髙厚旬日以來博訪諸醫加意調治緣臣自六月以來無日不服湯藥藥非對症脾久受傷今湯藥到口旋即吐出夫使病而受藥猶庶幾望痊可也今不能受矣是臣病之愈無日臣命之盡有期仰惟我皇上至仁如天不忍使一民一物或失其所况臣舊侍講讀忍獨令臣呻吟委頓坐斃於旅舍床蓐之間哉伏乞開天地之心憐准回籍調理俾臣少存視息不隕滅於道路臣即死亦當效銜結於地下也臣不勝千萬哀懇之至奉聖㫖卿微恙易愈宜善加調理痊可即出供職不准辭吏部知道辭印務疏為天恩甚重臣病甚危懇乞聖慈准辭印務以便調理事該臣以患病再疏乞休奉聖㫖卿微恙易愈宜善加調理痊可即出供職不准辭吏部知道欽此臣伏枕叩頭感激流涕思皇上之恩如天如地而臣愚之病益熱益深藥餌不進粥食不消骨瘦如柴命危若露呻吟苦楚之中竊念臣卧病一日則廢一日之職業患病日久曠廢日多即今新春伊邇大禮舉在目前臣病若斯安能勉強憂愁恐懼病勢益增伏乞聖明垂憐准臣辭印務得専意調治儻得萬一少痊當遵㫖供職不敢負恩德也奉聖㫖卿偶疾未痊宜加意調攝印務不必辭稍可即出供職吏部知道告病疏四為久病調治不痊勢漸沉篤哀懇聖慈乞賜骸骨生還事臣於二十七年十二月內疏乞回籍飬病與辭印調理俱未蒙我皇上俞允且諭臣加意調攝稍可即出臣即犬馬亦知戀主乃臣安心靜養又一月矣藥餌滿前入口即吐醫人環視無計可施病日益沉粥日益减是臣典禮不效無力回天陛下幸寬臣之罰而天實降之罰也今己無痊可之望矣不得不忍死哀鳴於君父之前臣聞古者君之於臣也壯則用其力老則逸其身病則恤其私臣病甚矣惟陛下憐而惜之耳蓋臣報主之心敢不自勉而趨事之力實已不支夫使臣力可驅馳當此多事之時曷敢言去今臣病勢至此陛下即留臣亦不過呻吟牀褥虛糜廪祿而已果何益哉伏乞天恩准臣回籍養病别簡才賢代臣之任贊襄典禮勿因臣病廢之身而久稽吉慶之典則臣感戴恩德生當效祝誦之忱歿當圖銜結之報臣氣結魂悸語詞無倫不勝恐懼懇祈之至疏上不報告病疏五為患病日久職業日墮憂懼交并勢漸危困懇乞天恩早放生還事該臣於本年正月二十四日以久病調理不痊具疏乞休未蒙我皇上批發臣竊自傷犬馬之誠不能上逹於天固其所也然天雖至髙而凡人疾痛愁苦未有不籲天而訴者以萬物皆覆於天舍天無所可訴耳使臣可以勉強支持何敢瑣瀆天聽第臣病根已痼難於遽痊瘦骨已枯難於復肉呻吟床褥曠廢職業非人臣所宜是以既有性命之憂復有官守之慮中心煩灼痰火填壅飲食不思眩暈時發故敢復以真病真情仰訴於皇上之前查得先年原任本部尚書于慎行羅萬化俱以患病乞歸並蒙我皇上俞允慎行雖少延殘喘萬化竟殞身道途今臣病體實與二臣相同而勢之狼狽尤為過之伏乞聖慈准照二臣前例將臣放歸田里俾得遂首丘之願臣即今生無以報陛下願生生世世誓竭捐糜之報也臣不勝戰栗隕越仰天祈懇之至奉聖㫖卿疾不妨在任調理痊可即出供職不准辭吏部知道辭俸疏為遵例辭俸以便調理事昨臣以久病乞休奉聖㫖卿疾不妨在任調理痊可即出供職不准辭吏部知道欽此臣伏枕捧讀感激流涕蓋恩為重命為輕敢惜狗馬之軀不竭㳙埃之報但臣查得大明㑹典內一欵凡內外文武官員患病三箇月之上俸糧截日住支臣自萬厯二十七年十一月二十五日注籍扣至二十八年二月二十五日已滿三月而臣身尚骨立不能離床伏乞敕下該部將臣俸糧照例住支使臣得少逭虛糜之懼安心勉就醫藥萬一尚望痊可之期也臣瑣瀆天威不勝惶恐戰栗之至奉聖㫖卿疾宜安心調理痊可供職俸不必辭該部知道告病疏為病體萬分難支哀懇聖慈憐准致仕以保餘息事臣於萬厯二十七年冬患病屢疏乞恩回籍調理俱未蒙我皇上俞允臣感激天恩義不忍恝於本年四月初三日扶病見朝初四日謝恩勉強進部理事然氣血耗損痰嗽如初肌膚俱銷精神太减行稍逺必須掖持坐稍久即覺潦倒此舉朝大小臣工所共見共憐者臣何能盡欺衆人而敢上欺陛下也延至本年五月十四日忽感泄瀉至今服藥不效而臣二十七歲之子又復夭折情關骨肉寧不痛心尫羸病軀堪此摧剝因而神思恍惚語音失常委頓床帷時覺昏憒禮曹今當多事之日而臣病卧私室不能倡率司官以致諸務稽延間或舛錯則臣之罪愈大臣之苦愈甚矣伏望皇上憐臣真病已久容臣致仕回籍别簡名流以贊邦禮則臣生保殘息死且不朽矣臣非病極勢迫何敢輕瀆天聰惟皇上俯賜俞允臣不勝恐懼戰栗伏枕叩頭千祈萬懇之至奉聖㫖覽奏知卿感傷致疾宜寬心調理痊可即出供職不准辭吏部知道淡然軒集卷二
