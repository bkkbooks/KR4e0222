body:
  text: 淡然軒集巻七明余繼登撰誌銘墓表墓碑行狀傳述贊議䇿問封安人易母張氏墓誌銘張安人者封工部主事龍川易公之配工部主事易君選之母也安人生而沉靜端重不妄笑語自垂髫如老成人女紅外無他嗜好父母心異之為擇佳婿乃歸封公易故宦族封公又日佔畢習博士言不問家人生業家益索事無巨細倚辦安人安人躬機杼操井臼拮据奉舅姑下逮兩叔姒為捐嫁時衣粧以佐凶嵗至併日而食無恡色人皆難之兩賛封公襄舅若姑之喪含歛如禮封公數上有司數不售或不勝憤恚安人色益恭意愈和徐指君選謂曰君屈首受書窮年兀兀卒厄若此竟君志者其在是乎因日夜從旁督君選於學毎篝燈夜作與俱勤苦君選遂成進士拜今官迎安人于宦舎未㡬天子霈大慶恩安人得封今號君選乃治法服加縠紵然安人不恒御蔬食布素無異疇昔見之者不知為貴人也獨性好施君選既貴諸凡俸入咸置安人槖中以順其意賑貧䘏孤常若不及安人素彊無疾先是封公病痿安人日夕供湯藥侍起居至目不交睫無怨色諸戚黨以請貸至者又人人為設食飲給道里費以厭其欲竟以是委頓不支矣時君選方有大石窩之役忽心動急治裝歸歸之日而安人疾作君選為問醫藥禱神祠求以身代竟不起君選哭甚哀水漿不入口者數日哭輙絶絶而甦甦而復哭乆之乃收淚謂曰登瀛不孝天降割于先安人已矣無可言矣惟是濳徳之光不可泯敬以累君乃口授始末娓娓數百言不具志志其可述者安人生嘉靖壬午年十一月十三日卒萬厯十二年十二月初十日得夀六十有三子四登雲蚤卒娶王斗女登瀛即君選丁丑進士娶胡忠女登髙武學生娶饒陽庠生李希曽女登仕邑庠生娶饒陽庠生劉郊女孫男六知聘饒陽庠生郭周南女簡聘邑庠生趙天柱女能亨健通孫女二一適揚仲舉一尚幼併知能皆登雲出簡健登瀛出亨通登髙出君選將以安人卒之明年乙酉三月念五日葬於城之東郭祖塋之次遣使来督銘嗟夫風之下也俗日以澆世有起家寒賤者不殖貲以耀閭閈則席勢而報睚眦彼好行其徳以亡其業者即丈夫不數數然也而安人養舅姑順夫子且至周人之急以殞其身嗚呼仁矣是宜銘銘曰子為王臣身沐㤙綸宜其組紃維此組紃匪曰華身以佐吾仁安人之仁靡疎靡親靡施弗均施予則均身則食貧噫嘻安人明勅封安人方母熊氏墓誌銘憲大夫方君手其母熊安人狀以授史登曰傷哉端之奉母命違親而仕也母健無恙也廼端備員貴竹纔一嵗而母殁矣母殁而湯藥含歛弗及親也端猶稱人子哉傷哉母殁矣其苦心貞行有不可殁者願得子言以誌而銘之夫誌者識也識載閨美以闡徃烈而垂来訓史氏職也何敢辭狀稱方氏自固適莆繇莆復入於固祖有登景㤗癸酉郷書官寧州守諱興者有舉戊辰進士官都轉運使諱仕者有郷進士諱仲者簮纓不絶為固始著姓而熊安人家亦以科第節義相望于時安人父諱傑邑諸生博學能文為督學使者所器重娶於寗生安人安人生而婉嬺有慧性幼即端重不好戲見諸弟妹戲者輙正色責之諸弟妹畏而事之如事寗孺人稍長授以内則輙記不忘父心竒之以語寗此吾才女也當為擇婿熊之父時教授于鄉諸從㳺者甚衆封主事公亦執經在弟子列日誦常數百言頴悟過人熊私謂寗欲覔佳婿無如方氏子才者寗前問之知為主事公曰君常欲竒貴此女何自迺與方氏子方氏母蚤寡家又貧不可熊曰安有才如方子而常貧賤者乎因自以其意語主事公公歸告其母范孺人范曰人各有耦吾寡婦人家四壁立彼熊名閥非若耦也熊聞之笑曰吾妻才子耳非妻貧子也貧亦何病范不能具六禮獨出二釵為聘遂委禽焉年十五而歸主事公一意食貧自操作以佐緩急旦夕執饋事范孺人甚謹篝燈勤女紅伴主事公夜讀主事公即以是年為弟子員肆力于學安人復從㬰之凡七試有司七報罷年四十始廪于庠時公伯叔成進士薦鄉書者先後逝去公以身為門戸累稍廢業遂蓄姬妾厚自奉養以紓其抑鬱不平之氣安人不忍傷其意曰苟巾櫛有侍酒醴無乏夫子之愛吾之愛也無㡬微見于詞色退而獨䖏一室日日督兩子于學每誨之曰若輩不能竟廼父之志是大負若外祖熊而吾無所望于方氏矣兩子跪受教競相砥礪憲大夫遂舉萬厯丙子郷薦登丁丑進士官行人即封主事公為行人已又晋今封母得稱安人云安人即受封而意念愈自下終其身無滑柔之奉錦綺之服其天性勤儉蓋如此憲大夫之官兩京也每奉安人以從及陟貴竹戀戀子舎不能去安人以大義督過遣之比行而安人卒遂不及訣此憲大夫所為抱終天之恨者也余子曰予嘗讀詩而有感于栢舟之婦云以彼心不可轉儀不可選不知何以遘閔于時而其發為詩歌者不過以古人自朂而止焉聖人以為貞靜之極也故識之變風之首以示天下後世之為人婦者安人非栢舟之婦而有其苦以身訓子以人事夫不專夫室之愛者四十年不及于怨詩曰我思古人實獲我心非幼習内則有概于中能然哉是可以風矣安人生於正徳已夘二月四日卒於萬厯已丑四月十日享年七十子男二人靖太學生娶某氏端即憲大夫端貴州按察司僉事娶易氏封安人孫男二人一甲靖出娶某氏一元端出邑諸生娶某氏孫女三人長適傅壽官子某次適彭鴻臚子國學生某次適李方伯孫國學生某俱某人出憲大夫將以卒之明年正月某日葬于邑附郭之南阡從其姑范孺人之墓也銘曰胡譽之芳維婦順之章胡嗣之昌惟母徳之良猗歟安人于歸于方和鳴鏘鏘無胥忮胥戕于何不臧鬱鬱崇岡閴閴𤣥堂以俟而夫子百嵗之後庻幾偕藏明封太孺人劉母張氏墓誌銘劉母張太孺人卒於家其子大理丞士行聞而拊膺大慟曰天乎吾獨不得與母氏永訣親含襚藉幹之事乎為位以哭伏地而不能起也方大理為御史按部郡國每得以其便歸視兩尊人最後遂戀子舎不忍去太孺人讓之曰吾與汝父披章服優㳺禄養秋毫皆上恩也汝不以時効尺寸報主上恩徳顧依依為兒女態意何為乎且吾兩老人健又有汝兄弟五人在居者以色飬仕者以名養汝其行矣大理君跪受教乃北上獨時時遣問起居比聞太孺人病方杜門圖請告而訃音至矣太孺人病亟時命諸子舁之中庭視衣被復進諸子婦各為誡詞已而名呼大理君曰兒乎令兒全忠令兒不得全孝矣意若悔督其出者故士行聞之而重自傷也既奔歸慿棺長號如不欲生封公曉之曰古之孝者毁不滅性汝不計窀穸事而過自摧毁不念吾老人乎大理君乃稍就飦粥以次庀䘮事而走狀來請銘狀稱張氏為東明著姓父某娶於某而生太孺人太孺人生而簡重父母憐愛之為擇佳配既歸封公事舅姑小心婉順甚得其懽心時劉食指漸繁家漸落太孺人自計舅姑老矣豈可使有米鹽𤨏屑之慮乃身自操作而前計口授食拮据應之不遺餘力比諸子知嚮學則佐封公督教之勵其勤者而抶其不率者不専以煦煦為愛時或篝燈治絲枲伴其夜讀曰自予為汝家婦見汝家好行其徳是數當有顯者汝輩勉之隆慶庚午大理君舉于郷喜而後可知己萬厯丁丑大理君成進士授長洲令奉太孺人以行或以俸餘置珍錯輙却不嘗曰吾性甘蔬食不習此味也稍欲為市紈縠輙止不許曰吾身安布素不習此服也時大理君涖任未㡬大有能聲太孺人乃謂之曰吾老人逺來視汝治狀耳汝能其官吾復何憂吾當去汝勿以饔飱故乆溷汝也大理君不能强遂歸吳中錦綺衣被天下諸戚婭聞太孺人歸謂當有竒異飾玩爭來聚觀則猶去時裝耳乃皆相顧嘆服大理君以清白自矢䖏膏脂而不以自潤者固義方有素實慈訓力也壬午冬大理君以計吏入長安㑹三載考最得封其父如其官太孺人受今封於是函制詞製法服過里中為壽太孺人為一舉觴即緘之笥中不再御親執筦鑰督課臧獲不異疇昔或有言太孺人今貴人何為乆自勞苦則應之曰若不聞文伯母之言乎且吾樂此不知勞也大理君既拜御史南按淮揚西按晉太孺人每誡之曰御史奉天子三尺不患無威患過威耳威過則傷人必多昔雋母聞其子多所平反即喜不即怒不食汝其有意俾吾為不疑母乎吾當為汝加七箸矣大理君唯唯承命故所至輔法而行得以稱名監察者則以太孺人為之母也太孺人信鬼神報應之說不恡施予日焚香拜天者三暇則誦佛號以為常蓋數十年不倦也至其晚年壽愷多子孫或以為事神之應然由前而觀固不在是矣太孺人生於正徳已夘某月某日卒於萬厯癸已某月某日享年七十有五子男六人懐恩娶陳氏繼李氏懐惠娶某氏繼李氏懐恕即大理君娶張氏贈孺人繼趙氏封孺人賀氏懐志娶王氏繼苗氏懷愚娶孫氏繼李氏懷慈娶王氏繼盛氏女三適邑人唐惟精韓進國郝九臯孫男十三人某某出孫女若人曽孫男若人大理君將以某年月日葬太孺人於某予為志其大凡而系之以銘曰予聞之志富貴不與驕奢期而驕奢至嗟太孺人處貴若寄處富若膩内則既備乃俾哲嗣一行作吏惟母儀是視比敬姜與雋母其徳靡愧鬱鬱髙原芳靈所閟太史有銘用彰厥懿明陜西臨洮府通判贈承徳郎户部河南司主事平村陳公暨配李太安人合葬墓表大名守陳君守大名之數月或有言太安人不禄者訛傳至都下主爵者已推擇他姓代君而太安人實無恙也君聞大不懌意非吉徴即欲投劾歸侍太安人主爵者旋覺其誤乃上章謝而慰留君太安人聞之亦遣人謂君若勿歸吾當就若以觀若之治郡也太守君聞太安人來喜則為具板輿迎之郡出理郡事入上食驩然樂也又數月而太安人疾作竟卒于魏嗟乎彼言者訛耳乃竟信耶豈非數哉太守既扶櫬歸將開贈户部主事平村公之兆合葬焉而走使謂登俾表其墓道之石按平村公之先山西屯留人父曰倉倉父甫甫父驤世載其徳為郷人所信嚮公生而賦質不羣始就外傅即端重如成人不與羣兒伍里人李公明逺者有女心奇貴之不輕以字人聞陳氏子賢乃以歸于陳即太安人也太安人為陳氏婦以婉嬺事舅姑得其懽心公讀書好深沉之思每手一編下帷濳心不問家人生業閨以内外皆倚辦太安人太安人晝總家務暮篝燈辟纑佐公夜讀以為常公為文根極理道不剽取模擬以逐時好蚤以文雄里中然上有司輙不利太安人常持義命之說寛解之公八試八不就而學無輟業者太安人從臾力也乆之以明經入選除陕西鞏昌府通判太安人随而西公居官亷太安人即操作以助其亷公性峭直日詢民所疾苦而耻媕婀取媚于上治鞏昌三年竟以失上官歡調臨洮臨洮邉郡郡與諸番部以茶馬為市賈人徃徃用利㗖郡監者監者受賕則噤莫敢短長聞公至憚其亷直懷金錢勿敢入則又㗖諸猾胥與為計公伺得其狀悉置諸法于是胥吏人人惴恐即番夷咸囓指稱神君矣然公在臨洮所為事上官者如鞏昌無加禮以故先後佐郡七年不得調公喟然謂太安人曰吾其歸矣能從吾隱乎太安人即日製隐居服以進力贊公歸部民争攀轅留之不能得公既歸杜門養重造請干謁一切謝絶布袍蔬食與太安人甘之獨日夕督諸子于學太守君遂以丁夘舉于郷丁丑成進士方試政司農署中聞公疾急以轉餉歸圖省視既歸公立譙讓之曰柰何委質之初即以内顧分公家念也命以孥行既行未及受篆而公卒比禫除授户部主事滿三載乃贈公如其官太安人封如今稱云陳君之官户部也太安人不徃守大名又不徃乆乃以訛言故徃徃未㡬而卒異哉訛言蓋若或啟之令太安人得終子舎太守君得躬含歛乎予與陳君同出少宗伯富順李先生之門習其人行不取合義不苟容予每肅然嚴事之比其守大名予適以使事徃來其境則候人不夙戒厨傳不加飾此其亷方質直何譲平村公然平村公坎軻而君顯者時有利有不利也陳君守魏魏方大祲餓莩枕藉于路太安人時戒君發倉粟賑其饑者掩其胔魏人徳太安人如慈母比其卒也咸號呼如䘮厥妣焉噫假使平村公而在所為訓誨太守君者亦如斯而已蓋太安人習見平村公所為服官者故猶能遵用遺訓以廸成太守之治哉凡此皆其大者予故因陳君之請而表之曰此明循良吏陳公夫婦墓若媺言細行生卒世家誌所具載者可無論矣明處士張君暨配葉氏合葬墓表嘉靖丙午蜀内江張處士汝茂卒越四十四年為萬厯己丑而配葉卒于時處士有孫應慶試春官不第投牒銓曹得饒陽學博聞葉訃誼不得還視䘮則為位哭既而手其從兄給諌應登狀詣登請表其墓道之石按張自楚亭徙内江數傳有文習者富而好行其徳郷人稱之文習生旻旻生自簡自簡生洪粹洪粹三子長俊早卒仲傑即處士汝茂其字云季位張氏業至文習而大至洪粹而中落乃逐什一之利賈于江油之平夷遂家平夷時處士已嶄然露頭角當就外傅而平夷故僻地無所受學乃入粟為什邡功曹䖏士性伉直不能俛首事上官上官有所苛責即自奮曰丈夫志四方安能役役牛馬走耶遂棄去仍之賈率諸賈人鑿山取鉛引水為溪以通鉛木至今人賴之處士又自計夷地僻陋俗以貲相雄長不事詩書不可以訓誨子孫乃復自平夷歸内江内江故業已為里豪所得䖏士欲復取之乃為具召諸豪言所欲諸豪故難之曰能倍與我直即可得處士曰諾即倍出直諸豪相顧愕然無以應故業復完㑹弟位貧不能自給即割所復業予之䖏士有二子全念念尚幼乃督全于學全既補弟子員而處士遘疾不起執全手與訣曰爾母有丈夫志能其家爾亦能自立吾無所恨獨爾弟幼耳處士既殁全治舉子業不問家人生事而先所積貯又為前倍值取業故日空虗葉力秉家務以纎嗇治生自奉甚薄而嵗時賔祭則務為豊腆婚嫁䘮葬僅取成禮而娣姒宗黨有急即不吝傾囊周之待諸子若孫嚴而視諸臧獲有恩念卒復收其遺孤撫育之蓋諸子婦孫曽數十人莫不兢兢一禀于勤儉者皆葉之教也先是處士在平夷時建大士廟于山間廟成夜夢大士遺以羣鯉至是孫應慶試有司葉復夢大士廟中一鯉化龍冲霄去寤而喜曰兹其在慶孫乎是嵗應慶果舉于鄉戊子應慶當與計偕葉觴而送之命以早沾一命以慰吾老人時葉已踰九十然健善飲應慶既行為己丑元日子孫猶上椒酒為夀共娛樂入夜而疾作逾五日逝矣方處士之賈平夷也折劵棄責平夷人徳之故處士没而相率千里匐匍來㑹䘮暨葉没而平夷人之子孫亦如之嗚呼兹非人富而仁義附焉者能然哉世言鬼神報應之説皆空虗無事實而大士之夢若影響不爽此何以稱然載觀處士夫婦之士行女徳則張氏所為振振多賢子孫者又在此不在彼予因表之曰此明䖏士張君暨其配葉氏墓俾張之後人有所觀感砥礪而不墜其先徳云家世生卒已備誌中兹不具明通議大夫户部左侍郎及公墓表徃嘉靖中吾邑蓋有户部左侍郎及公云公名宦字士顯别號二河予為童子時猶憶邑諸父老子弟嘖嘖稱公長者若走卒之誦司馬君實也自公捐館舎且四十年矣比予與公仲子户部君同官于朝見公所舊遊處其薦紳先生問知公有子咸津津然述公功徳願交驩户部君則又竊嘆公之長者蓋不直為徳于閭而已萬厯戊子予以使事過里中㑹户部君先已致其事歸與予言因嘆公飾終之典闕焉弗備以予典紀載乃授予以狀使表其墓道之石予受狀讀之則皆童所習聞暨縉紳所稱述者種種當實不爽也狀稱及氏為交河著姓上世以來率孝弟力田含采弗耀自齊東丞善始通仕籍由齊東而下又四世始生公公生而警敏授書塾師一再目輙成誦既授廪益肆力于學不問生業名日起正徳癸酉舉于鄉明年甲戌成進士㑹簡諸進士茂異者為省臺公與焉授兵科給事中公即未試理人而明習時務之要諸所條上引當否指切利弊都御史寗杲討賊無功懼嚴譴乃掠細民為賊欲因以為功公劾罷之敵入邉邉將某亡失過多公疏其狀因言禦敵之道要在選將練兵罷債帥杜倖進之路娓娓數百言為時論所韙嘉靖改元言者請遣廷臣覈諸邉鎮錢糧侵盜者已得請尋詔止宣大二鎮使者勿遣衆論譁然謂二鎮侵冐視諸郡獨多不冝廢詔長奸以累平明之治宜簡諸臣有才望者急徃按之乃共推擇公偕侍御俞君集往公先後疏劾朔州總兵張輗報中引鹽虧納數多故令人潛燬永寧場一百一十餘萬委小民脂膏為煨燼大同鎮守太監馬錫監倉劉景前總兵朱振侵費不貲都御史楊志學曲法狥人耗損邊計于是下輗等御史逮問籍振等沒産償贓請託不行聲震中外然竟用是不得久在禁闥以兵科左給事中出為寧國府知府寧國俗故浮詭公用愛利為行而一稟於至誠民不忍欺先是巡撫應天副都御史吳廷舉言髙淳故困養馬今又代養蒙城馬三百有奇宣城五縣無髙淳養馬之苦而嵗侵髙淳蕩田之利宜均役以甦民困既得俞㫖而五縣豪何隆輩鳩衆大譟至二萬餘人公以身當之為開陳禍福且急白都御史御史移檄省諭衆乃解散時微公則衆怒叵測流禍未巳卒定養馬議正隆等誅治諸臣首事之罰而公亦調守懷慶然寧國人徳公至比屋尸祝之公至懷慶以外艱歸起補鳳陽公治兩郡如治寧國狀壬辰陞浙江按察司副使時海寇劫掠並海諸郡縣官軍禦之多失利惟公檄指揮楊淮并勅諸賊曹所擒斬八十餘人㑹有為俘冦居間者公執不可其人大恨恚嗾御史謝君蘭列諸路玩冦狀連公詔公解職聼覈久之覈者言公實有斬獲功御史所指無事實起公陜西副使尋為其省参政以内艱歸服闋補湖廣参政歴山西按察使左右布政使公勤于舉職而拙于取名厚于恤民而薄于養交入仕三十餘年兩遭口語循資累級不越恒調嵗乙巳始入為光禄卿未幾以副都御史提督操江長江盜區徃徃傷敗行旅公諸所擘畫皆飭備銷萌要計又廣募射師分教材官健兒而時以身督肄之江淮戍卒多善射自公始丁未晉户部右侍郎尋轉左㑹邉地用兵諸嵗餉若軍興諸費一切取資内帑又禱祝土木嵗費不貲大司農金錢不能給公佐其長綜覈均節盈縮有度諸屬咸倚以受事公在戸郡久天子器重公將大用之而公以疾乞歸䟽再上始允其請比歸四日而卒訃聞詔予𦵏祭如例公雖公亷不可干以私然性惇厚篤于故舊身為列卿猶步行里中與鄉里卑賤者鈞禮居處節儉禄入以分給族黨殁之日家無餘財嗚呼此公所由以永終譽而殁世不忘也俗之敝也士有起奥渫躋通顯者率凌轢其鄉人甚或魚肉之卑人以自尊瘠人以自肥卒之骨未寒而讎者起子孫不得聚廬而䖏者比比矣聞公之風寧無媿乎予故表之以告鄉人期與後進之士繼公而興者有所則傚而砥礪焉公家世生卒已具少宗伯孫公誌中若長男萬言官大興主簿仲萬祺南京戸部主事季萬祥有聲諸生中將繼公起諸孫十人謙訥朴皆邑諸生讓慎恪檢楨櫓樞曽孫六人受益昌運傳芳景運承芳翊運𤣥孫逺森森未艾則誌所未載者故特列之以見天之報施善人如此馮仰芹墓表予初與今少宗伯馮公用韞讀中秘書聞其尊人仰芹公負高世才睥睨宇内時公以副憲侍養蔣太安人家居也竊妄意是必負氣難近比公再起入都門侍公于其子舎則一見如舊識久而杯酒相洽出肺腑相示遂定為忘分之交自是公去為臬為藩不常遇然遇未嘗不飲飲未嘗不歡最後公以河南参伯入賀萬夀至則已決去志矣因侍酒從容言世方需才豈可令公有留才公笑曰盈而溢天之道吾懼其盈也未㡬以病自免歸于時宗伯方以宫詹翰長侍上於講幃䟽請歸視上予假五月宗伯歸日為具侍公與賔客諸故人飲意甚適不欲出再䟽乞侍養上不許又見公健善飲無恙乃北上獨時時使人伺公安否越嵗聞公戒飲則怦怦心動又數月聞病卧遽以急請上允之瀕行復為公請封上復允之蓋異數也宗伯乗傳晝夜馳五日抵家而恩命亦以是日至宗伯視公于榻前道上恩徳父子相對感泣公時疾已篤然猶笑語如平時又三日逝矣是萬歴丙申嵗八月十八日也得年五十有八耳公天才縱横無所不可文不煩思而數千百言援筆立就未習為吏而初令固安當畿輔大邑理繁剸劇迎刅而解目無留牘庭無滯訟訟者不得盡其辭猾吏不敢縁以為奸治邑有暇樂延見士大夫問民所疾苦或晉諸儒生論析疑義第以私請則無所假借久之亦無敢干以私者輕裘緩帶温然儒生而胷中甲兵有韜鈐之士所不敢望者固安素苦盜捕盗又苦無兵公曰是不難為盜何難為兵乃籍良家子懸賞格令捕盜以故盜發輙得所稍不得或失之旁邑終公在邑桴鼔不鳴其為大同僉憲也值敵新欵以公主市所為操縱張弛動中機宜嵗時犒賞不如式則責主者如額則止額以外即敵百索百不應敵首有以裘馬來角射者公連發連中盡入其裘馬敵駭愧又徐出其所負者以計還之敵又大喜過望以是公在事數年為少参為副憲敵終讋伏不敢動滹沱易水之間畿南重鎭久無警士卒銷以供役使屯輸糜以稱過使客公備兵其地省費節冗簡兵清餉士始有尺籍伍符兵視諸軍獨壯而鎮為益雄生平不離杯酌于天下事若不經意者而排難應卒決疑定傾當機立斷方在大同奸吏有縁法馬新舊間减軍餉以自私者一軍盡讙甲而譟於司餉者之門公聞故呵殿入顧曰此罪在吏吾為若治之足矣即抵吏於法出新法馬以給軍軍乃安其在秦州盜嘯聚山谷間以數百計公曰是不制將不可制先馳檄諭之而遣兵隨其後盜大駭為解散去嵗辛夘彗星見訛者言主在易州有王氣上且舉兵加誅焉争相恐動一日譁曰兵至矣皆出走不可禁司空郎項公懼就公問計公不應苐呼酒與飲吏民見公無他轉相告語走者始歸束鹿人有以妖言聚衆者衆且千人吏索賄不得紿令曰此相聚謀反耳令恐請兵徃討之公曰何至是為檄逮其渠首而散遣其徒各歸農竟不煩兵奸民有䟽言易州礦金之利者章下兩臺兩臺檄公議公曰生財有道未有取給地下者且採而不得則為費大採之而得則為害大况鑿山坑谷不能無傷地脉陵寢在近誰敢任之事遂已公自為令以至大吏所至務舉其職獨居家則不問生業好行其徳出於天性為諸生試于臨淄雪夜歸有侯生者迷失道堕谷中呼衆求援衆若弗聞也者公獨援之出乗以已騎而徒步掖之生得毋死長安周媪醉遺所鬻珠於公舎旦日召而還之嵗饑斥所藏粟以周貧者曰吾不能使路無饑人能不使廪有餘粟也嚴馭僕𨽻不令横里中而嘗寛其所不及所繫玉縧環頗愛重為吏所觸碎所蓄善馬日行可數百里為卒斃悉置不問其襟量又若此蓋公坦中曠度如谿如谷探之無迹出之無盡取則若逄過則若化仕宦七年至憲大夫不為速以非罪被糾彈不為恚定變故于頃刻談笑間不為功勇退于急流之時不為慕戀能圓能方能勞能逸不以一善自執而人亦無能執一以名公者孔子曰鳥吾知其能飛魚吾知其能㳺獸吾知其能走至於龍吾不能知其乗風雲而上天公其猶龍乎夫世之人徃徃强其才所不逮以求滿其心所欲至及其不競而後悔其弗勝也晩矣惟豪傑之士嘗操其有餘于身而遺其所未足者於後公父芹泉公官行人而殁百不一試而餘所未足者于公公固有所用之矣然亦十不一試而餘其所未足者于宗伯公宗伯公以異才蜚聲詞林以正學結知明主其用公所未足以禔福生民當未可量矣公諱子履字禮甫閥閱始末已詳載狀志不具論謹述其槩表之貞石曰此明慶歴間才大夫仰芹馮公之墓以俟後之欲知公者攷焉勅封太孺人崔母劉氏墓表侍御崔君豪爽不羣官西臺侃侃自許彈劾無所避其母劉孺人心念之侍御因自計居官而溺其職與舉其職而憂父母無一可者乃以病自免歸歸三年孺人促之出侍御不得已為强起既起而孺人病病漸危復令其伯子趨侍御歸時侍御已有中州之命聞之心動即陛辭欲南馳㑹有事當建言者為留三日比歸而太孺人已先卒遂不及訣矣侍御撫棺大慟絶而甦曰吾竟以一官累抱終天之恨也悲哉侍御兄弟既蕆葬事乃以狀來乞表其墓按狀孺人本馬姓先世從其外氏姓因稱劉然劉與馬皆長垣右族也孺人始習女紅即愛惜筐篋遺絲棄縷無弗掇而藏之者生而端重然智識過人家人事有不可了者立能決之父喜撫之曰令汝而男也吾無憂矣年十八適崔封君封君大父母父母俱在堂其丘嫂李氏又蚤逝孺人以次婦秉家政執婦道恭謹無違禮祖姑若姑呼之未嘗不在側也孺人侍姑側即幼叔幼娣勿敢以狎侮見也旦暮滫瀡必具具必潔也篝燈侍封君夜讀無少倦也封君既入邑庠為諸生有友問業者未嘗不為具以俟也崔之食指繁俯而畜之各如其意所欲得無後言也嵗饑至自操作以給食用或脫簮珥繼之人弗知也封君每不能忍不平之事輙從旁解之勿令宿怒也侍舅姑疾廢寢與食湯藥非親嘗不進也比相繼卒縁毁成疾力疾襄事以至感掉眩之症終其身弗瘳也姑所遺子女暨嫂氏所遺女撫育婚嫁不啻已出也眎伯子次子當賈俾就賈侍御當學俾就學賈者不課其入學者則時督課之不少縱也侍御以壬午舉于鄉癸未成進士孺人曰是能竟乃父之志已喜而後可知也侍御司理平陽奉孺人如平陽每語以矜得情戒任情即雋母之訓不加嚴也司理隨部使者按部十九在外孺人自執管鑰不使外言入内言出也侍御入為今官再按郡國復戒以問民疾苦而利養之察吏臧否而激揚之毋徒自為威重為衆所駴視也孺人仁親戚有急不恡施予且時佐封君出贏餘以貸里人不責其息也自少勤力即貴猶日經理諸米鹽𤨏屑之務或勸之當逸者曰我自樂此不為勞也性簡淡無論冠帔華服不以自御即髙髻長衣為時俗粧者不敢見也時以善惡决人成敗信天道於人報應不爽故每誦天長人長之語訓誡子孫即毫髪錙銖毋令負人若曰逆人􅊇天恐其為自作之孽也大都孺人為婦則身兼子婦之事故能與封君以逸其為母以心兼愛勞之念故能貽侍御以名封君大父嘗嘆曰有婦若此吾家其興乎由今以觀孺人真有大造於崔者也狀所載凡數千百言兹獨表其槩如此曰是崔賢母劉孺人之墓以為後之女士法焉侍御名景榮其他家世生卒誌已悉可勿載矣明勅封承徳郎吏部騐封主事近山成公墓碑魏有積徳累善君子曰封吏部主事近山公者姓成氏名宦字縉甫近山其别號云近山隠于市而稱吏部公者從其子憲副君貴也憲副君既以萬厯乙酉葬公再越嵗始請言銘公墓道之石予與憲副同舉于鄉頗知公者曷敢辭按成氏之先山西澤州人祖朴始遷長垣其後子姓訛而為程公命憲副君請于朝乃復為成朴二子長者曰磊磊八子最少者曰岱是為公父凝所公凝所有大志嗜酒不問生事人有負者相習為具飲凝所凝所飲輙醉醉即曼聲長歌不問所負以為常以是業益落乃督三子于學三子者公及伯官季宰也公始學書不成去學賈賈于齊魯陳杞宋趙之間賈輙售家人俯仰暨季學皆倚辦于公公一無所恡又比嵗水漂没生業資斧遂空然公倜儻不侵為然諾四方賈者皆信嚮公湏公畫便計爭利于市者得公一言立解游道日廣貲用漸饒公既漸饒于貲又再膺封命乃益厭薄什一之利買田為富人力耕其中度有餘則益為徳于閭察親識諸黨貧者以次衣食之殁則為給槥櫝又好建橋梁葺神祠于是渌河有橋姑婦有廟它治塗修像無虗日顧躬自儉約嵗時伏臘賔宴之外無一切華衣媮食之奉泊如也憲副君言嘉靖乙夘秋公收責濟寧適季薦賢書報到即取所收劵焚之比憲副君舉于甲子又悉焚家所藏劵兩地之人至今誦義夫受大者不取小天之道也世顧多藉子弟之勢以腴已而瘠人若公之折劵棄責庻㡬知道者矣憲副君又言公事親孝待昆弟友奉凝所公及母文繼陳得一佳味必躬至膝前跪而進之藜藿自甘而滑柔未始不備也每遭大䘮身自經營不以累伯季而棺斂含禭無弗如禮就養都門未越月聞陳疾冐暑兼程而歸歸而陳已病困謂公曩母錢安在蓋陳曽脱簮珥令公出息人多不時與息公即代償其息曰息具在請以周陳宗陳笑而頷之從父佐醉忤尉尉怒將笞之公時垂髫即詣尉言伯老不任笞請代受笞尉壯其言為釋去後佐與凝所䦧于墻衆莫能解公徃泣涕解之佐感悟遂為兄弟如初諸生李某任誕數窘季公徃爭之强李卒不能有加于季而罷伯寢疾公時病痿猶强起問疾及經理其䘮不少勌嗟夫公之敦倫睦族蓋天性然哉何少而能然老而彌篤如此也憲副君又言王生某者挾禁方惑人云能使藥物為黄金公獨不為動久之術不售客死憲副君令南陽南陽豪楊某數為奸利扞文罔憚令嚴隂行千金為公夀公大怒將捕豪豪懼而逃去終令時不敢歸南陽賈客某以金若千寄公貿他所期來則償之比至封識宛然客嘆服而去憲副君兩為令入為天官郎出為藩臬公每戒之曰爾為清白吏我有餘榮不怨爾貧也憲副守其庭訓居官所至兢兢羔羊素絲之節語曰明明求財利惟恐不足者庻人之事也乃公見利若驚眎不義若凂即懐獨行之􅋵者猶或難之矧服賈者哉邑博士高公行誼賔之鄉社固謝不徃守相長吏鳴騶而至者咸願交歡公公逡廵退讓語不及私獨聞有𨽻罪籍者或為脫之而人不能知馮丞者侮諸生諸生言其不法于使者使者欲斥去丞公言去丞如諸生何使者悟而止蓋公性仁厚即臧獲小夫不譙譲人或加以横逆如弗聞也者而過之獨面折不能容人之過里中無賴至不敢見公或因而改行比公卒至有為位以哭者嗚呼豈古所稱王彦方之流歟憲副君當備兵北平過里中謀請告侍公公曰疆塲事重吾且以是觀爾之能趣之北上明年公忽夣邑大夫召之飲又田間傭某亦夣有謁公者車騎甚都比晚瘍發于足竟不起易簀之際正襟危坐諸子環泣請命曰人生夣境耳吾已得其佳者夫何言時萬厯甲申十一月十三日也距生正徳丁丑七月十二日得年六十有八配朱贈安人繼王封安人俱有婦徳朱安人先公四十年卒卒于嘉靖乙巳得年二十有八子三人長即憲副君遜朱出娶趙守才女封安人卒繼娶武尚嚴女封安人次蘧廪生娶靈夀教諭侯華女次道己夘舉人娶省祭官陳守時女俱王出女二適李陳光範孫男六遜出者其徳邑庠生娶生員陳應瑞女其行邑庠生娶稷山尹殷煉女其節聘舉人李檖女其業聘户部主事夏濳女蘧出者其學聘河南學憲李化龍女道出者其功孫女三一許聘沂水尹宋炣子某遜出一適生員蘇民慕子延祚蘧出一許聘稷山尹殷煉子某道出曽孫男一士彦聘生員李和行女曽孫女一許聘生員蘇延祜子俱其徳出予聞古今善計然之術者推陶朱公彼其能聚能散變化不居故足述也公身自治生或伏或起而能不責于人分散于貧文族黨此何讓朱公乃朱公衰老聼子孫修業徒能累息鉅萬耳憲副方為國家樹鴻鉅之業而其它子若孫或待詔公車或占籍博士濟濟有聲于藝苑寖以嚮用後禄未艾此亦聼息于子孫而所就業𢎞逺矣銘曰賈操利權其事戔戔公賈而亷亷賈五之積居任時業日以滋公富不溢䖏厚居實為閭里率若芒若屯内行則醇彌老彌惇好行其徳而無徳色望廬者式自公發祥子孫其昌莫之與京龍章有耀身食其報仁義斯效魏博之間有丘巋然曰成公阡明封文林郎河南彰徳府安陽縣知縣北岡劉公墓碑新城劉給諌在諫垣伉直不阿遇上有秕政下有私黨不難糾舉而釐正之聲稱藉甚予以為吾燕趙士天性固然也比得約齋傅公所為封君劉公狀讀之則知劉君之為名諫議者蓋庭訓之力焉狀稱公諱宗伋字子中别號北岡其王大父英生大賢大賢生鉞娶於王而舉丈夫子三公其長也劉世以力田貲雄里中然未有業儒者比公生岐嶷不羣始令就外傅能為文即多竒氣傾其疇伍以數竒屢試有司不售忽憤曰雕蟲小技壯夫不為遂棄去學武武通孫吳兵法騎射絶人嘗試武闈步騎九矢皆破的以所對䇿有忤時語竟不錄公益憤曰以語言文字棄壯士世事可知己復棄去聞房山有異人治黄老家言遂徃從之問脩心煉性之㫖每跏趺上方山雲居諸寺雖家務不廢功亦不輟時給諌君已有聲黌校間公喜盡發所藏書畀之復令從海内諸名家㳺考徳問業以益其所不逮隆慶改元給諌君以莊皇帝登極恩貢闕下丙子領順天鄉薦丙戌成進士公益喜曰吾不做知吾子必做也給諌除安陽令欲奉公徃公固不徃乆乃跨蹇入鄴從田父野老問令治行何若既得其循良狀始至宦舎慰之曰汝以此治安陽是不負君父不負所學矣安陽嵗𣲖舊多寛於勢要而倍於小民給諌君審其弊悉更正之公聞益大喜曰為民父母欲其鋤豪强而利民非欲其畏豪强而病民也汝能如是吾復何憂吾當去汝勿久溷乃翁為也遂歸安陽令滿三載封公如其官嵗壬辰令以髙第入為給諌給諫憫時事之多艱也憤言責之不得其職也數抗章言事纔數月以田孺人憂歸再起入吏垣署科事愈益發憤諸人所不能言所不敢言者極言不讓或者曰直木先伐子不虞憂子大人乎給諌曰此家大人意也吾不言溺吾職矣何以見家大人㑹給事某者意有所阿奉䟽指正人為邪給諌忿曰邪正之淆治亂之闗也遂極詆其背公狥私狀以此忤執政已而大發執政諸不法人咸危之賴主上聖明僅鐫秩調外任便過省公公迎謂曰汝不愧諌職真吾子也何官不可為勿以乃翁為念人以此益服公嗟夫忠臣烈士何時無之其以父非劉公徃徃牽於内顧之私不得行其志者多矣若公真能為父者故曰劉君之為名諌議皆庭訓力也公偉貌修髯童顔鶴髮飲於鄉㩀賔席望之儼然若仙性剛直每面折不能容人之過見强有力者務以氣陵之出其上至良弱則善遇之或捐貲以周其困乏或和藥以救其疾苦晩年敬神崇祀𤣥帝暨闗真君若謂人有愧於心即有愧於神明其志操如此公生卒世系狀已詳不再具謹摭其生平之槩書諸麗牲之石而系之以銘曰新昌城督亢里吁嗟劉公生於此慷慨慕義古杰士有志不就老以死公之不死在公子壽官槐菴霍公行狀同年友霍君雲程出守衛源纔兩月其大父槐菴公卒于家公長子贈南京比部郎美資先公九年卒太守君為嫡長孫承父之重聞訃徒跣歸將以其年四月二十六日蕆葬事乃手叙公生平乞銘于立言君子使史某為之狀按霍在春秋為姬姓之國其後以國為氏西漢時兩司馬最顯後世子孫散處三晉靡得而詳已在井陘者自鰲始鰲生友剛友剛生英英生尚徳尚徳生朝用以輸粟拜爵朝用三子初娶于部生岳繼娶于楊生岱及崑岱字邦鎮即槐菴公也公甫二嵗父朝用卒母楊弱齡而寡孱然撫前孤携兩孺子日呱呱泣含氷茹荼朝舂夜紡力持門户公稍長使就外傅又為娶于張生比部公而公業猶未就乃嘆曰人生榮進有命安能俛首受書以薪水勞吾親乎去貸子錢為賈賈清源間積居與時逐賈輒售息三倍家用益饒上奉楊孺人下資比部公于學比部公為諸生有聲稱試輒髙等時太守君雖嬰孺已嶄然露頭角公大喜謂張孺人曰顯親揚名不于吾身其于吾子孫乎益斥其餘為徳于閭族人寳者以非罪係有司貧不能自理公為出貲營解之竟得末减又族人某者竊公財逸去公若為弗知也者不問也里人蔡强孫定輩或貸公粟或負公租公度不能償皆召至對衆折劵焚之曰諸公强食吾不爾責也里有貧不能葬及無子孫可任葬者公為立義塜給槥櫝葬之由公而葬者高萬岳宗仁輩凡若干人公出㳺見有被髪而過其前者熟視曰若非郝氏子耶是奚為者追尾之比出郭已雉經林木中矣急為解脫慰而遣之邑城西當晉孔道毎秋水至行李為梗公曰此不隄防後其沼乎立出粟百餘石錢五萬募工為長隄百數十丈行者便之公好行其徳類如此萬厯改元以恩詔拜高年爵一級邑大夫採士論賔公鄉社公不數數徃日惟課諸孫學或弄其曽孫以自娛樂晚好奕客有過從者即對奕窮日夜力嘗曰奕之為用大矣動静無定形强弱無定勢得失無定局善奕者以奇勝智不足與權變勇不足以決斷者難與言奕嗚呼公豈獨精奕哉通于理矣公性儉約惟事母楊孺人時時擊鮮刺肥上食餘非奉賔客不具鷄酒蔬食自安澹如也每太守君宧㳺即多予金錢曰以助爾亷太守君兢兢奉意指所在以清白稱太守君由南中報政闕下南中諸名公聞公行誼多聲之詩歌因太守君為公壽者太守君歸夀公見公老意留侍食飲適㑹有衛源之命公曰孺子仕益進報稱益難乃公即老尚健善飯柰何以老人故緩王事哉急行毋留太守君跪請所由治衛者公曰若不憶孔子適衛所以語冉子者乎執此以徃即所為報國也太守君遂行公庭中故有古槐大五圍枝葉扶疎公愛之時偃息其下因自號槐菴一日至其下顧而太息曰樹猶如此吾其老矣時公無恙衆不謂異也未㡬而疾作且疾且愈愈而復疾子孫為致醫藥却不嘗疾革之日語不及私惟丁寧子孫無廢耕讀無忘忠孝及戒慎無厚葬而已是萬厯庚寅正月二十八日距生正徳壬申四月十四日享年七十有九娶張氏治家勤儉嚴而有禮于隆慶乙已卒繼娶梁氏子男四人長即美資廪生以子鵬貴贈南京刑部署郎中事主事娶李氏封孺人美中壽官娶許氏美才武生娶郝氏美珠娶郝氏繼王氏孫男七人女五人美資出者鵬即太守君萬厯丁丑進士任河南衛輝知府娶李氏贈孺人繼康氏封孺人䳟武生娶梁氏繼盧氏女一適徽州府同知于翰男縣學生克念美中出者鶴鶚俱諸生鶴娶吳氏鶚娶李氏繼畢氏女三適于第盧志吳邦祥美才出者鷺娶高氏女一適許遇美珠出者鵲娶盧氏鷴未娶孫男二人鵬生者仲熊鷺生者伯龍曽孫女七人一適李教明一適高維岳一適武之柱餘尚幼太史公有言天道報施善人夫報施之理至微渺矣然徃徃有之楊孺人秉節植孤㷀㷀耳施不及梱外槐菴公即躬行仁義至死不倦然積著有限徳不越于闤闠乃天報之以多子孫且貴顯矧大人資適逄世利澤加于海内者哉由此言之太守君方再世而昌霍氏之澤未艾矣明通議大夫巡撫順天都察院右副都御史鳳山王公行狀大中丞王公卒其嗣子繼先將乞銘於立言君子而俾子為之狀予與公同舉于鄉頗知公者安敢以不文辭公諱致祥字徳徴别號鳯山其先山西忻州人祖斌戍上谷因占籍于龍門衛數傳至鎮以拳勇聞從昌平侯行邉䧟陣先登用斬首捕虜功累官指揮僉事階明威將軍再傳而生永永三子其仲曰司勲公懋懋生磁州同知金即公父也以公貴封文林郎兵科都給事中娶於張封太孺人舉四子公其季也感異夣而生故命名曰祥公生而竒異幼而聰頴再周嵗能誦書七嵗能屬文十二嵗補弟子員廿而舉于鄉是嘉靖甲子嵗也辛未登進士第壬申授鳯陽府推官每讞獄必列兩造於庭推求其情不獨以笞捶定之爰書成手中吏抱案受事無不凛凛讋服者全椒人羅鑑家井有四尸莫詳所由死凡易五主垂四十年以羅織抵法者甚衆公一訊立雪其寃江北稱神在郡五年其所平反大都若此矣萬厯丁丑徴為兵科給事中時諳達欵塞邉臣無繇徼捕獲功而競以修築為功上急就以博名下虛應而脫罪旋修旋報旋報旋圮甚有未報而圮圯而復報者甲兵化為畚鍤士卒疲于力役公䟽言其狀請戒邉臣毋塞責毋貪功毋廢肄習毋减糧餉娓娓數百言上嘉納之戊寅陞工科右給事中己夘奉勅閱視薊遼等處邉務于一切邉吏之能否邉備之修廢無弗精覈諸所紏舉咸當輿情詳在公奏䟽中庚辰陞本科左給事中册封宣寧藩府以便過里中為兩尊人壽依依不忍離子舎㑹陞兵科都給事中兩尊人督之曰此豈爾家居時耶公不得已乃就官公既周歴邉闗習知情偽居職知無不言言皆中窽壬午以外艱歸甲申服闋復補兵科蓋以公練習邉事也公再入兵垣首䟽諌止内操極陳可憂四事大畧言宸居嚴宻不當使刑餘小人日操干戈習為戰闘萬一悍夫失馭震驚乘輿如高廟太后何又非所以端好尚也奏雖寢然未幾内操旋罷公與有力焉㑹張都御史請罷互市以省大費公䟽言中國既許之和必許之市既許之市必予之價此覊縻之術非如市道交易相與區區較錙銖也今通市十五年矣一旦無故而罷不顧今日之利而預憂後日之害以後日未萌之害而棄今日已效之利于計非便上是之他如議増西河之餉議析土司之争議内殿叙功之濫議思順撫勦之宜詞多不具載丙戌陞太僕寺少卿戊子春陞本寺卿禁奸剔弊冏政肅清是年秋陞都察院右僉都御史整飭薊州邉備廵撫順天公念薊昌畿輔重鎮内衛京師外控强敵悉心經營事事為備長昻伯暈大等入犯石門即發兵邀擊創其渠帥史夷挐出頼等慕田峪戕殺官軍即發兵奮擊多所斬獲以故北山伏寇日窺伺而不敢縱暇則量工計費繕完缺廢計在鎮凡修築新舊邉墻一萬四千六百餘丈墩臺四十餘座積省工價諸費六千五百餘兩辛夘報政以母老身病陳情乞休當事者重公勞積久不報㑹有言者公求去益力乃加右副都御史致仕公既去而總府都御史蹇公閲視右通政穆公先後疏公經文緯武省費籌邉有撫綏保障之績詔賞銀三十兩紵絲二表裏時西事甫寧東師復出識者方欲委公以鎻鑰之寄公乃于癸已正月而病病數月逝矣予聞諸易醫官云公在鎮時得奇疾每早坐堂皇上擘畫諸務比已退食兀坐一小齋見四壁皆奇神異鬼跳伏萬狀公黙念此静室安得此是吾疾也及午漏下呼茶茶已輙愈申刻復坐堂皇上擘畫諸務至暮歸卧丙夜即寒顫顫已輙汗汗已復愈葢十二時中已亥病餘則動履如平常病一年而人不覺其病亦無能名其病者予問易云此何病易云病在肝心二經此神魂不交故也葢公生平小心周慎極思審慮故及於此予嘗貽書戒公去機心省煩念以養天和而蕃後嗣公不以為忤且有知己之感比公勇退予意可以息心長年矣竟不三載而卒則猶以前疾也惜哉公生於嘉靖甲辰十二月廿二日寅時卒於萬厯癸已五月六日已時得年五十先配劉氏禮官志誠女贈孺人繼馬氏大同府通判宗孝女封孺人公無子以仲兄遂平令之子繼先為嗣娶張氏監察御史濓之孫宜興縣丞廷松女也女一未聘公既卒繼先疏聞于朝天子念其有封疆勞詔予祭葬如例繼先將以甲午年某月某日葬公于宣城北栁河川祖塋之次而具公行實予為之狀其畧如此繼先又言公事親孝事無巨細無不禀命飲食衣物時請所與務得其懽心與伯仲共㸑終身怡怡人無間言御家嚴訓諸猶子以禮儉於自奉而樂於周施此皆善事而乃嗇其年又嗇其後何也當公疾革時嘱太孺人兩兄以繼嗣事猶能勉舉三爵俄呼左右促裝若將赴召者遂暝嗚呼異哉併狀沈庫部傳庫部沈公諱某字邦重别號鵞山學者稱為鵞山先生其先浙之徳清人後𨽻武功籍為都人公生有慧性聰頴絶人八嵗能屬文文多奇思十三廪於庠名動京師一時學士先生號有人倫鑒者靡不以國士目之矣嘉靖丁酉舉鄉試第六人甲辰上春官闗西王懷野先生得其文大竒之擬為舉首比閱所試巻先後不相應例不得舉蓋忌公者當糊名時故錯亂其號以扼公故耳王先生抱巻扼腕者久之始以瞿文懿公為舉首是時公雖未舉而聲名籍甚顧重於舉者越癸丑公成進士乃竟為文懿公所得文懿見公即以公徧賛諸同舉者曰此名士吾愧先之是不當在弟子列是年秋除夏縣令至即揭一聮於門屏以清節自厲邑當省㑹孔道舊令民蓄馬以資傳送徃來者多虐馳之斃則責償於民不給則僦民馬或從民貰馬費愈煩而民愈擾公曰官馬則官蓄之安能疲吾民以稱過使客也更令蓄之官歲省民財以數千計諸邑贖鍰嵗入率以金錢公曰金錢易乾沒耳不如積榖便兩臺是其議下其法於諸路遵行之比嵗祲所在有粟所活饑民凢數萬人奸商有為宗室訃請徙解州鹽課於内地者衆知其非是莫能抗兩臺下公議公曰是欲憑藉宗室以撓國課也為極陳所以不便狀事竟寢乙卯冬山西地大震壊城郭暨官民廬舍㡬盡奸人因為訛語民日數驚皇惑靡定公為䋲其訛言者而撫慰其驚者人心稍安乃始鳩工度材裁其緩急而先後葺治之民不知勞夏得復為完邑時嚴相墨諸計吏因以餽遺為名而厚取以自潤公獨無所染有行李蕭蕭一擔輕無人知是覲京行之句聞者髙之公治邑屢以治行薦屢報聞乆乃入為武庫司主事夏人相與軹車扳留不得則相與尸祝之武庫職司出納最為弊竇最難覈甚乃有私其竒贏以為利者公為精心畢志察其隱而剔其蠧大司馬方倚公為重而公逝矣入仕僅五嵗耳得年四十有三公殁十五年而長公涵舉進士又五年拜侍御史出按雲谷秦閩有聲稱又數年遷守歸徳數月自引謝病歸歸十餘年而都人士列公行誼上之督學使者使者下所司覈之如所言乃涓吉祀公於學宫又明年而史某為之傳史氏曰沈公以文章政事著稱世見其顯者也予稽之月旦乃知公惇倫睦族折劵棄責葢廪廪篤行君子焉顧晩第而蚤逝未竟厥施其建立雖足稱述纔一斑耳長公冠惠文威行郡國不可謂不遇矣亦方壯而伏十不一試嵗月漸邁尚未得用其所未足豈天道哉然嚮使當長公為待御時爼豆公於宫牆即曰事非勢成誰其信之今屏居林壑久勢無所可倚矣而輿論誦公者如出一口此足以知公矣古人有言名不虗立士不虚附觀於沈公益信於戲士安可不務脩徳哉濵石唐先生傳古人重行誼故士生其時斤斤以孝弟為務澣灑羣牏細事也而郎中令躬為之兄弟讓封至於違詔逃疾而不顧今之治博士者不然談經術而騖高曠習虛華而薄本根一不得志于時其侘傺不平之氣直欲舉身世棄捐焉語以家庭父子兄弟之常狃以為兒女子事鄙夷而姍誚之矣然古人所重乃在彼不在此幸而有質行如濵石唐先生者安可以弗傳也先生諱喬選字彰能閩之莆田人生有異質長而博聞𢎞記嫺于文詞為弟子高等毎試輙冠其曹先生雖以文名閩中而不以文自雄介介然以䋲墨自律醇謹無與比事父榕原公暨母黄孺人百劬不倦務得其懽心原榕公晩有目𤯝先生旦夕侍飲食扶杖履呼之未嘗不在左右盖十餘年而忘其疾也則以先生為之目也伯兄某早卒事其嫂朱甚謹撫其姪遇恩如所生祖所遺腴田悉推以與之嫂與遇相繼卒又撫其孤建建父子得底于成立者先生力也先生之内行醇備大都若此嘉靖丁酉嵗先生試于鄉憲大夫劉公得其文大奇之擬為舉首㑹直指嫌其不出于已也欲稍後其次劉持不可曰不第一者還生文竟携以出先生即不魁省試而名日益起反重於魁省試者諸大夫爭識先生屐屣到門願與交懽或延致為弟子師先生教人必先之以徳行而後與辨析經義一時請業者無論文學彬彬率多砥行士矣先生嘗客鄭憲副所有富人子抵法當坐携金錢私遺先生求為地道先生驚曰某豈有遺行耶何至此其人慚懼逸去聞者益嚴重先生先生十上有司不售㑹伯子今憲副君守欽舉于鄉先生謂曰使吾當售也不後孺子孺子勉之吾將隱矣遂謝博士籍更號曰澗松而益飭躬端範以訓誨其諸子率其鄉之人盖先生殁十三年而憲副君成進士又一年得贈先生承徳郎户部主事又四年晉奉直大夫户部員外郎憲副君居官所至奉三尺法亷頑貞滛無敢越尺寸者皆先生之庭訓也予與憲副同對南宫知先生頗詳故述其生平之槩作濵石先生傳以著先民之行事如此以覺夫世之澆漓者若家世生卒别具誌中不具載大父䖏士公述大父處士公諱信其先越人永樂中有祖士賢北宦於燕始占籍於河間之交河家於縣東五十里所謂泊頭鎮者士賢生珉珉生誠誠三子大父其嫡長也大父祖父皆仕宦而身獨隱於賈賈而亷名聞逺近大父面多麻人因以麻子稱之聞其名者無不争就貿易大父好客客至人人各如其意所欲得以是人益附之貲日饒裕然自奉儉布衣蔬食無所紛華獨好施予出於天性見人饑不啻已饑也見人寒不啻已寒也食飲錢布隨所見輙施甚至解衣衣人以為常其施也不知倦其既施也不知徳有指揮某者以襲官待次都門久資用竭鬻衣裝為道里費行至鎮貧不能前大父見而憐之曰安有人若此而貧賤者乎招之至食之衣之為資給而遣之不問其為誰氏也踰數載有達官騶從至門者大父驚以為誤比入門向大父拜大父愕然迎拜曰公不吾識乎大父噤不能應曰吾昔公所濟窶人也今為指揮使轉運道此一謝徃施耳陳品物於庭甚盛大父遜謝不敢當為治具欵之厚犒其從者飲至暮卒不能致一物嘆息而去竟亦不問其為誰氏也其施不求報大都類此大父二子伯恩博學工文名振一時扼於數不得第第以選貢生為東昌幕居職五年清苦如一日盡减父産卒於官遺孤繼登纔八齡越三十年而繼登官太史乃作而嘆曰予幸襲大父餘庇官以史為名主紀載善人君子以垂世立教顧獨令先人之徳闇沒而不彰豈不悲哉恨生也晩不及大父之世且早孤不及詳訊先大夫以大父之行事第聞諸鄉長老稍道其百一如此又不敢飾一詞以誣吾祖謹次所聞為處士公述以傳示我子孫俾知所考而感動取法焉大中丞湯公小像賛而貌則頎而度則祗而金玉其姿赤芾朱衣端居逶迤意瑰而行琦變化維時雖則維時而無詭隨三吳而綏三楚而釐所去見思知公者猶云未䆒其施嗚呼噫嘻程太常像賛黄金爛如朱服燦如止則于于行則徐徐爾其外腴而中虛者耶爾其夙夜匪懈尺寸不逾者耶爾其八年將作功成而不居者耶爾其九載京卿棲遲三署處世其若迂者耶世競名而弗趨世競巧而獨愚於戱兹其為聚所先生吾將以之為模者耶春秋議准禮部手本該兵科給事中王士昌題為麟經離析多歧聖學幾晦懇乞聖明亟行釐正以範後學以光同文盛治事移文本院要行詞局専門春秋精硏校勘一切傳註令後學作何遵守其牽合附㑹引用非㫖者應何刪革主司命題應否擬定等因到院准此議得春秋一書聖人垂勸戒于萬年嚴褒貶于一字即及門髙弟莫賛其辭豈後世俗儒可異其說况國家既以明經取士自當以經文命題主司不宜因題有限舎聖經而别為傳題合題以難士子士子亦不宜因題立意背聖經而姑習傳題合題以合主司且傳以說經非經也不可為經即不可為題况合之義不過曰比合曰牽合比合成題已非立言之意牽合成題益失作者之心又甚而捜羅隱僻杜撰新詭使治經者以濫漫之功妨正業典文者以疑似之㫖失真才即在當時衆謂無據傳之後世人將謂何合無以後試士只以聖經為主其傳題合題盡行禁革以昭聖世章表至意或者謂屬詞比事春秋本教傳題合題相沿已久未可驟革至于近所穿鑿如與傳句影響相似實不干涉者傳本兩語相合却摘一語搭兩股或四股者傳本正說却乃揑増反說一股配合者本論春秋前後事却强引春秋時事當之者隱兩本股却暗出兩傳搭股者兩股無胡傳從左氏及他說合者諸如此類必冝痛加禁革使主司無逞臆于經之外士人得精心于經之内其于經術不為無補若試題擬定一節恐非事體未敢輕議倭事議人臣處國家之事當合衆人之聞見酌敵人之情形不可專信一人之言專執一人之見今東封之事試虚心以思倭既受封何以無謝恩之使冊使方還何遽有渡海之倭清正曽言已殺矣何以又云提兵釡山曽言已焚矣何以又云屯聚倭封之後與朝鮮俱我屬國即朝鮮失禮何不請命天朝而遽興問罪之師均此海也我冊使之徃来何難倭衆之徃来何易均此倭也今之来何易昔之撤何難既屯釡山又據梁山不擄掠不殺戮意將何為則沈逰擊之不足信昭然矣而又試思倭能再來我兵不能再出不惟有始無終孤小國之望且自示虚弱令遠人有輕中國之心非䇿也是宜急圖桑榆之功蚤為戸牗之計除各鎮邉防之兵不可調各省防海之兵不可調各䖏防礦之兵不可調此外有某兵可以應援某將可以將兵先調六千人或萬人分為二枝毎枝選正副將之謀勇俱備者領之儲半嵗糧徃為聲援總設監司一人以察其勤惰而禁其騷擾又眀諭朝鮮使臣云天朝已許發兵矣可歸語爾國王亟集爾精銳聚爾糧餉期以半歲之後當因糧於爾國以訓練爾國將士則朝鮮聞我之不棄其國也必奮發之恐後倭衆聞我之不棄朝鮮也當疑畏而不前以後倭如恭順亦可逆杜其異日窺伺之心倭果跳梁即可少防其目前侵陵之患若曰少發兵不足以創倭然戰雖不足守則有餘况又可陸續徴調以俟進發也不然兵非一時可發糧非一時可辦朝鮮非一時可到日復一日動諉曰㑹議曰行勘緩則任已急則責人中外異心旦夕易慮萬一驕倭覘我無謀乗彼無備蚕食而進則朝鮮之疆土日蹙兵力愈弱全仗中國以威四方令兵宿于無用之地財殫於無盡之谿猝有不虞從中而起蕭墻之憂憂方大矣東征議朝廷之典莫重於賞罰賞罰之行當明其功罪今東征之役在經理楊鎬方報以為功在賛書丁應泰又劾以為罪事係軍情地隔異國既難遥度安可臆言將欲大服其心必湏詳覈其事合無遣風力科臣一員徃同監軍司道諸臣吊取各項文冊逐一清查原兵若干見在若干損失若干原馬若干見在若干倒損若干陣死若干病亡若干陸續運到糧料若干用過若干見在若干陸續觧到金錢若干費過若干見在若干攻戰有無勞績斬獲有無詐冐將吏有無逗遛功次有無攘奪糧芻有無冐破餉銀有無侵欺講和有無實跡軍機有無失誤身至其地面親見其情形真偽莫逃耳目難掩衆既公証其是誰敢獨飾其非功罪既眀賞罰必當惟允惟平不枉不縱賞一人而千萬人知勸罰一人而千萬人知懲内可以鼓舞邉臣之氣外可以懾服倭衆之心矣謹議東事議功疑惟重罪疑惟輕所以慰安將士之勞振揚朝廷之威者聖意已定然必特遣科臣查勘者亦以功罪眀而後可以議輕重且令提功罪之衡操輕重之權者在上不在下也據督臣撫臣二䟽則科臣徐觀瀾已囬矣夫呪詞乃呪丁應泰者與科臣無干何為而遽囬哉且呪詞不掲於賛畫初奏之時而掲於㑹勘之日科臣不囬於乆居王京之日而囬於將勘之時此其中必有縁故但事在異國勢難遥斷科臣雖囬諒亦非逺似當仍令科臣隨所駐之處㑹同總督經理監軍諸臣各秉公心勿執偏見速為勘明具奏至於有功當從優敘有罪當以功贖宜静聼皇上䖏分無滋煩議以躭日時則人心自服國體不䙝士馬早得觧散免致他虞朝鮮蚤得安全無所顧慮矣朝鮮撤兵議竊惟人臣於國家事知之必真然後議之斯當見之必親而後知之斯真况兵事至重尤非可以㝠㝠決者今督臣經理在朝鮮有年矣其倭之再來與否兵之應撤與否見之既親知之亦真自當究利害之歸剖可否之宜為明主别白言之若徒引其端而使皇上自決諉其責而令九卿㑹議使他日無事則已有事則曰此主上所裁決我何罪也又曰此某人所㑹議彼自有任其責者我無罪也逆計巧圖以求免後咎餘責此工於謀身非忠於謀國者古人有言兵難踰度百聞不如一見故臣愚以為撤兵一事只宜外決於督臣内決於樞臣而不當決之於九卿至於供餉則臣愚以為此必不可者自東事軍興畿輔齊魯之民嵗加餉銀數十萬椎骨剥髓剜肉醫瘡即奉明詔停征有司尚有不奉行者百姓之苦極矣又加以旱灾䖝灾助人為虐閭閻嗸嗸無所得食木皮草根一時俱盡流離轉死不忍見聞即我皇上發粟賑之稍為甦息而至今村無人室無烟如此景象皇上以為尚可加徴以給異國否也况數年以來朝鮮之衆死於倭者不啻强半以其半而耕一國之田自有餘粟何煩中國兵士留戌者無所事事且戌且屯亦足自給又何煩中國漢趙充國將萬人屯湟中而坐困先零班超請兵䕶西域不湏中國斗糧而咸服諸國彼獨非人臣乎何古今遂不相及也若必欲朘貧民之膏血以轉輸於藩籬之外恐財盡不能勝其求力疲不能勝其後此孔子所謂季孫之憂不在顓臾而在蕭墻之内者故臣愚以為此必不可也謹議䇿問問古稱天地生財只有此數不在官則在民今閭閻窮乏帑藏空虚將以為在官耶在民耶不在官不在民將何所在耶夫在官則散之在民則歛之不在官不在民不知大司農又何以為計也朝廷之上如漏巵不堪嵗出而不得不散百姓之家如懸磬不堪嵗入而不得不歛斂者不能越子例之外而散者日聞増于例之中無事既發帑金為糧芻之用有事又請帑金為召募之資夫須糧須芻則有兵有馬臨時何為又煩召募待召待募則無兵無馬平時何為屑越糧芻乃下之請發於上也則必得上之清覈乎下也則必不得嵗復一歳長此安窮漢時文學諸生議鹽鐡均輸持論甚正則理財之䇿亦諸生所宜留意也其各陳所見盡言以對問古者四民各安其事不易其業故道徳一而風俗同末世則有三㳺之民矣可指而言之與此三㳺者荀子所謂徳之賊而亂之首也至孟子所深距力闢者乃又不在三㳺而在楊墨豈惑世誣民三㳺淺而楊墨深與漢興表章六經罷黜百家似矣前數家者果悉黜與否與漢晉以後佛氏轉盛比之三㳺楊墨其害又孰為淺深與唐之韓子宋之程子朱子或昌言攻擊身任禍殃或辨析毫芒推極流弊是猶能閑先聖之道以異端排之也至于今而不然矣治佛氏者髙持其説而欲踞吾儒之上業儒術者卑視其學而甘出佛氏之下豈以聖學大明之世海内之廣竟無有如孟如荀如韓如程朱其人者哉又何以令後之視今也夫崇正闢邪其責在士君子其事在師儒諸士行將為士子師矣所以迴既倒之瀾闢既榛之路者何道而可其究言之以觀所學問周禮大司徒以荒政十二聚萬民而又有廪人詔穀以治嵗之豐㓙其為民計者至詳矣其略亦可言與今不幸有方二三千里之水旱民即轉死流離甚者人且相食豈荒政之未講而廪人之職猶有所未備與抑或有他故與天灾流行無代無之漢臣有矯制發倉以濟饑民者今即有其人亦有粟可發否宋臣有知青州而活流民至五十萬者未聞煩内帑也今一有賑濟動請帑金豈古人之法不可行于今而舎請賑外無可為計與幸主上天覆不愛金錢漕粟以活溝中之瘠而銷潢池之變然説者謂饑而後請請而後賑枵腹之民不能忍須㬰勿死以霑徳意故捄荒不若備荒備之之説無如古常平倉法義倉法社倉法此數者亦可行于今否與數者之外抑或有他道與諸士之来也于饑民情狀亦既耳而目之矣兹欲使海内黎庻樂嵗終身飽㓙年免于死亡何䇿而可其酌古度今各以意詳著于篇以覘濟時之畧淡然軒集巻七
