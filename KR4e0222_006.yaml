body:
  text: 淡然軒集巻六明余繼登撰誌銘明通奉大夫光禄寺卿少洲馮公墓誌銘莊皇帝之壬申歲三月二十又一日光禄寺卿致仕少洲馮公卒子子臨輩以其年十一月二十日葬公于堯山之原越十五年公仲孫琦官太史始以公仲兄海浮先生狀來請銘登謝不敏而重違太史之命乃按狀誌而銘之狀稱馮氏之先世為青臨朐人高祖思忠徙家遼左自遼左復歸於青則公父憲副公始也憲副公有丈夫子五人四登科第竝以文章政事擅名於時東海馮氏遂有聲稱於天下公諱惟訥字汝言别號少洲正德癸酉憲副公為蕭令生公於蕭公生有竒質風神秀徹既長開敏沉毅辨悟絶倫名起齊魯間一試輒受廪領嘉靖甲午鄉薦登戊戌進士庚子除宜興令宜興多大猾持吏短長善逋賦有逋至數十年者公至刺諸猾摶擊之按籍而攝逋者逋賦大集以數萬計輸之郡郡守大竒之謂令纔弱冠耳乃老吏不如邑中咸惴惴無敢以少年易公者矣公嘗督諸生就試江隂廵江使者某以其間行縣至邑陽怒不候已而隂有所覬公若為弗聞也者弗應也使者愈怒摭它事中公調魏令㑹邊警㳫至烽火徹郊關畿南震恐公計久逺調經費為城雙井鎭以備之未幾遷蒲守魏人擁車下不得發乃為更定牧馬法而去蒲劇州多宗室紛遝難治公治之甚容與暇嘗晉博士弟子俾執經問難為剖疑義士爭奮勵舉於鄉者視昔三倍之乙巳晉丞維揚攝守事揚當孔道繄公是頼而公尋以外艱歸服闋補松江遷南京户部員外郎郎中壬子丁内艱復補北駕部出為陜西僉事分廵隴右兼督學政在鎭五年武備文教種種毖飭邊圉無事陞河南右叅議分守河北壬戌擢浙江提學副使公念兩浙士風為海内嚆矢廣布條教以示左質右文之意士習翕然咸歸於正癸亥陞山西右叅政即自其省為按察使公既秉憲一以彊明裁之吏民見者語次尋繹皆得其隂伏凜然無所受私三晉號曰神君丙寅陞陜西右布政使秦中多豪强馳騖閭閻錮屯田之利令籍不得稽公乃以法按其豪大搜諸伏田得萬餘頃事聞受白金文綺之賜戊辰轉江西左布政使藩司總錢榖日入以巨萬計吏弊蝟集公為立抽名驗收之法額外無毫髪餘羨宿弊頓袪江右歲輸諸瓷器及它經費甚夥皆當出於民又吏縁為奸公私困耗公乃議令民畆出一錢以給諸務而諸絶簿書盜財物者率以輕重受刑遠近稱便焉辛未入覲闕下精覈下吏能否無所依違天官郎亟稱之曰諸方伯考覈言事鑿然有執不存兩可者獨馮伯也是歲諸方伯去位者過半公名益起縉紳大夫咸以公輔期之而公請老之志堅不可挽矣䟽上天子惜之特進光祿寺卿予致仕云既歸始搆室墾田習静逺囂為終老計而天不愸遺不踰年逝矣公天性孝友歴官所至皆奉太夫人以行即倥偬夜歸必徐候户外問寢食然後退其奔䘮也徒跣數千里外柴毁逾禮兄弟之間自相師友友愛備至教育諸孤無異所生以至宗戚閭黨緩急皆以時周之咸得其歡心交遊遍天下悉當世聞人相與考徳問業各取所長然性嚴重不可干以私仕宦三十餘年圗書詩巻外無長物無疆外之交束脩之饋督浙學時大學士袁公遣官致書謝而不發其介如此幼服庭訓用亷平為理所至吏民畏而愛之在魏有徳政碑在蒲在隴右咸有去思碑在江右則士大夫嘆服謂二百年所未見若小民又人人肖像於室飲食必祝矣公雖精于吏治而雅志如儒生生平嗜書無所不讀每政暇即手一巻不置博涉而深思閎積而約取發為文章温醇爾雅古詩取則建安近體在天寳大厯之間所著有風雅廣逸楚辭旁註選詩約註漢魏六朝詩紀文獻通考纂要唐音翼杜律删註馮光祿詩集若干巻行於世公祖諱振父即憲副公諱裕竝以公貴累贈通奉大夫陜西布政使司右布政使祖母李氏母伏氏竝累贈夫人配熊氏四川右布政使祐之孫累贈夫人先公卒繼魏氏肥鄉縣令升之孫累封夫人子三長子臨縣庠生娶李氏光祿卿用敬女次子䝉縣庠生早卒娶張氏凌川縣簿鑑女繼娶劉氏衡府引禮仲進女次子節府庠生娶劉氏庠生生儒女繼娶趙氏天祐女女二長適漢中府同知李尹耕之子一本次適衛輝府知府李用和之子延綬子臨熊出餘俱側出孫男二長珣臨出縣庠生娶張氏庠生燦女次瑋䝉出聘庠生周杜女孫女四長臨出適開封府知府宋伯華之子庠生繩武餘尚幼俱䝉出曾孫一銓曾孫女一俱珣出史登曰立功立言古今勝事志士杰人畢力而思趨者也然狥俗之士往往不顧才質之有限官無崇卑必蘄卓詭業無工拙必蘄表炫至強役其心以争兼能之勝􅀈􅀈然用力日勞所至日詘公少通仕籍循資累級數十年始長藩司而一旦棄去如脱屣結髮攻文詞凌厲作者而冲雅和平無一切瓌竒競勝之氣舉世所共艶羨者一不入其心故操之無所強而出之常有餘不求聲而名我隨不務勝而人我歸可謂有道者矣是宜銘銘曰祠于閭碑于衢是至徳之孚而寔公之麤風雅既瘉爰示之模是不朽之圗而寔公之餘生與道俱殁與化徂堯山之墟有阡而訏過之者趨曰明光祿大夫慶府右長史棘亭王公墓誌銘棘亭王公以慶府右長史致仕歸歸二年而卒卒三十年而公子大理左丞世揚以侍御馬公狀謁繼登請銘公墓道之石繼登梓里後學又與大理君同奉軒對誼不敢辭謹按狀志而銘之狀稱王氏之先本山右人其先世有諱貴者自山右徙居廣平之李排營村遂為廣平人貴生柔柔生玘玘生友友生臣臣攻文章有大志竟以諸生齎志而殁娶于張有二子次即公也諱允武字殿邦别號棘亭公生而敏恵才質過人長厲志讀其父書為文儁朗多奇氣既𨽻學官毎試輒冠其曹性嚴重不與羣曹伍即其曹亦帖然咸服之顧數試數不售晩乃以明經入太學嘉靖庚戌謁選銓曹除江西南康府通判南康地故瘠薄而俗善逋賦毎郡吏督賦者至黠者輒醵金錢前為夀一入其賄即噤不敢復有所問以故賦恒逋多者或至八年公㢘直不受私謁既視事前行金者徘徊門下不敢入公乃召諸逋者按緩急為期日而遣之諸黠凛凛以次輸賦無敢後期者部使者奇其能疏聞于朝為下璽書褒予之㑹守缺即以公攝守事時粤西狼兵入内地剿倭者所過横甚百姓患苦之以次當至南康郡人甚恐公乃預為檄檄其渠率曰以爾剿倭奈何乃自為倭今與爾約餽餉不時罪在有司餽餉時而爾横如故惟爾罪三尺法具在吾知用吾法耳率己前聞公名既得檄頗懼而戢其下公亦勑屬邑為具以待竟過南康無敢縱者郡瀕湖盜賊之所出没舊有遊徼船若干艘嵗時繕治郡任其費而主者任其勞守備某匿其費而責繕治于郡公持不可某恚甚譖公于巡撫都御史都御史怒公廢格為停公月俸公乃徐條故事暨所為侵匿狀上之都御史内媿公卒褒公治行為江右第一饒萬年令某以朘削機兵月糧為機兵所訟讞者受賕右令而重繩諸訟者衆兵怒遂㰱血以叛饒郡戒嚴時直指徐公方行部至饒倉卒無以為計適公以它務至徐公喜曰王别駕來事其濟乎即令公停它務而撫亂兵諸亂兵聞公來亦相戒無動王公治我吾屬當無患矣前讞者謁公為地公不應既繩諸亂首而令亦論如法衆心始安直指益奇公即以公署萬年事公更約束嚴稽覈省一切煩費鹽米瑣屑一取給于南康壯兵某訟其隊之長而所株連甚衆公心察其寃為争之御史竟反其成獄萬年民為歌以誦之詳見翰編浮梁金公所為去思碑中公治萬年凡六月以考績赴闕下民攀㽞不可得則相與圗公像尸祝之公既以最聞名益起復移公景徳鎮董陶事公愈孤立行一意自貢額外諸造為滛巧以賂遺權貴人者槩從禁絶嵗省工費數千百緍景徳人徳公如徳父母浮梁尉某以巡徼至鎮而縱其徼卒有所剽取于民民不勝忿鼓譟圍尉將甘心焉尉恐避匿公署中公為尉慰民民乃解散去庚申陞兩淮鹽運司副使公日講求利弊擇通商恵民便利國家者佐其長次第舉行之或有諷公為囊槖計者公峻詞以謝其人慙而退都御史鄢某以嚴相私人得總海内鹽政大以賂聞鹽政壊亂淮商黄某鳩金數萬將逆諸境上公㢘得其實亟置諸法淮揚鹽賦甲天下都御史視為外府比至無所得大恨公㑹公遷慶府右長史猶未釋恨嗾所厚善御史伺公隙無所得竟以老落公職致仕時年五十七耳公既歸杜門謝客布袍蔬食無異寒士又踰年壬戌秋七月三十日以疾卒距生𢎞治甲子十月二十三日得年五十有九初配都氏嘉靖某年隨公游太學卒于旅舍贈宜人繼趙氏能以勤儉佐公㢘者今封太宜人子男二長對揚娶胡氏都出次某即大理君娶某氏封孺人女一萬秀適醫官龎朴俱趙出孫男四三省三樂三槐三聘俱邑諸生孫女二人古人有言㢘吏可為也而不可為夫㢘者任氣多亢厲不能忍人難與共理其不然者又無能引當否至耗廢官事此安可為也公歴官所至常祿外毫不以自汚非賓客不御酒肉騶從敝陋不治郡人見前導不問而知為公也豈不㢘然無務凌人常有以自下者蔽人之過且調䕶之甚厚推其㢘平人不忍欺故能片詞而銷兵民之變此非可以口舌争也仕而俎豆于郡殁而俎豆于鄉有由然矣嗚呼若公者亷而可為者耶是宜銘銘曰亷于財或短于才公才恢恢以剸以裁如郤斯開亷于身或以矜人公則恂恂若芒若芚飲人以醇世競于貪貪以趨炎而公獨亷以㢘見嚴故終仕而淹淹公之位不能淹公之世是生哲嗣為時廉吏以繼公志摭公遺迹銘之貞石納于幽宅俾子孫承藉世其清白明資德大夫南京兵部尚書贈太子少保晉菴戴公暨配田夫人穆夫人合葬墓誌銘萬厯丙戌秋前資徳大夫南京兵部尚書晉菴戴公卒於家守臣以聞天子為悼惜詔太宰予贈宗伯予祭司空子𦵏于是贈太子少保祭二壇遣官營𦵏如令甲公子太僕丞紹科軰將以嵗戊子四月二十日藏塟事而以納言李公狀來徴誌若銘按狀公諱才字子需别號晉菴其先景州人五世祖曰榮者當文皇帝時以富民徙實滄州遂為滄州人榮生慶慶生宣宣生臣俱以公貴贈資政大夫都察院右都御史兼兵部右侍郎宣配馮臣配蕭俱夫人戴自徙居以來世孝弟力田為徳于閭而發祥于公公生而頴異沉静始就外傅即端重如成人年十二試于郡郡守姚江吳公大奇之曰此公輔器也聲籍籍起嘉靖癸卯舉于鄉明年甲辰成進士授行人巳酉擢户科給事中庚戌之秋京師戒嚴時事起倉卒軍需匱乏大司農請一切加諸道賦公抗言今畿輔山陜諸郡連嵗苦募兵市馬甚勞費矣而復議増馬江南諸郡每先期輸納料銀又豫輸機兵民快一嵗已皆目前權宜之計而復議増賦是竭澤而漁以重困吾民也部議竟格不行已巡視光祿糾覈伏蠧條為四事上之嵗省大官金錢十二壬子轉史科右癸丑轉本科左以内艱歸服闋補工科左尋陞兵科都公以倭夷猖獗閩廣用兵無虚嵗乃疏陳三事曰亟勦滅慎防守馭客兵言言中窽下所司行之公之在諫垣也毋務以鷹擊毛舉為名髙然數引當否恥趨和承意久之陞南京太僕寺少卿公亦無少望循行郡國精心牧政踰年以外艱歸服除陞都察院右僉都御史巡撫甘肅甘肅新用兵無見車騎即羸卒乗亭障者半菽不給公至撫其瘡痍而乳哺之首為請帑餉墾荒田興水利乃次苐簡兵將習擊技飭烽堠敵至輒遭創去而紅栁林鎗竿嶺之㨗甘鎮向未甞有也敵既數不利逺去則以其間建學明教振廢省刑種種具撫甘議中公撫甘五年斬首捕獲數十百人修築墩牆以千百計招徠降口若干奪獲羊馬器械無筭而公亦以積勞晉副都御史巡撫陜西五郡父老及諸畨夷卧轍攀留有謌者誦者感而泣下者肖像而尸祝者於戯此足以知公矣公甫至陜有秋防之役即移鎮原州儲芻粻守要害比及瓜期既撤防套敵兵忽入延綏殺總兵郭江執副總兵時鑾以去科臣列失事狀詞連公夫敵所出入定邊瓦楂諸路非公所轄地言者誤及公耳公不自明也詔公歸就覈明年隆慶丁夘公事大白仍以原官巡撫河南三月入為大理卿己巳陞刑部右侍郎尋轉左公再為法官持法平亭所定買休賣休諸律著為令庚午八月宣大總鎮臣以諜者言東西諸番當大舉入寇京師戒嚴莊皇帝飭大司馬修戰守具詔諸鎮整兵待援乃起前都御史帶川劉公守通州提督援兵而改公户部左侍郎兼都察院左僉都御史督理餉事公言敵情叵測徴發貴豫請令密雲諸處司計之臣悉心經畫益廣儲蓄俾應援兵馬在所闗支如取諸寄此與輦輜重而追勞軍者功相倍也既而敵偵我有備旋解散去然天子益心重公遂以其年冬陞都察院右都御史兼兵部右侍郎總督陜西三邊軍務公三涖陜益熟其地利弊某帥勇某吏賢亟露章薦之某帥貪殘若選懦不任事某吏墨亟劾罷之某費冗亟節之某餉宜増亟増之某屯田鹽法可以佐軍需者亟議之某路畨衆所窺伺亟檄鎮兵防禦之某城隍墩臺可修浚者亟以時繕治之而其大者曰永安堡堡在靖虜之北中衛之南曰裴家川者腴田可萬頃民苦乏不得田作公為相度地形築牆建堡疏于朝更今名且請以固原守備某督兵營田以苑馬寺少卿兼僉事某移靖虜整飭兵餉而秦隴之間屹然成巨鎮矣㑹俺酋欵闗乞貢市莊皇帝採議臣言報可而河套吉能者俺酋枝屬也援例以請下羣臣議公言東西各為雄長授職宜均通貢宜隨俺酋進入為便若互市則陜西重鎮既不可招之内地甘肅畨囘開市已久又不宜令強敵混入以滋禍階惟延寧二鎮頗為近邊然䦨出之禁甚嚴亦不宜因市啓釁互市第可行之宣大不可槩陜西也有㫖切責公公卒主延寧二市且疏改延綏市于紅山闇門之外復寧夏清水營舊厰以備不虞乞樁朋馬價以充市本列卒環市以攝衆心故逺人愛如冬日而畏如怒霆竟公在事無敢一譁于市者天子亦以酬功之典進公兵部尚書兼都察院右副都御史總督如故兩嵗中又陞俸者一白金文綺之錫六今上念公久勞邊事乃命以原官掌南京都察院事未抵任改南刑部又改兵部參賛機務公按江防緩急為飭兵卒部署方畧巡鹽御史某奏改浦子口五衛𨽻御史節制公言南畿各衛分列六營以藩籬根本統領則以内外守備巡視則以科道其來已久一旦改𨽻御史使堂堂六師下同郡伍非建制意也事遂寢葢公習掌故持大體伉厲守髙時方倚以為重而公以繼妣劉夫人之憂歸矣狀言方公争互市時或諷公第開四市如貴人指延賞可立竢公正色曰市之利害籌之熟矣狥下而謾上便身圗而不計國是有臣如此將焉用之謝絶其人去公既去鎮喜事者卒開甘肅之市令畨部交惡為國家生一邊隙葢十餘年而公之言竟成左劵云嗟夫天下有任事之臣有喜事之臣喜事者機圎志鋭見利而不見害故甞試暴施卒之利一而害百任事者老成持重審較利害每却顧重發故多利而少害若公者所謂任事者非耶公家居久督撫臺省交章而推轂公者六七公大都言公經濟長才不宜久棄林壑而公顧以老無意于世往嵗西人内訌主上厪西顧憂未始不念公言效而公逝矣惜哉公長身嶽立望者知為正人君子居常恂恂飲人以和至當大事決大議則天動星迴而公不可奪也性至孝居䘮柴毁過禮甘恬澹薄嗜慾仕宦四十年自奉甚約終其身無世俗聲色之好闔門養重無一語撓守牧權亦無尺一走長安道中輿論髙之先是太僕君念公老謀歸侍食飲公貽書止之曰勉修職業老人善飯無恙勿以為念一日坐齋中室無人忽布几焚香嘿有所禱俄呼四縑充犒左右驚入問故不答又某姓者夢羽旄鼓吹𨗳從甚都公乗肩輿出翌日遂卒易簀時惟言生無益縣官死勿請卹而已時萬厯丙戌九月二十五日也距生正徳甲戌十一月十有三日得年七十有三配田氏佐公起諸生供養姑舅得其歡心篝燈侍公夜讀比公貴身膺綸命而勤儉益甚獨好施内外姻族以及臧獲無弗戴徳者事具維揚陳公堯誌中先公三十五年卒卒于嘉靖壬子十二月初三日距生正徳甲戌年八月初一日得年三十有九累贈夫人繼穆氏凝重婉嬺事繼姑劉能先意承志撫太僕君如已出公馳驅王事而無内顧憂者亦以内徳茂也先公十四年卒卒于萬厯癸酉九月三十日距生嘉靖甲午年五月十六日得年四十累封夫人兩夫人之卒尚在淺土今將祔公于城東祖塋之次合𦵏焉官所營兆也子男二長即太僕君娶于常贈孺人繼張封孺人田出次紹庭娶于劉穆出女四田出者適生員張繼周吏部主事王顯仁側張出者適舉人張惟曜儒士馬惟斷孫男三世懋世愈科出世悳庭出孫女三俱科出銘曰古之大臣謀不先身動不狥人維社稷是計用康乂民葢嘉隆之際若戴公者庶古大臣之倫矯矯戴公質有其文爰自瑣垣暨于開府柔亦不茹剛亦不吐上帝曰咨維遠人弗靖蹂我疆圉女其予撫女式遏亂畧以保釐西土公八載于征蹇蹇匪躬四方來同及彼畨戎莫不率從帝用是大賚念茲戎功嗚呼生而顯庸殁而追崇匪私公以恵允徳克終公之好逑嫓徳儷美先公而歸以身蓐螘東城之原鬱鬱佳里以庇爾孫子百千萬紀明行人司行人贈承徳郎兵部主事芹泉馮公暨配蔣太安人墓誌銘芹泉馮公諱惟重字汝威貴州副使閭山公仲子也馮氏之先青州臨朐人洪武初有思忠者徙實遼左之廣寧閭山公既顯念生子當置齊魯禮義之鄉况家本齊也因携其五丈夫子復歸臨朐卜居郡城家焉公生而敏慧十嵗能文有雋譽方居遼時已為廣寧諸生既徙家即復為郡諸生郡諸生聞公名競走問業公人人為剖析疑義無弗滿意去者閭山公官留都公從而南講業青溪一時名公如許石城邢雉山輩與公遊者皆遜謝以為不及名益日起嘉靖甲午舉于鄉歸從家醼時廣寧苦兵閭山公顧念先人丘壠臨食而嗟謂諸子誰其展視者公請行間闗烽火中逾月始得達竟芟荆蔓築垣立石而還戊戌舉進士授行人㑹肅皇南狩簡命公往告湖湘湖湘暑濕盛夏癉熱公日夜馳驅風雨罷勞不少休至廬而病疽發于背同年張公董公來視疾謂公宜急歸就醫藥勿令卒有不可諱以憂子父母公毅然曰使臣不任及于踣頓廢天子成命死不償責懐首丘而虧死職之義滋貽吾父母憂耳疾且亟猶思經營役事遂卒于廬狀稱公豐頥修幹望之儼然雖整峻自持不失尺寸而真率洞夷不為崕㟁嶄嶻之行工詩善書才睥睨一世而意嘗有以自下者是皆不宜死胡遽死也公既死而蔣太安人以節顯蔣太安人者故清河令蔣公女也初蔣公讀公文奇之既見公矩歩便旋益大喜謂此真快壻遂以太安人歸公歸逾月而閭山公將南遷獨難太安人曰吾方謀歸故鄉獨奈何令新婦長去其鄉土太安人顧無難色急装為行于是歸計遂決公之行役也太安人留守官邸生今憲副君子履遣使馳報公未至而公卒矣太安人聞訃一慟而絶絶而復蘇蘇而顧視憲副公羸然襁褓也復大慟曰嗟乎死易耳如生者何又何以慰死者吾其為死者撫生者令死者復生生者不媿以明吾志耳乃勉就食飲携憲副以歸閭山公㢘吏家無餘貲而公之使也又一切饋遺謝不受比䘮還發槖中裝蕭然無有也太安人乃斥簪珥藏𦵏事至自操作以給饘粥日撫憲副君而泣稍長遣就外傅歸則躬秉機杼伴夜讀一燈熒熒母子形影相吊也憲副君成進士太安人喜且泣諭之曰若大父若父以清節顯吾與若幾不能自存而卒再世官者若大父若父所遺也若毋以宦時忘吾與若幾不能自存時則毋忘若大父若父所為矣憲副君泣受教故自令方城入為職方出備兵雲中兢兢以㢘平為理則太安人之教云太安人性簡重自少無所紛華既稱未亡人服食益自貶損與家人語未始不稱先君而繼以泣也憲副君既上書闕下言母守節狀詔旌其門衆方賀有令名太安人獨泣曰夫子不幸吾忍而就此吾獨何心忍以夫子之不幸為吾名乎憲副君為職方得贈父如其官太宜人如今封製法服以進太安人服之望闕謝輒却不再御及孫琦官太史以使過里中從憲副君拜堂下起率孫曽前為夀太安人喜為一舉觴已而慘然不懌曰惜哉不使若父見也言與泣俱葢黄鵠之悲四十年如一日焉公生于𢎞治十七年正月七日卒于嘉靖十八年十月二十八日享年三十有六太安人生于𢎞治十六年十二月二十八日卒于萬厯十年十月五日享年八十有一父即閭山公裕祖振竝以公弟惟訥貴贈布政使妣皆為夫人子即今整飭易州兵備山西按察司副使子履娶宋氏封恭人女二一適石太守繼芳一適石茂才茂元孫二長琦右春坊右諭徳兼翰林院侍講娶姜氏封孺人次珂聘李氏孫女三許聘張元豸遲一梧蔣𢎞𦙍曽孫女一俱幼憲副君以太安人卒之明年正月二十二日啓公兆合𦵏而以太守宋公狀來乞銘予謂方公盛時兄弟四人俱以文章科第擅名海内公獨未究其用以死死數十年而公子憲副君以才名為衆所推轂行將秉鉞建旄議功名于世而公孫太史氏方且執經㫋厦負鼎鉉之望此公諸兄弟所未有也或言太安人有餘于年故能辛苦立門户長子孫葢天之報太安人如此嗚呼太安人之餘于年正天之報公所不足于年者也是為銘銘曰謂天有知乎公乃死謂天無知乎太安人乃不死公其死矣太安人可以無死太安人不死公可以死嗚呼公有子子復有子昌公之緒百千萬祀公乎太安人死而不死明奉政大夫寧國府同知中里崔公墓誌銘中里崔公諱良貴字徳卿安平人也安平故博陵地博陵崔氏有聲于徃代明興居邑西黄城里者謂之黄城崔氏八世祖有文明者生岡為岢嵐學正岡生徴徴生翺翺生輔輔生儒儒生仲誠號河濱即公父也崔自學正以來世有隠徳為鄉里所推重邑大夫或賓之學宫以至于公生而頴秀少從其伯父學即能厲志誦讀伯父喜曰此吾家千里駒也年十四補邑諸生學博李君奇之念其貧數却其餽遺且以嵗時資給焉邑令王公有所善閩人吳生者以博學著稱來省令令為立校舍俾正講席選諸生髙等通經術者受業其中公與焉學日益進每試輒冠其曹而數困于有司乃奮發曰夫士也安有不博極載籍而能取髙第者乎于是下帷專精經學旁及子史百家以至禆官星厯無所不闚嘉靖甲子舉于鄉再試春官不第時公大父母父母並春秋髙而公又貧至不能具甘㫖因嘆曰俟河之清人夀幾何乃投牒銓曹得永夀諭永夀山邑俗薄于藝文先博士率倚席不談朋徒媮怠公至為聚徒衆陳敦學之宜諸抱墳䇿來就業者彬彬始盛既而視篆武功適有修城之役公為量功命日平板榦程土物越月城成不愆于素又為定婚姻之禮曠然一變其俗適督學曾公過武功課諸生談説經義無稱者公從旁代説甚悉曾喜曰説書不當如是耶因命公主正學書院公益以奬進人材為志日次其程品而劘其徳業曾公雅重公時倚公以校文之役所成全為多故一時麗正學者咸争自祓濯號稱多才嵗庚午公分校留都士所甄錄又獨多才公名益起遂以其年冬陞國子助教尋以病請告歸既還職值今上臨雍受金衣之賜公在太學數年能以精勤舉職丁丑陞户部四川司主事監督草塲草塲嵗報納數多商人擅為弊藪往往結猾胥與共為奸主者或不及知即知又格于中貴人為地不能問公視事首汰胥役骫法者塞諸弊竇干請者懐刺不敢入諸商凛凛無得虚入以牟利由是怨聲嘵嘵至為飛語以恐喝公公曰吾求不溺吾職安得復卹吾私乎比終事行一意如故司農卿以公㢘難干以私推擇公𣙜清源闗税公既行怨者恨公不置嗾其鄉人某給事疏公前督草場時受賄有跡有詔覈實以聞覈者言崔某實以嚴賈怨給事所指無事實然猶調公外任得衛輝通判主督賦公益自奮約已奉公舊所稱常例咸謝絶之文諸邑田一禀於至公大搜伏匿郡人懾服署輝縣事值嵗旱公精心祈禱為民請命澍雨輒應人以為至誠所致又二載陞寧國府同知㑹守缺以公攝守事一切公費悉為條記毫不入私槖癸未入計旌下吏能否酌去留錙銖不爽大吏某以私忿將甘心某令公持不可竟賴以全其介如此隣郡有大俠某前後二千石不能制操江吕都御史檄公治之立伏其辜公雖輔法而行然折獄平恕時稱無枉部使者以為能諸司理所讞有不當者即改屬公公一一湔滌之無所顧于時大江以南稱賢郡丞者首推公而共事者皆目攝之矣乙酉秋公入賀萬夀聖節又滿一考當報政㑹病留滯都門前攝公者于丙戌計吏時摭它事中公主爵吏素知公賢止鐫公二秩而公遂拂衣歸無意于世矣方公之病也予省公旅舍公言予病如斯惟有去耳予謂公心事磊落敡歴已久衆方信嚮公何遽圗歸計公曰如命何葢公精于命數者未幾卒如公言則人之成敗利鈍豈不有命哉公生于嘉靖丁酉八月十二日卒于萬厯庚寅某月某日享年五十有四父河濱翁仲誠以公貴加封承徳郎户部四川清吏司主事母王氏封太安人配王氏封安人子二長敏増廣生娶庠生王嘉臣女次敬附學生娶庠生彭居安女孫男三廣旭廣昕廣旦俱敏出孫女三二敏出一敬出公天性孝友禄入雖薄常傾囊以周其昆季自奉則食無重味室無侍姬既歸日伏在牀褥猶時課二子于學或召所善故人與對飲為歌詩相娛樂自少至老手不釋巻所著有仕餘稿中里遺草方公之家食也教授里中四方士從之遊後多去為達官狀公者太常王公亦其一也公二子將以公卒之明年某月某日𦵏公子某處而以公治命請銘于予予與公同舉于鄉知公頗詳謹按狀志之而系以銘銘曰處己若愚抱璞以居處世若迂擇地以趨家不必腴而志不逾仕不必膴而行不汚是之謂君子儒而異于世之夸毗者歟明贈中憲大夫大理寺右少卿青崗傅公墓誌銘萬厯癸巳春少司宼仁泉傅公以其先大夫中憲公狀請予志而銘之葢中憲公生二十有五年而殁殁之日猶處士也殁後數十年始以司寇公貴累贈中憲大夫大理寺右少卿故稱中憲公云司寇為侍御時督畿輔學政適當路者欲汰海内士如永嘉故事令嚴甚而公不為動試士如故繇是郡國督學使者咸以公為式即有一二媚子欲奉意㫖希寵榮者亦羞縮而不敢肆予心壯之乃今有命何敢辭按狀傅氏之先當唐季世有樞者為臨江教授始卜居清江之石頭七傳而生雱宋政和八年進士以工部侍郎充和金通問使授朝奉郎尚書考功貟外郎又五傳而生棻建炎間為髙安丞遂占籍易俗鄉之珠湖世多文學之士載在郡乘又十三傳而生偉洪偉洪生孔川孔川生崇聖崇聖生成號青崗翁娶於漆而生公公諱舜字汝華别號紹崗公幼而聰頴其族伯郡丞公嘗試以對句即應聲作對語語輒驚人郡丞公大奇之比就塾師受章句即奮志佔畢至夜分不寐父母以公賦質孱弱每憐而誡之不欲竟其業㑹漆孺人善病病則日夕侍湯藥奉起居必安而後己緣是輟業又縣有繇次及青崗公公聞之曰吾即少幸識握筭奈何當吾身而勤吾父吾奚賴焉即挺身代往轉輸吳城時族叔敖朋役以疾歸公兼理其事既竣役解槖中羨金分之無私藏焉其質行如此從伯質早卒三子幼不任管鑰以付其僕僕有黠者匿其籍而盜鬻其田田鬻而稅存公㢘得其狀發其奸僕乃懾服公復校其産而籍錄之諸僕遂縮趾不敢肆三孤成立公之力也公内行修飭事諸父昆弟恭謹孝友情意篤摯而少年負奇不難以其身為人解紛排難舅氏漆翁其人長者為宗人所陵搆公曰我在而人皆藉吾舅可視其魚肉之乎即往居間衆素知公曲聴其請事乃釋聞族人里人有空乏者輒請於中憲公各以緩急周䘏之有貸子錢者量力所能辦假予之未甞以無為解諸所假予者又薄其息而緩其入以是人皆嚮之司寇公言生也晚不幸不睹公之行事其得於傳述者僅僅若此意若重自傷者嗟乎睹一斑而知豹即前所云為徳于閭者足以知公矣公卧病三月不起乃執劉㳟人手以兩尊人弱子為託而卒時嘉靖巳丑秋八月也生在𢎞治乙丑四月十八日配劉旌表節婦以司寇公貴累封太恭人自有誌子一即司寇公萬厯乙丑進士歴官刑部右侍郎娶廖處士啓熈女封孺人贈恭人繼娶胡通判汝融女封恭人女一貞仲適來蘇劉孟仲栢舟之操不愧其母孫男四鉉縣學生娶庠生吳一性女釗縣學生娶呉汝振女繼娶胡顯楚女鈳娶文通判似韓女釴國子生娶劉廷用女繼娶呉知府一惺女故大宗伯文端公孫也孫女三菊貞適敖訓導鏜子庠生淺常貞適王僉憲許之子庠生淑俱廖出金貞字陳侍御邦科子某胡出曽孫慶鉉子甘鈳子聘陳主事良材女曽孫女潔貞史氏曰書載傳巖之叟為時霖雨有功于生民甚大珠湖之傅豈其苖裔耶何千餘年而代有聞人也以中憲公之賢假令資適逢世當必有表見者即渉世不長而跡其行誼亦可以長世矣太恭人撫五月孤竟底成立又能誦其先人之義以訓誨之俾守遺範著功名于當代積徳于六十年之前而食報於六十年之後若左劵然修之于鄉其徳乃長人可不務修徳哉萬歴巳丑九月卜𦵏公於烟霞祖塋先是太恭人之卒司宼公為疏請于朝得並予祭至是司寇公請告歸始欲備闡幽之典乃始為志而銘之銘曰人亦有言唯義盡齒斯言而信公胡以夭死人亦有言唯徳及世斯言不信公乃昌其嗣嗚呼齒所寄也嗣所庇也盡其齒弗及其世毋寧嗣也公之嗣人為時名臣寵命三申賁公之窀是不死者存而何必于其身明奉政大夫南京刑部郎中豐溪閔君墓誌銘葢正嘉間吾郡以仕宦顯於時者任原閔氏為最著自予通籍己不及見閔氏之顯者獨于稠人中識豐溪君君儀貌閒雅進退不失尺寸前問之知為水東先生子也心竊自念古稱世祿之家鮮克由禮不盡然哉既而君移官留都又移疾家居荏苒數載而君以訃聞矣異哉予雖不深知君然以所睹君之外豈遽若是已哉又越嵗君之子鑑介同年友張選部以狀來請銘按狀閔氏之先上海人由上海徙家任丘自宗禮始宗禮生彞彝生琦琦生定定生槐楷楷官南京禮部尚書琦定皆贈尚書琦配王定配卞皆贈太夫人槐舉𢎞治乙丑進士官按察副使以子煦貴贈通議大夫兵部侍郎配顔氏封太淑人煦即水東先生君之父也累官資政大夫刑部尚書配李夫人以嘉靖壬寅五月十四日生君諱陞字思充别號豐溪君生而朗慧始就外傅即勤于誦習衆咸以大器期之㑹水東先生巡撫山西時有斬首捕虜功詔進一階予世賞即以君受廕時君年十有四耳君雖就廕而誦習不輟博覽載籍尤工書法為時所重隆慶辛未除後軍都督府都事五府惟後府號為煩劇君名家子習今昔之故凡一切門衛之闗防符驗之稽發文移之考覈若其所素習者日以精力佐其長事無停閣壬申督餉于邊便省其兩尊人萬歴甲戌晉右軍都督府經歴聞其母李夫人病即以病自免歸日侍食飲嘗湯藥踰年夫人卒哀毁骨立䘮𦵏如禮既禫除當赴闕念水東先生春秋髙依依不忍離子舍乃疏請終養陪杖屨晨昏温清者又三年而水東先生卒方先生之疾也君毎夜祈天願以身代比卒哀毁如䘮李夫人時人服其孝壬午服闋復除後軍都督府葢君先佐後府有聲故主爵者以幕篆畀之君益為釐奸剔蠧積弊一清君雖一意効職然念其先大夫尚藁𦵏乃從闕下上書以請上嘉其有邊功予䘏典如制于是君乞恩歸啓李夫人之兆合𦵏焉丙戌正月晉宗人府經歴四月晉南京刑部廣東司員外郎明年丁亥晉四川司郎中南中諸曹多稱閒局獨爽鳩之屬主讞獄或時治爰書君所受讞咸輔法而行不任已喜怒為重輕不狥人愛憎為出入一時稱明允焉南土卑濕入夏癉熱君北人久居為所中遂以疾乞休庚寅春疾復作忽召鑑等語之曰吾生平無以踰人但謙慎㢘勤不忝先人耳若軰勉之毋堕家聲也諸子異其言然謂君方壯年又素健可期勿藥而君竟不起矣是年七月廿八日也距生得年四十有九娶謝氏都御史淮女贈孺人先卒繼李氏叅政玳女封孺人子男五銓官生娶馮氏知縣治孫女早卒鑑廪生娶屈氏都給事中伸孫女繼王氏監生良翰女欽娶韓氏同知塏女俱謝孺人出銑聘田氏叅政樂女李孺人出鑾側室李氏出女三長適通判胡思恭子庠生守寅次適舉人于登龍子知章俱謝孺人出次字前兵部尚書郭公乾孫茂然李孺人出孫男二洛濟俱銓出狀稱君恬淡寡嗜欲自少不親聲妓與人讌飲未嘗及于沉酣于族人之貧者能以緩急周之有紛輒為之解故其卒也逺近親踈無不悼惜嗟夫以君之才行豈不能自致青雲而所得乃僅僅若此如天道何然鑑也多才而諸子競爽則天之報君者尚未艾也鑑等將以壬辰二月某日𦵏君于勑建祖塋之次予為志其大而系以銘曰祿以世乎君乃仕仕浮于祿乎視君履位弗當才胡以止夀弗配徳胡以死公侯之後復其始不于君乎于君子茂才槐徵王生墓誌銘王生卒其父鶴程君走書於予圗所為不朽生者嗟乎嗟乎予方冀待生以不朽而生乃待予以不朽哉悲哉葢毎想像生生平而泪淫淫交睫筆閣而不得下也悲哉悲哉造物者何以生生又何以死生哉生之先為饒陽著姓奕世載徳以至於今其先有名讓者得遺金於路擕以適市大呼里巷中卒得其人歸之人服其義祖文學舉嘉靖庚子鄉薦令延津清介方嚴有恵政延人俎豆於學宫官行太僕丞父即鶴程君命嘉靖甲子與予同舉於鄉者剛毅有其父風生幼時祖太僕公竒之曰此子神情雅亮當是後來之儁因名曰亮芳字以槐徵葢取王氏槐堂之意也萬厯戊寅鶴程為生求婚於予予許以次女字之時生纔八齡耳嵗丙戌予女歸生生亦時時過予舍擇言而發擇地而蹈粹衷雅致有先民之矩焉久而察之即造次未見其有疾言遽色者予心異之戊子試有司為博士弟子庚寅鶴程遣生來受學於貞復楊先生由是恒止予宦舍毎自楊先生所來輙充然若有得者日坐斗室中手一編伊吾不輟予嘗謂生流水不腐户樞不朽久坐久視皆能傷人非所以疏鬯形神而導引和氣也生頷之然亦飽食後散步中庭而止其沉静如此生家饒裕而自奉甚簡澹食無兼味衣不重帛一切聲色不入其心質任自然無所矯飾性至孝母李卧病閲嵗生日侍起居奉湯藥寒暑無倦容比卒朝夕哭奠號踊數絶寒猶寢苫嘔血不已思慕之極至黙禱於母期以夢寐相見而自屏於静室以俟聞者悲傷其志焉生資性聰敏為文多奇氣而居嘗恂恂意有以自下者接人以禮遇臧獲有恩即宗人至桀傲者亦望之而内愧折服也語曰天道與善人以生行事所謂善人非耶乃素彊無疾一疾而逝遂不可捄藥所舉三子相繼而夭今所存者兩弱女耳嗟乎既促其生又絶其世天之報施何如哉痛哉痛哉生生於隆慶辛未五月十有五日卒於萬歴壬辰十月六日得年二十有一耳卒之日識與不識無弗流涕即村婦羽流亦且有憑棺而哭者嗚呼此可以知生矣鶴程將以癸巳嵗三月十五日𦵏生於祖塋之次因誌其槩而系以銘銘曰謂仁不匱而祖良吏謂才必試而生國器豈造物兮忌完胡大命之奄至吁嗟乎倐來若寄倐去若棄閴閴重泉千秋永閟俾也不亡太史之誌潼川守橋南胡公暨配周宜人墓誌銘潼川守橋南胡公以嘉靖戊午卒于官後十年隆慶丁夘而公子應辰舉于鄉至十五年萬厯壬申始卜地于馮家岡蕆葬事明年癸未應辰舉進士官户部主事滿考贈公為奉直大夫配周為宜人既而應辰由户部晉四川按察司副使乃手叅伯吳公明卿狀請志公暨宜人墓而銘之憲副君予禮闈所舉士也誼不得辭按狀公諱希瑗字子翼别號橋南其先世有烈者仕元為襄陽守占籍通城之白馬鄉後由通城徙居大冶自夀二始夀二生道貴道貴生守高守高生文瓉文瓉生玉堂玉堂生逺是為公父東泉公胡氏世隠于農自東泉公始業儒以儒名娶于孫而生公公生而羙丰儀頴異秀發比就塾師日記常數百言邑有宜山令周公者見而竒之許字以女即周宜人也周公有人倫鑒公以此喜自負益肆力于學為文有竒氣補邑諸生每試輒冠其曹名大起嘉靖丁酉舉于鄉明年試南宫不第去游太學諸海内名士交驩公者咸自引以為弗及即公自視亦不出諸名士下也歸而愈自奮周宜人復從㬰之乃深入白雉山中携其弟常州公希寅與宜人弟憲副公大烈以經術相授受無間寒暑比兩公先後得雋而公猶不第壬子當計偕東泉公語之曰若第也不至今日至今日不第命也若不能俟若命又安能俟吾年乎公跪受教明年癸丑復不第乃投牒銓曹授四川巴州知州公為具冠服謀奉兩尊人就養宦舍比歸而東泉公已先逝矣公大慟曰兒所以隠忍徼一命者謂何而翁弗逮也號而絶絶而甦哀毁骨立人服其孝服闋補四川潼川州潼川地衝而土磽民貧甚苦供應公曰吾安能瘠吾民以稱過使客也厨傳廪餼一從節縮民甚便之俗故善訟吏縁爰書為奸利公列兩造于庭片語輒得其隠情是非立決吏抱牘受成事無能上下其手黠民懐訟牒徘徊公門不敢入訟為之清州有鹽井鹽有税課富者擅其井而匿其課貧者井已前廢無所得課課嵗以逋公里設一長俾按里而稽井按井而賦課逋課乃集時重建三殿采木使者期㑹甚嚴有謀伐孔廟前數百年大木以應令者公持不可擇胥吏有幹局者董其役廟木不毁而所得材木較比邑獨先御史某者罷家居勢張甚諸豪奴怙勢凌轢其鄉撓守牧權公察其尤黠者䋲以法無所假借諸奴遂戢公在潼川踰嵗其善政不可殫述其槩如此兩臺使者交薦其賢期大用而公病病三月而卒卒之日州人為罷市巷哭涕泣送輿襯還此足以知公矣周本宦族宜人祖父皆仕宦于時其歸公也資送頗饒宜人顧淡泊無所紛華若素居約然者性柔恵處諸姒間下逮臧獲無尊卑少長各得其宜公上春官遊成均讀書山中宜人潔醴精饌以奉其兩尊人能順適其意如公之在側也即公亦謂吾有婦在猶吾在兩尊人側也其一意本業不以家累分其念則宜人之力多矣宜人既以身任子婦之事又諸所舉子女皆躬親乳哺之勞積瘁成疴遂疾作乃謀為公置副室公不許第廣延醫藥竟不起先公三年卒公生于正徳癸酉卒嘉靖戊午得年四十有六宜人生正徳丙子卒嘉靖乙夘得年四十子男五人賓廪生娶尹氏曹氏繼汪氏廪早卒定娶許氏宸即憲副君今更名應辰娶袁氏封安人寀廪生娶黄氏女四一適尹榛餘殤孫男四允淳定出允忠允慤寀出同祖應辰出孫女十人向露劉子楨吳正經尹士翹向日鳴蕭世聘李勝薦其婿也餘尚幼銘曰學也而時不能待祿也而親不能待仕也而身不能待噫嘻胡公其真不能待耶抑將有所待耶有子而昌先徳用光三十年後雙玉偕藏噫嘻此公之所為有待者耶南京刑部尚書行菴陳公誌銘大司寇陳公諱其學字某别號行菴登州蓬萊人也陳之先為寧國宣城人其五世祖靖獻公迪當建文時為太子少保禮部尚書靖難兵起抗節不屈與其配管夫人并六子七孫同日死幼子珠生甫五月乳母芮潜置溝中得免至八嵗為怨家所訐文皇帝特宥其死詔戍撫寧尋徙登州遂為登州人又三傳而生鼎即公父大竹公也登𢎞治乙丑進士為給事中以疏劾權璫繫詔獄嘉靖初用言官起家累官應天府尹㢘介剛正所至有聲稱以公貴贈都御史母某氏贈夫人公生有異質博聞強記為文切理一剷浮靡之習嘉靖某年舉于鄉甲辰成進士授行人諸士或廣交修名公獨沉静自守閉門不事趨謁太宰許公松臯嘗語人此君悻直大有乃父風節丁未選湖廣道監察御史糾彈不避權貴緹帥陸炳倚勢作威縱諸校乗塗繹騷道路以目至自立錢法禁民間錢不得行民為罷市又使其私人徐某結京山侯元專擅鹽利以撓鹺政人無敢言者公數其罪亟攻之有詔下徐某獄而責炳元各對狀事雖得釋而權奸凛然敬憚之戊申巡按兩淮鹽法兩淮鹽利甲天下弊竇百出公㢘得其窽要為四事上之悉報可公在維揚職以内無言不行職以外無事不言如請增通泰之堰清過淮之税减餘鹽之價值禁江滁之私販種種皆一時實政而總兵李某縱容羣盜則有疏奉御王某騷擾驛逓則有疏于吕梁二洪夫則疏其額設之濫于河漕二大臣則疏其遷轉之非詔皆允之庚戌陞陜西按察司僉事鎮慶陽復陞榆林叅議敵人憚公威名歛不敢縱公亦嚴為之備五載秋防邊境無事而所繕修邊堡兩鎮賴之某年陞兵備肅州副使時哈密諸夷倡亂公躬擐甲胄出嘉峪闗三百里直抵燉煌防其猖獗邊闗恃以無虞陞本省叅政守花馬池秋防者三無飲馬之寇其為敵所懾服若此尋陞山西按察使晉左僉都御史巡撫大同是年適諳達烏紳入犯左衛公督將軍劉漢等親冐矢石并授方畧斬首捕獲甚多遂遁去癸亥陞右副都御史巡撫陜西適北兵入中部洛川等處公督叅將孟鸞大敗之斬首百餘人先是韓藩初建嵗祿纔六萬而宗室日繁漸増至十二萬嵗額不及其半積逋至六十萬至是奉國將軍融燸等百四十人至㑹城大譟公不為動徐檄藩司借帑金四萬七千分給之又疏請留贓罰鹽鈔年例課税諸銀以賑其急并列其狀得㫖悉如公議而廢融燸為庶人既而融燸不受詔逐逮者且執平凉知府祈天叙毆之百姓恇擾競言諸王子反卒之不動聲色戢亂而正法者公之力也某年以本官總督南京糧儲公條上三事皆切漕務至請本折兼收民尤以為便尋陞户部右侍郎兵部左侍郎總督陜西軍務以考績陞右都御史兼兵部左侍郎總督如故敵兵大舉入花馬池等處號二十萬公提兵禦之斬獲三百七十餘人㑹别部偏將有亡失士馬者詞連公公歸待勘事既白即以原官總督宣大諸軍務適丘富等入犯宏賜堡公督趙總兵迎戰敗之斬首一百七十有八議者以公久歴封疆乃詔理京營戎政復陞南京刑部尚書以積勞三上疏乞罷政上憫其勞特予致仕公自藩臬至制府身不離塞垣先後擒獲至九百有竒招䧏二千三百餘人奪獲馬牛器械甚衆修完墩臺凡二千四百餘座繕修濠牆凡八十四里又五萬四千餘丈修築營舍凡六千餘間加一品俸廕子姪各一人賜金幣者九聲聞敵國名在海隅而退歸田里絶口不言兵事門巷蕭然課耕課讀之外無一切聲色之奉若初未嘗顯貴者耕入有餘則倡族人剏大忠祠以祀靖獻京兆兩公其又餘則市學田以周士清風篤行望廬者式焉兩臺使者薦剡無虚嵗天子嘉之予月米特賜詔存問萬厯二十一年正月十日以疾終于正寢距其生某年得年八十有竒配王氏封夫人先公卒子一人登庚午舉人真定府棗強縣知縣娶梁氏封孺人孫男九夢琛官生娶王氏夢瑋庠生娶郭氏夢璁夢珍夢琦夢璡夢瓏夢璟夢珩咸業儒孫女四諸所嫁娶皆名家先王夫人之卒也已詔司空營𦵏公訃聞天子悼惜俞宗伯請命合𦵏致祭如例仍贈謚恭靖哀榮之典終始有加焉人豋將以某年月日開王夫人之壙庀䘮事而手公行狀俾予志之予與公素昧生平而髙山在前久切仰止敬廣詢故老博採故實志其大者如此而系之以銘銘曰矯矯靖獻壯節凌虚一死自誓百口為屠天遺其𦙍帝憫其孤再遷海上以備執殳公侯之後必復其初亦越三世陳宗以訏直哉京兆舍命不渝司寇繼之益𢎞令圗猗歟司寇蹈道而趨守高似拙直已若迂峩峩冠豸觸彼城狐風生白簡勇伏青蒲于藩于臬載馳載驅望髙分陜功著防胡獲醜執訊玁狁于除一月三捷王愾用紓崇墉言言邊陲宴如公不言勞歛而若無維帝念功晉理戎樞爰正八座于彼留都人期秉軸公志懸車東山歸卧奚以自娛朝耕暮讀左圗右書醇源既竭維醨則酺疇哉邊臣身不處腴疇其若公家無贏餘疇哉世宦衆不苦漁誰其若公為徳于閭先民矩矱後世楷模哲人其萎天子悼吁易名營兆皇恩載敷寂寂𤣥堂妥公之軀史氏有銘用比鐘鐻以闡豐功以敦薄夫葉夢林暨配常合𦵏誌銘嘉靖之初徳郡洞菴葉先生以進士為名諫議而吾邑中水常先生亦以進士為侍御史兩先生舉同籍仕同朝相得至驩也諫議有子夢林公者今陽城令敬愿父也生而頴異年十四即補博士弟子有聲稱諫議最憐愛之而是時侍御長女亦以婉嬺貞静為戚黨所重諌議為夢林公委禽焉是為常孺人公固名家子乎而雅自歛飭躬素士之業聞常富於財心不謂善比孺人歸服御簡淡無所紛華始喜曰此真吾婦也公性沉重居室無惰容與常孺人相敬如賓事諫議及母張備極孝養遇疾病相與調湯餌浣厠牏或共禱於天祈以身代以是危疾輒安比先後殁執䘮哀戚甚悼歛𦵏如禮人服其孝公一兄四庶弟兄殁遺兩孤姪事寡嫂謹撫二孤如所生各隨其質而成立之與諸弟極友愛每以嵗時相聚㑹飲食笑語懽洽彌日名其㑹曰天倫而孺人為具醪糒豐儉適宜且處諸娌姒間人人得其懽心無後言公處已莊而遇人恭謹意常有以自下者故與物無忤即下至臧獲不加譙呵曰彼亦人子也公既久躓有司而陽城令兄弟試輒利公進而語之曰夫立身行道揚名以顯父母孝之大也吾葉自上世以功名顯至予而中衰命也夫孺子勉之是當續若祖矣乃謝去舉子業鑰鍵綱紀之司一委諸常孺人兀坐一室發古今載籍讀之遇格言懿訓即書揭於壁久之壁皆滿而常孺人亦樂聞古孝婦貞女之行以自淑及陽城令舉進士公喜曰是竟予志已晚年冲夷閒曠慕陶靖節之為人其所作夢林漫稿亦畧似之陽城令奉庭訓治邑多恵愛㡬滿一考行且有恩命逮公而公不逮矣疾且革執孺人手若永訣者孺人先抱㣲恙公既卒哀痛特甚越三日亦卒公生於嘉靖三年五月二十日卒於萬厯二十三年十二月十六日孺人生於嘉靖三年六月十五日卒於萬厯二十三年十二月二十日享年俱七十有二子敬愿即陽城令萬厯壬辰進士娶曽氏陜西苑馬寺少卿鑑女繼石氏黄州知事岱女程氏江西右布政使珤女堵氏處士一松女敬思廩生娶王氏武安簿宷女女三一適庠生張近思一適趙守基一適鴻臚序班丁庚薦孫女五敬愿生者一許聘庠生趙見熊敬思生者四長適庠生李之盛次適瞿𦙍榮其二尚幼敬愿軰將以萬厯二十五年某月某日合𦵏公夫婦於州南祖塋之次而以方伯静泉程公狀來請銘程公舉嘉靖壬辰進士耆年碩徳海内無兩所言當不妄予謹按狀誌其畧而繫之以銘曰父為大諫青瑣趨于繇髙第宰名都維公齠年讀父書居豐履約恬以愉内行謹備稱醇儒亦有淑配名家姝如賓之敬老不渝生也同室死同徂𤣥堂鬱鬱風氣殊雙玉偕藏妥其居我銘於石詞匪䛕昭徳闡幽為世模嘉議大夫巡撫山西都察院右副都御史臨江李公墓誌銘大中丞臨江李公卒之明年其子重光軰以公弟西江公所為狀詣予言先大夫仕宦㡬三十年其治行在人耳目卒以微文詿吏議至不得徼䘏死之典為地下光榮惟先生誌而銘之先大夫死且不朽予辱交公兄弟不敢辭公諱采菲字君采别號臨江其先江西新喻人永樂中有戍瀋陽中屯衛者遂家於河間髙祖榮榮生瓊瓊生平定知州銳瓊鋭俱以公伯父叅戎公貴贈昭勇將軍都指揮僉事瓊配張鋭配髙董俱淑人鋭兩子長即叅戎公某次涵即公父也公生而警敏十嵗能屬文總角為弟子員明年廪於庠嘉靖辛酉舉鄉試第八人與其祖鋭先後辛酉同名第又同人咸異之乙丑成進士授行人丙寅冊封徳藩隆慶丁夘齎莊皇帝即位詔於留都江右及廣之東西戊辰今上為太子復齎詔於畿之南山之西車轍㡬半天下于餽遺無所受事竣丁内艱庚午服闋選四川道監察御史辛未清戎闗中萬厯甲戌巡按西域所至俱以風裁稱而在粤尤表節義興學校不獨用威嚴也丁丑掌河南道大計外吏汰斥惟精既乃陞陜西副使分巡河西河西地隣敵公所為安邊固圉計者甚備戊寅陞山西行太僕寺卿兼整飭寧武兵備踰年以外艱歸公之行也兩地人皆遮道泣留其得人如此壬午起甘肅行太僕寺卿未㡬陞山西布政司叅政分守冀南道越四日改冀北時款議久疆事刓敝公為積芻餉簡卒乗常若有意外緩急之虞者從容愉愉邊境無事屢荷金幣之賜乙酉以積勞陞按察使視事如故丙戌陞本省右布政使戊子晉左布政使巳丑以考最得贈其祖父如其官祖妣妣皆夫人即以其年陞都察院右副都御史巡撫山西公在晉久於閭閻疾苦長吏賢不肖邊闗隘塞夷情向背如燭照數計故諸所措注無弗當機宜協輿情者先是礦徒張守清聚衆豪里中公恐其久而獷悍也編其衆而什伍之㑹大璫祀五臺者有所要求於張意弗􅀢歸為上言守清作奸狀上間以語輔臣聞者因劾公縱冦殃民詔公歸公歸而代者捕守清于獄訐之無事實竟死獄中又二年行邊者復言公撫晉時曽以公帑充私遺坐是落公職夫撫臣握兵柄力可以制强敵顧難一礦徒哉第撫臣以撫為職者也業已撫之而復殱之此喜事之臣公不為也至於以境外之交束修之饋為公罪則其罪益薄矣葢事有所不可已而罪有所欲加勢有所必至而謗無所與分公亦安之而已公家居日惟教耕教讀一觴一詠以自適若初未嘗顯仕者又數載而卒是乙未八月二十四日也距生嘉靖癸未三月二十八日得年六十有三配趙氏累封夫人子男四重光娶段氏諸生承光女重慶庠生娶伏氏安陽簿士毅女重熈庠生娶王氏萬泉令藎臣女重華庠生娶朱氏廬州司理世祿女先公卒孫男一人道基重光出孫女八人重光輩將以丙申年某月某日𦵏公于新卜之阡予既志其畧而復微著其事於銘銘曰李氏之先出自江右北遷於瀛遂稱華胄李起戎籍後興於文誰其興者曰平定君平定有子仍奮厥武桓桓參戎闞如虓虎至公兄弟益振厥宗巍科接武公則其龍筮仕太行敷宣王命暨冠恵文能平其政清戎秦徼按部粤方繡斧所指春雨秋霜丁丑之春大計吏治公覈羣品衆受成事遂為怨府遂為禍梯一麾而出分憲河西延鄜之區是循是拊餉盈于庾士騰于伍既遷寧武則以冏卿備兵兵飭考牧牧成再起僕臣于彼張掖世需公才乃晉參伯兩冀之任維公宜之兩冀之民惟公綏之酬公之庸進公于位秩長憲臺宦仍朔地終畀公晉以慰晉人右轄左轄錫命重申三載承宣曰民父母升華中丞保釐西土人望方繫煩言載興為市之虎為樊之蝇公曰噫嘻惟有歸耳以㣲罪行臣願足矣優游容與樂彼林泉欣欣易簀終其天年公生矯矯長身玉立人言台鼎需次以入撫臣尊貴未究公才方期論定遽返泉臺鬱鬱佳城于瀛之野我銘公石俟知公者明太子太保平江伯贈少保謚武靖萬峰陳公墓誌銘萬峰陳公卒之明年其子𦙍徵暨長孫啓嗣以太原守徐君維楫所為狀來請銘狀稱陳氏之先系出有虞自胡公封陳以國為姓陳公子入齊遂雄山東六朝時有入金陵者復為金陵人後從金陵遷濡須塢又卜𦵏神龍鄉大蜀山之陽故又為合肥人始祖瑄以功封奉天翊運宣力武臣特進榮祿大夫柱國平江伯卒贈平江侯謚恭襄五傳至太保兼太子太傅贈太傅謚武襄公圭即公父也娶張夫人而生公公生而英邁不羣自武襄鎮粤即随侍行間習兵事及地里險易聲望蔚起嘉靖乙夘襲祖爵丙辰僉書後軍都督府事戊午管禁兵侍直庚申充總兵官鎮守兩廣時逆賊張璉偽稱號所至攻城屠邑殺掠甚慘三省繹騷公㑹提督張都御史臬調發漢達兵及諸土目十餘萬約江西南贛福建三巡撫兵為掎角躬擐甲胄親抵賊巢前後擒斬璉等一萬四千三百八十名級獲賊屬一千九百奪囘被虜男婦八百八十招降一萬五千餘人得偽飛龍傳國之寳一器械馬牛甚衆露布嵗凡十二上肅皇帝嘉之賜白金文綺晉太子太保廕一子錦衣百户公用兵務在明號令嚴法紀使人不敢犯有土兵強市人物者即馘以狥土酋凛凛至斬其兵以謝過乃已賊既平議者謂近賊之民陽順隂逆不除之無以善後公力持不可議乃寢所全活凡數萬人是時倭勢張甚諸將遇者往往不戰而潰公先所擒斬倭至七百七十餘名顆倭畏之比兵行度嶺倭有前據嶺者衆謂此殘寇也勝之不武不勝且損威公曰吾提大兵盪巨寇顧避小醜不擊耶麾其兵進距嶺一舍止令諸軍蓐食接戰倭偵知為宵遁去隆慶庚午僉左軍都督府事旋提督神機營時營制新定公請置協理立備兵所為區畫甚悉未㡬復充總兵官提督漕運鎮守淮安萬厯甲戌掌前軍都督府事方公之鎮粤討賊也深入山箐為瘴癘所中遂患痺疾每舉發至廢朝謁因請假調理又十年以疾終于正寢是戊戌八月二十七日也距生嘉靖壬辰三月二十四日得年六十有七訃聞天子為輟朝治䘮𦵏予祭十五壇贈少保謚武靖葢備典也公性孝每公退必先詣張太夫人問起居始就私室凡賜予及嵗祿租入悉以歸太夫人室無私藏待諸弟妹親族恩義篤至俟公舉火者至數百人元配崔夫人駙馬都尉京山侯元女繼柴夫人太醫院吏目英女子十四人𦙍兆勲衛娶張氏英國公溶女繼吳氏恭順侯繼爵女崔出先公卒𦙍徵錦衣衛指揮僉事娶李氏安國公偉女𦙍嘉娶孫氏恩榮官清女𦙍芳娶栁氏安逺侯震女俱柴出𦙍望𦙍暐𦙍美𦙍光𦙍大𦙍豐𦙍隆𦙍禧𦙍祉𦙍吉俱側室出女十一人寧晉伯劉應元錦衣衛百户徐維揚成山伯勲衛王允㢘錦衣衛千户黄時謙錦衣衛百户王椿順天府生員王懋賞真人應襲張顯祖其壻也餘未字孫男五人啓嗣襲封平江伯啓奕兆出啓善啓慶啓徳徵出女孫十四人孫壻則新寧伯勲衛譚懋勛武定侯勲衛郭應麒錦衣衛千户蔣紹周慶都伯子杜惟孝寧逺伯仲孫李懋忠餘尚幼𦙍徵輩將以某年某月某日歸𦵏應天府欽賜大寧山祖塋之側啓崔夫人兆合𦵏予為叙其大者而系以銘銘曰陳自恭襄起江東開土肇建平江封聫蟬奕葉稱亢宗公也紹之業彌隆桓桓武畧如彲熊入典禁旅出總戎創倭滅寇成膚功捷書飛奏愜宸衷駢蕃三錫酬其庸俾公灌輸佐司農長河巨艦泛秋風千倉萬庾靡弗充維公所至咸靖共蠻烟瘴雨瘁厥躬十年抱疴頥天冲優游返真歸太空天子聞之為悼恫贈賵易名恩始終大寧賜域形穹窿官與營之祁連同史臣載筆銘公宫千秋萬䙫無終窮明文林郎河南道監察御史南濱陳君墓誌銘陳君諱登雲字從龍别號南濱順徳府之唐山縣人萬厯丙子舉於鄉明年丁丑成進士與予同籍予始識君於儔人中見其論議慷慨有烈丈夫風謂此少年英氣耳徐叩其中則古今善敗犂然畢具下筆滚滚數千言可立就問何以能爾君曰吾少病痞百療㒺效為家大人憂竊自念痞者否也可以通否惟窮理乎因下帷日發諸載籍讀之更無他念葢二載而病如失遂有今日予笑曰固不聞書能療疾君既以此治身矣今漸服官可以此治人乎君亦笑曰吾志也誓必不負予壯其言戊寅除鄢陵令君至鄢見細民苦於豪強文法舞於奸吏冗費無節賦役不均田野荒蕪學校頽廢河水為患流亡載塗嘆曰此一邑之病也首黜積役數十人捕所謂五虎者置之法躬履畎畝度境内田為三等賦役以是為差變大班坐月為㑹銀嵗所省以若干計令訟者得以墾田贖罪所墾嵗百餘頃為建屋宇置器具牛種以招復業者來者既衆復教以種植桑榆以益其生業洪溝青泥諸河為扶溝所壅嵗溢為災即力争於部使者卒令隣封毋得壅激而河患頓息斥俸餘捐贖鍰新學宫給學田興除之外一意以教化為務詳見繪徳吟仁編及政事紀畧中癸未拜監察御史君為御史初按遼左次按晉後按中州按遼時適當大閲上罷遣大臣以屬君君為悉心稽覈條上安邉十事而其所特疏者在議賞功之典大畧言首功之賞給發不時貧軍不能枵腹以待不得不鬻之富人富人挾其貲以冐功累級多貴至叅遊者此其人力不能禦敵智不能謀敵而冒濫名器混淆體統役占軍士糜費俸給邊鎮之蠧無大於此在晉在中州值嵗大饑晉人猶以木皮草根雜土為食中州則父食子夫食妻以人肉為市以鴈糞為糧矣君皇皇然為請蠲請賑請弛山澤之禁請借留都之儲天子手其疏惻然動念為發帑金數十萬以至宫闈寮宷咸捐貲捐俸佐之而君亦自清贖金得萬三千為郡邑糴本至今為豫人利葢遼左之冐功如人有痼疾牢不可破而晉與中州則譬人病尫羸奄奄待盡非急扶其元氣不可復生故君先其要者如此若夫約己率屬激濁揚清則君丰裁嘗有餘勇不能殫紀焉矣君居西臺先後侍經筵監㑹試主計吏筦京畿壯懐直氣霜肅風行有觸必言有言必盡如疏論陸冡宰羅宗伯徐冏卿胡都諫鄭戚畹多人所不肯言不敢言者無所避忌予謂君立朝以正直忠厚為本茲不太甚乎君曰不見吾冠乎觸邪吾職也若事闗宗社禍伏隠㣲吾知而不言則吾痞將復作死矣豈必機穽之間斧鉞之下能死人哉君獨立行一意大率若此信陽王太史素不識君見其祈天永命疏嗟嗟嘆賞謂為隆萬以來名臣奏章第一忌君者争欲甘心於君而主上明聖竟無㣲譴加君者君㡬滿九載推少京兆廷尉丞俱不報君度不為世所容即以假自劾歸君所居當孔道行李徃來慕君名多就問者君雖抱疾猶喜肅客每語及時事意有所不可輒不勝憤至強起坐榻上語刺刺不能休以是病轉増予嘗貽書戒之謂身既隠矣自宜杜門謝客不當復問理亂黜陟事君是之而不能從也病劇猶口占云一死寧堪惜終懐世道憂謗從直上起官恥曲中求因索竹葉茶啜其半以其半酧地曰天下事盡付此盃中矣遂卒是萬厯丁酉六月二十五日也距其生嘉靖庚戌七月二十八日得年四十有八耳君嚴於飭吏治而厚於恤民隠急於崇節義而勇於折奸雄使竟其用則其敢為敢當之才不囘不撓之氣將大有所樹立而有志未就竟鬱鬱以死葢君之少也痞在一身通塞之權自已操之故塞者能通而君病已君之仕也痞在世道通塞之權不自已操故塞者卒不能通而君病死柱石王君狀君謂君憂國憂民死而後已信哉君性孝友聞太公訃水漿不入口者三日哭泣幾至喪明事太孺人能先意承志陳之先本柏鄉人張姓其姑有適陳氏者無子以太公為子遂從今姓君既通籍言於太公請歸其宗太公以受陳父恩不許君不敢復言乃搆祠堂一區置祭田二百畝擇近屬二人主祀事又割腴田百畝贍其族以報陳復置田三百畝付工本牛隻銀百以報張匾其堂曰景范葢慕文正公而思效之也至其所置義倉置學田置義塜種種厚施不可枚舉嗚呼君豈一於謇諤者哉君父志大封文林郎鄢陵縣知縣母施氏封太孺人配張氏封孺人子二誥廪生娶柏鄉魏上舍大用女司馬槐川公之孫女也詔娶内丘庠生喬國英女女二俱夭孫女一許聘南宫周太守友程子某誥輩將以嵗己亥某月某日𦵏君於泜水之陽而以狀來請銘予謹抆泪為誌其大者而系以銘曰矯矯陳君雄才邁衆性惟伉直心則空洞志厲鷹鸇政成鸞鳳鸞鳳伊何加恵窮民視彼痌瘝不啻切身冬日比愛乳哺稱仁鷹鸇伊何澄清攬轡有輪斯埋無器可忌白簡生風烏臺樹幟世尚媕阿疑君若刻讀君之疏孰不動色太史有評可稱遺直上競貪殘下苦彫瘵以拊以循繄君是賴小民有編何慚遺愛道之將行君痞乃痊道之將廢君命弗延於人何尤行止惟天自君大還時政日秕使君而在徒益其痞吁嗟陳君可以死矣陜西布政使司左布政使雲田寗公墓誌銘寗公卒其子元桂以大司馬懐棘王公狀來請銘予與公同舉進士同宦於朝公齒少於予而一旦溘焉已矣反覆公狀蓋泫然隕涕焉公諱化龍字文明别號雲田保定新安人祖志本父節俱以公貴贈封中大夫山西布政使司右叅政祖母龎張母吳俱淑人公生五嵗始能言比就外傅一意問學十一能文十四補弟子貟十八廪於庠萬厯丙子舉於鄉丁丑第進士戊寅授中書舍人已卯册封周藩辛巳以考最封其兩尊人壬午陞工部都水司貟外郎視慈寧宫養心殿諸工程夙夜勤事有上方膳醴之賜旋以大慶恩加封其尊人如其官甲申督理京城街道卽以其年𣙜税荆州公至荆主在禁奸節費通啇惠民比得代課無溢額槖無私裝荆之人士為詩歌以頌之丁亥督修胡良巨馬二橋日與中貴人處調停節縮不激不随工竣賜白金文綺晉虞衡司郎中加俸一級公主虞衡一切規畫厝注誠心為質為大司空所倚辦聲稱藉甚己丑陞山西按察司副使備兵赤城赤城宻邇邊疆青巴圖安圖諸部環其外而史車二夷處其内為邊陲重地公為明約束嚴號令懲偷惰之習清虚耗之蠧凡所經理悉綢繆大計謂龍門要衡獨石隔逺禆將一人難於兼制白於部使者増叅將一人分守其地庚寅史車二部逸出塞議者紛紛遂至易置諸將吏乃移公潼關公無㡬㣲見於詞色卽候代猶日督將士嚴兵保境若冦至者未㡬史酋率所部冦龍門公督㳺擊杭大才與戰於唐子衝擒酋女所捕擄斬獲甚衆詳見督撫䟽中公旣至潼關念關地據黃河上㳺控制三省秦之襟喉急以暇日塹山堙谷練兵積餉關若益雄而盜賊屏息壬辰陞山西布政司右叅政理屯糧覈逋負滿三載陞陜西按察使適當計吏其臧否一裁以至公盟於神誓不欲以愛憎為毁譽戊戌陞山西右布政使己亥陞陜西左布政使以便歸省抵家而疾作遂卒時己亥年又四月四日也距生嘉靖己酉十二月一日得年五十有一耳公小心勤慎所至以精勤舉職敡厯藩臬不越秦晉熟知其民風吏弊邉事敵情使其不死卽當秉中丞之節以大造於彼民也而公不逮矣惜哉先配王氏累贈淑人繼楊氏累封淑人子元桂生員娶楊氏元材殤女二一適戸部尚書髙公燿子某其一殤元桂將以其年十二月某日塟公於邑西三臺之原啟王淑人兆合窆焉予為志其畧而系以銘曰宦非不逹厥施未究年不稱天未為公壽胡賦之良胡折之驟胡是厚積而乃儉受三臺之原鬱然靈秀以妥公神以昌公後明交河簿秋潭孔先生墓誌銘先生諱宏緜字某别號秋潭宣聖七十三代孫也父廪生承布母某以正德己卯十二月初七日生先生始就外傅儼如成人稍長一意攻舉子業居常不見有媟䙝之容聲稱藉甚顧數試數不利久乃以明經貢闕下游太學太學諸士皆嚴重先生多樂與交者隆慶壬申投牒銓曹除吾邑簿簿為河設其分署在邑東五十里泊頭鎮河運之濵故自行河外一切錢榖刑名事皆不得與舊官是地者厭其閒曹徃徃取民間細事訊之責其贖鍰又鎮在徃昔猶有啇賈貿易歳輸郡税者數百金皆簿司徴納而徴收之際率多取其羨金以為常然非其職矣先生蒞事日惟以河為務春勤修築秋謹隄防閒則閉門習静不越俎以自潤諸淺夫役故有例金悉謝絶之人服其清邑志謂其噐宇清雅内行修潔不受民詞不取啇貨不受常例蓋實錄也然性端方不能為媕阿之態邑令某喜人䛕已謂先生亢恨之遂以大計落職一時士民譁然為之不平先生歸年日益長家日益貧至不能繼饔飱予毎為宦東土者道其亷亦間有賙之者不數數然也然先生處困而亨猶日手一編以終其身云先生卒於萬厯戊戌十二月廿五日春秋八十配王氏繼顔氏再繼王氏子聞博娶張氏聞貫娶某氏皆先卒女一適嵗貢生王雲鵬孫貞憲娶孟氏貞惠生員娶任氏貞慤娶孟氏曽孫男尚賔一尚幼貞憲等將以卒之明年四月某日葬先生於祖塋之次而以其遺言走京師徴予為銘予讀其書而悲之為志其概復系以銘曰潭之水清以潔秋之潭清且洌吁嗟乎先生之號實先生之節世人巧宦先生守拙洙泗之裔其流自别吁嗟乎水可飲蔬可啜先生之名不可㓕撫治鄖陽都察院右僉都御史蒲汀姜公墓誌銘中丞姜公諱璧字完卿别號蒲汀順天文安人世以孝弟力田為德於里里長老言此其後當有興者及公生而馴謹長而篤學以三禮起家領隆慶庚午鄉薦明年辛未成進士卽以其年令樂安萬厯丁丑入為河南道監察御史戊寅出按兩淮鹽法旣報命以外艱歸癸未服闋出按中州以疾歸丙戌起原官廵視京營戎政復廵視京畿兼掌河南道事大計羣吏公在西臺先後十三年始進大理右丞尋轉左晉左右少卿辛卯春晉僉都御史撫治鄖陽壬辰秋有言公速化者詔改公留都公以太夫人老不復出又三年疾卒於正寢是萬厯丙申七月三十日也距生嘉靖庚子二月一日得年五十有七初樂安有大俠王彦飛者聚黨橫里中操赤白丸報讐以睚眦殺人它令莫敢問備兵使者行縣索之弗能得公至召諸賊曹語之曰若軰受賕縱奸辠當死能縳王自贖當貸若辠衆恐願自効卽共為具飲王中酒伏健兒急縳之公度已得王又虞有道刼者預勅尉率徼卒逆之刼者猝遇尉悉駭走遂逮彦飛至庭論旣具立斃獄中而為教散遣其曹悉勿問衆咸凛凛在邑五載威惠大著詳見去思碑中其按淮上也主在杜干請剔積蠧富啇倚請託為奸利者無所容其私奸啇張國用劉威軰各以輕重伏罪時淮揚饑奸民以其間競為私鑄錢法大阻啇販不通百姓嗷嗷㡬釀大亂公檄所司禁私鑄而亟發金錢萬餘倉粟數千賑之始以事聞所全活甚衆於時黃水入淮淮大溢總河大臣與撫臣相掣肘而有司行河者率委之倅貳又有議罷范公舊隄勿修而别開支河者公䟽言倅貳權輕不如專任守令大臣事權不一難責成功宜罷總河以其事歸撫臣便又河口外高内下開支河則引倒流之潮闢私販之路不若修范公廢堤使内水不出外水不入外不損鹽竈之地内不傷耕植之田䟽凡數百言皆鑿鑿可行者部覆如公言後事竣有白金之賚中州宗室最衆而禄最不給或有言宜開宗學以恤貧宗者下有司議悍宗㯛樒軰指是為宗正􅀈㮮罪鳩其黨羣擊之因聚衆稱亂人情洶洶公時方在道聞之卽疾馳入大梁捕其謀主袁東魯數人令武卒列伍備非常始䟽陳其狀有詔辠首惡而釋其黨中州宴然公嘗言治大猾宜緩急則謀洩而昜脱平大衆宜急緩則黨固而難安真名言也河南贖鍰歳額四千後漸倍之公曰此膏脂也非刑罰嚴峻何至是卒䟽如舊額睢陳東連曹徐西接亳潁故設有兵廵道弹壓盜賊久而罷至是有議復者公言増官則増費若改清軍道兼屯鹽而以屯鹽道移駐睢陳則事專而費省議雖寢識者是之公之主大計也䟽言五事曰急先務精考覈禁營餽懲貪酷慎委署雖未盡用其言而無私毁譽無狥造請時服其公矣開府鄖陽當恇擾之後推誠布公寛之如理亂䋲而不欲操之如束濕薪地方方賴公敉寧而公中口語歸矣公旣歸猶有踪跡公撫鄖時事者見一切鍰金皆儲以待餉議者始息公事旣白念太夫人春秋高堅不復出實欲承歡膝下以娛其餘年乃公卒而太夫人猶無恙也公之卒也太夫人傷之踰月亦卒嗚呼痛哉公豐儀偉貌鬚髯如張望之者以嚴見憚而中無城府飲人以和蓋油然其可親也不如其貌公嘗誦伯淳言掇拾短長以希直名有所不能蓋終身以為則焉父師吕封河南道監察御史前母董贈太孺人母劉封太孺人配王氏卽狀公者王少叅夣巖妹子四䋲武國子生娶王氏揚武廪生娶王氏俱按察使緘孫女經武娶馬氏叅政允登女俱王出允武聘楊氏憲副應中女側張出女五一適井郡丞濟博子國子生拱極一適王大尹惟㡬子舉人陞一適郭都事可楨男庠生茂勳一適紀憲副誡孫生員于彛俱王出一許聘緘孫元翰張出孫男五長銓䋲武出聘誡曽孫女次鎬鏞揚武出鎬聘杜僉憲允繼女次鏜鐸經武出孫女五尚幼䋲武軰將以二十六年二月二十九日葬公於祖塋予為次公之生平誌之而系之以銘曰古人言治奉職循理何必鷹擊乃稱豸史夸者死職深文巧詆烈士狥名沾沾自喜公之為令父母孔邇執簡西臺開府南紀所至輕平務持大體不競不絿毋隨毋詭毋或骫法以縱厥宄毋或洗垢以索厥痏公不陵人人乃公毁人之毁公公運之否以公厚積儉受乃爾於人何尤天固若此鬰鬰佳城公焉寧止太史有銘公其無死贈懐逺將軍後泉王君墓誌銘王君後泉卒之明年其子國正畧述君生平求銘君墓道之石君予郡人國正又予武闈所舉士不能辭按狀君諱宗威字子重後泉其别號也其先吳常熟人有忠者從高皇帝於行間以功陞正千戸後𨽻籍於河間瀋陽中屯衛之前所忠生瑁瑁生銓銓生大海大海生機機生椿椿生燡娶於張生二子長卽君也自君高祖以下世襲其職咸有能聲而産漸落寞君氣禀剛方任事㡬四十年生事益减而介然不易性孝友弱冠失怙事母曲盡色養鄉里稱之少孤廢學恒以此為恨督其子於學國正遂舉辛卯鄉試第一壬辰舉武進士授指揮同知把總烏龍溝君就養子舍以疾歸終於正寢卒之日但云吾家世清貧有兒幸成立其令以清白持身勿負國恩也語不及他是萬厯二十四年三月十四日也距生嘉靖十年五月廿三日得年六十有六初授武徳將軍以子貴進懷逺將軍配崔氏繼黃氏子二長卽國正今為舊州守備娶程氏次國祚娶劉氏女一適千戸曹世勲俱黃出孫男五紹元維元綸元緒元𦙍元孫女一國正將以二十五年八月二十二日葬君於祖塋之次予為志其大凡而三嘆息焉士大夫博極載籍名能文者視武胄為麤人之極致然徃徃利令智昏官以賂敗辱其身及其子孫者不少矣君目不知書而能以貧苦自將儉於身克昌厥後豈獨武夫卽文士有厚愧哉是宜銘銘曰世之武弁借言使貪貪人罔極嗜利若甘徒令世秩敗於貪婪君之户侯傳之先世居官守法罔敢或替以暨於君自守彌勵操其清白以啟嗣人能俾世業愈逺愈振美哉君子慎勿厭貧哲嗣矯矯堅持清操懷逺貤榮食貧之報我銘君石為貪者告明錦衣衛户侯連山王公墓誌銘連山王公卒其子朝英軰以鄉進士胡君狀來請銘按狀王氏之先世為應天江寧人有政者當高皇帝時累功至宣府左衛正千戸遂為宣府人政生順順生謙謙生鳯鳯生琳俱世其爵琳生紀紀生鐸卽公父也母孫氏生子三公其季也諱元春字文明别號連山公生有慧質聰敏嗜書為博士弟子文多竒氣有聲黌校間籍甚王氏世以武顕而公父隠於賈治産積居與時逐視諸賈人最為饒益嘉靖中歳苦兵帑藏告匱大司農計令諸富民出粟以佐軍興無應者公父慨然曰國家方用兵吾以為有力者當從事行間富者當輸財如此而後事可濟也乃捐貲以佐軍費久之益厭薄賈道挾公走京師入粟為錦衣户侯而公亦入太學得交海内知名士相與問業名益起顧以數竒數試數不利錦衣公卒仲兄鴻臚公秉家政公益得肆力於學未㡬鴻臚公亦卒公以身拮据門户頗廢業㑹恭妃誕生皇長子以覃恩授公錦衣衛百戸公嘆曰士固有志今已矣豈非命哉始輟業博覽稗官小説習音律或與鄉先生結社為詩以自娛以消其卓犖雄竒之氣狀又稱公事親孝能以色養病為侍藥為請禱目不交睫衣不觧帶没而哀毁柴瘠人咸稱之公卽乆益富而不矜誇勢能之榮好行其德數散所積與貧交䟽昆弟服藥而效卽按方製劑施之人人見野有暴骨卽為立義冡埋胔掩骼聞民間痘為厲卽修神祠以祈福祐其趨人之急振人之困類豪俠者而範身矩矱少或踰檢卽終夜不能安寢其謹畏又若此公素健偶病痰治療罔效遂卒時萬厯戊戌正月二十五日也距生嘉靖已亥四月十一日得年六十配楊氏封安人先公卒子三長朝英保安州廪生娶胡氏舉人守譲妹繼都氏次朝擕娶潘氏舉人大綸女繼周氏長治丞萬金女次朝彦娶景氏四川副使嵩女俱楊安人出女二長適逰擊李同子繼祖楊出次聘總兵董一元子用賢側室戴出孫男五長道正餘俱幼朝英軰將以其年七月十有三日啟安人之兆合葬焉而予為之志其槩如此因系以銘曰公幼業儒志在公車卒業太學才傑相於荷天之寵拜命金吾有志未竟詩酒是娛富不自雄為德於閭非禮勿履擇地而趨公之嗣子能讀父書意公食報其在斯與鬰鬰佳兆帝城之隅百千斯年公妥其居封工部主事龍川公墓誌銘封工部主事龍川先生姓易氏諱經文字濟甫世為河間之肅寧人先生大父晟父琚皆隠處弗耀然世有質行人稱長者琚三子長卽先生先生生而天性孝友稍成立兩尊人老二弟幼弱家益素俯仰咸倚辦先生先生又業儒計無所為養者乃開鄉塾抗顔嚴規條訓誨里中弟子藉其修脯以供甘膬給飦粥又屢值嵗祲脫粟之食日或不繼至損張安人衣釧佐之先生猶旦暮持一編與諸生相劘切晏如也先生博學彊記為文一禀於濓洛闗閩之說雅不欲獵異釣竒以趨時好故毎試有司輙不售卽不售而先生志愈銳學愈力曁先生有子登瀛成進士官虞部郎迎養子舍而先生猶守博士籍習故業孜孜不輟曰吾不欲以兒子貴貴我也又閱歳先生得風疾手足少廢始喟然嘆曰吾卒阨至此乎吾無如吾命何乃輟業受今封日進虞部君戒之曰吾荷國恩無以報汝勉之吾性廿食貧毋以廼翁故敗官常也虞部君奉命惟謹故兢兢守三尺數載如一日云先生與張安人相敬如賔先生疾安人日侍湯藥不少懈萬厯甲申冬安人卒先生意忽忽不樂比歸襄安人葬事不數月先生不起矣時乙酉年十月十六日也距其生正德辛已六月一日得壽六十有五先生有丈夫子四人長登雲蚤卒次卽虞部君登瀛次登高武學生次登仕邑諸生孫男七知簡能亨健通從孫女二先生卒之明年登瀛等將以二月十九日啟張安人之兆合葬焉而以狀來徴銘狀稱先生真率坦夷與人交油油然無崖岸嶄截之態而行履皭然不為非義自少及壯曽一距奔女再距嫠婦獨抱魯男子之行鄉人至今誦之嗚呼先生其有隠德者耶固宜其子孫之振振盛也是宜銘銘曰先生于于行與道俱貌則若癯中則甚腴芒如醇如𤣥覽條除世好者竽弗貶以趨美色可娛而志弗渝抱一若迂守貞若愚於戯此先民之芳矩而世之醇儒也歟鳯翔令王君墓誌銘王君諱命字欽甫别號鶴程真定饒陽人嘉靖甲子與予同舉於鄉然而未識也萬厯丁丑予讀中秘書始識君於長安見君壯懐慷慨有烈丈夫之風焉明年君求予次女為子婦予以地里遼逺未應而同年劉君兩峯輩關説百端至卧予寓所要之不得已許其請自是㑹君愈數愈悉其為人君負氣自豪意不可一世予謂君君子知天下之不可上也而下之時舉禮自卑尊人之道砭君君始不謂然而後乃折服也君善飲飲如長鯨之吸川大白數十可立盡予謂君爛腸之藥胡可常也久之而君亦不復雄飲矣君家頗裕而自奉甚簡淡然亦恡不以施人予謂君損有餘以補不足天之道也行道有福君深有味於予言漸損貲以周其鄉人若君者可與並為仁者也丙戌春予女歸君之子王生亮芳未幾君遣生來予宦舎從學於貞復楊先生生聰明沉静日兀坐一室讀書之外無所嗜好予笑謂君此千里駒也當不至如君久淹公車矣戊子生入為博士弟子踰年君繼配李孺人卒娶趙氏女為妾趙慧而善媚既蠱君遂恃寵無忌間竊君所藏金賂諸臧獲既久而中外臧獲無非為趙者生懼傷君意不敢以告但乘間言古云朽木不可為柱卑人不可為主父何不立繼也君頷之旋以語趙趙大恚恨始厚賂諸臧獲為魘鎮符不效則市毒置食中以毒生與予女予女食少但病卧得不死生食多病遂甚不能言然猶能於床褥間頓首指口求飲趙禁不與飲遂死既死而君不悟也趙喜得計益以厚賂潜納他人彌月子為子而君不悟也君弟順菴君為君備道其事而君猶不悟也比趙死前事悉露檢視藏金悉歸烏有蓋君始悟而悔恨已無及矣先是君舉三孫皆相繼夭至是遂無嗣君才髙既不售亦無意仕進㑹有言惟積德可以育子惟仕宦可以積德者君欣然投牒銓曹除鳯翔令因搜其家餘金槖而之官比履任一主於節愛盡减諸供應不以煩民直指行部至僅具廪餼且自言邑民貧甚令不能加賦以飾厨傳令當罷去直指大駴既而廉君治狀語諸守巡曰令古人吾儕當共調䕶之俾行其志君以此益展意自信邑之驛騎每為徃來者所倍取或倍索其直折辱之君乃置籍於座右按牒而給竟無敢多索一馬者歲所省凡若干金郡邑歲時公宴舊皆倚辦里甲猾胥因而乾没其中君省見年諸役悉令歸農而計費授直平市之民所省復若干金公用器具一切出入司之者不敢問時苦賠累君白於守自掌其籍計籍以出計籍以入終歲不損一物所省復若干金而站糧之新𣲖丁力之加𣲖者悉從豁除矣兩造具君但判其曲直不科贖鍰薪俸所入别貯之日詢民之耕不能具牛種織不能具機杼者貧不能婚嫁者逋官租久繫不能償者咸以多寡周給之俾各安其生業邑有尼以妖滛敗俗君為逐之出境而詢問風俗表揚貞節禮敬士夫作新學校以端導民之路邑之審編舊必浹月既竣而告者紛紜以為常君裹糧躬歴諸郊隨民所聚以次審之八日而畢民不費一錢無不歡然服其公者郡東雍水所注毎暴漲行旅阻絶君出槖中金辦材鳩工旦暮徃督之未兩月而石梁成詳見剏橋碑中大都君視民如子稍有痛癢即思為爬搔之撫摩之視官事如家事靡利弗興靡害弗除薄於為身而勞于為民苦于厚下而儉于奉上葢三載如一日關以西語循良者必舉君為高第戊戌入計即騎乘皆自其家備之蕭然僕𨽻數人而已既而鐫君秩一等陜之藩臬士人皆錯愕從役為之號泣予詣君問故君曰吾不能善事上官負罪實多大人長者時或見原獨恤刑使者移檄治衣費可五十餘金吾妄意使者奉命恤民非以剥民也未有以應不意其不大人長者也今牒具在疏言於朝當與兩敗矣然寧人傷我吾無傷人吾實以拮据病困縁是得歸幸矣予聞而喜曰君心如是當有佳兒君既歸竟不能遣諸胷中意忽忽不樂疾遂作予聞遺書慰君曰君勿以功名介意夫利澤及人之謂功聲聞長世之謂名此兩者君已得之於鳳民無庸介介也比書至而疾已篤至八月六日遂卒距其生嘉靖癸巳享年六十有六耳傷哉予聞君家食時滹沱大溢水没城城不浸者數版饒民皇皇無以為計有婦人呼於市曰必王春元祭之時饒有兩王春元問主名指曰君也君聞殺牲為文登城望祭祭畢而水落迄不為災或以問故婦曰渠東斗星也翼日復問其婦懵然不復憶矣人咸異之又君治鳯時秋禾正茂忽有蟲如蠶而微小色正黒縁苖食之徧四境皆然百姓奔告君祈君極救君即為文率衆禱于神詰朝而蟲跡如掃竟亦莫知所徃鳯士民為圖頌之君嘗以治邑勞瘁成危病醫藥罔效夜夢梓潼神告之曰服補心丹乃愈覺以語醫醫言非對症藥已之既復夢如前即和而服之遂愈嗟乎精能感神而不免惑於一婦誠至格昆蟲而不能稱過使客豈非命耶君父文學舉嘉靖庚子鄉薦令延津有惠政民至今尸祝之母胡孺人先配李氏繼李氏子一即予壻亮芳娶予次女女二一適翟縣簿子生員復初一適李縣簿子生員一翰先君卒孫男三皆先君夭孫女二君之疾也君姪亮芬日侍湯藥兹將以其年十月十八日葬君而以易叅伯狀來請銘予為抆泪志其畧而系以銘曰君先大夫作宰延津大有惠澤洽于延民穆兮廟貌崇祀方新君世其學家聲益振行務修潔心秉真醇高標特植杰士之倫筮仕疲邑覃布深仁室無魚懸野有雉馴夙夜况瘁民爾忘身民之怙之如慕慈親彼人惎哉乃逢其嗔西子匪妍隋珠匪珍徒令循吏齎志沉淪嗚呼人世石火輕塵富貴有極孰能千春君今已矣不愧蒼旻甘棠遺愛爰有貞珉我銘君石告彼譛人贈觀城縣知縣友溪王公暨配張孺人誌銘贈觀城王公卒於嘉靖四十一年卒二十餘年始以仲子應霖考最贈今官又十餘年而公配張孺人卒時應霖已入為户部郎中而季子應期亦以進士令尉氏于是二子謀于某年月日啟公之兆以孺人合塟而以公壻都御史姜公狀請誌與銘按狀王氏文安故姓世居邑西之孫存舖七世祖敬賢生彦禮彦禮贅於相公庄某氏遂移家居焉彦禮生珣珣生原以孝行稱自有傳原生甫全即公父也以正德九年某月某日而生公諱宗寳字國重别號友溪性端謹幼如成人不妄笑語長而蒼顔修髯望之知為長者家頗饒裕然自奉簡淡獨好予樂施出於天性宗族多賴以舉火者壬子歲饑出粟百餘石賑其鄉人庚申再饑再賑如前縣令為表其門曰隂德學博徐宗堯者清謹士也以遷秩去至不能具資斧凂公為貸子錢二十金竟出息代償之蓋好行其德類如此庚戌敵入近畿邑令温君欲繕城隍為守禦計而檄公董其事公為量日程工度功與費日行諸築者而抶其不率者三尹某因役興意欲有所侵漁公執不可比竣事費以大省役不後時而人無于思之歌咸憚其執且服其才云公嘗語人自吾先世以行誼著聞而數傳以來無顯者吾視諸子才其將興吾宗乎乃為擇良師督之學時都御史方困諸生中公見而竒之曰世安有如生而長困阨者乎即延與諸子共研席時時資給其費竟以女歸之張孺人素嫻姆訓貞静有婦德及笄歸公事姑趙及繼姑劉能承順無違咸得其歡心公有所欲施或時不給不難斥簮珥以佐其意即諸子就外傅孺人實從臾之公既卒孺人進諸子誨之曰毋以汝父故廢汝學一切家務吾當拮据為汝任之汝輩能稍自樹立吾將藉手以報汝父於地下諸子跪受教争自淬礪兄弟竝舉高科為循吏俾没者存者被其榮光享有禄養皆孺人力也孺人之疾也仲子適以督餉過家率諸兄弟暨孫曽男女環列榻前視湯藥躬含歛者數十人嗚呼此積徳之報亦希覯哉公生卒已前具享年五十有二孺人生正德十三年某月某日卒萬厯二十二年某月某日享年八十有三子男四應雲冠帶把總官娶趙氏應霖庚辰進士户部山東司郎中娶紀氏繼娶時氏應期己丑進士河南尉氏縣知縣娶羅氐應兆武生娶邢氏女四長適省祭官裴松次適姜公璧即狀公者卒未進士廵撫鄖陽右僉都御史次適武生紀銖次適邑廪生張邦治孫男七體乾軍門効勞官體恒體升武生應雲出笏國子生䇿邑庠生應霖出箴邑庠生應期出簡應兆出孫女十人曽孫男六人曽孫女十二人聘字不具述銘曰相庄之王為德于鄉厥修既良厥祚乃長婦也壽康子孫繁昌煜煜龍章以闡幽光鬱彼𤣥堂此焉偕臧太史有志没世不忘封承德郎户部主事方公墓誌銘封户部主事方公卒其子僉憲君端既葬公於邑南原祖塋之次暨入都乃手一狀授其同年友登曰端生而愚直不善狥世善忤世兩官遐荒又以嚴命不遑寧子舎以至親老不及養没不及訣端得為子哉而猶人哉幸子誌而銘之庶幾不朽者以少紓人子終天之恨予憐其志許之狀稱固始之方所從來乆逺矣唐末自固始徙閩之莆田入國朝自閩復還固始者則其祖指揮使勝也五傳而至貢士贈户部郎中完完三子仕進士都轉運使仲舉人伸諸生即公父也母范孺人夢有金甲神人冉冉至其室者紅光隨之覺而生公公諱志充字某别號某以端貴封今官公幼孤從其伯父轉運公學日記數百言試以聨對口占響應無窮者如聲徹九天歸北鴈啼殘午夜度南䳌月印中天風雨信鳯翔千仞帝王徴兄弟奏塤箎君臣作徴角皆非童稚語其聰頴若此轉運公大奇之曰而父宜第以夭其天年不及第竟其志者在孺子乎公益自負下帷發憤無暇晷為弟子員有聲黌校中然為文自出意見不欲局曲守經生言且意氣激烈出於天性讀史至秦丞相檜㦸手大詈言我當武穆時必擁兵長驅復兩京還二帝安肯俛首班師受制於賊臣偶督學使者試武穆論即奮筆言檜者宋之賊臣天之順子也武穆者宋之忠臣天之逆子也其議論種種類是以此屢上有司屢不第晩始得廪於庠公雖不售而愈益發舒人有過必靣折之又不能忍不平之事有詹某者為群盜主邑人畏而避之公直白於令君按治如法賈禄輩若干人法不當重坐為吏所故入不能自理公為昭雪之卒從末减邑有舊軍户絶而尺籍存者歲苦勾攝以公陳其害得减其額河北民有乞灑糧於河之南者撫臺主其議公上十䇿極言不可狀議遂寢公故倜儻而内行醇備事孀母以色養至九十齡如一日推負郭田與其弟姊妹有嫁而貧者夭者生為之養殁為之葬撫其遺孤而教之成立族人有貧不能自食者出粟周之歲以為常公不自殖生出子母錢擇善賈者使逐什一之利而時入其息以供施予曽以倍直市危貢士居後危卒公給之棺復迎入故居而殯之公力健能投石超距嘗遇盜發即奮長矛鳩衆逐之盜駭走終公之世無敢竊發其鄉者鄉人德之嚮其利者至為生祠祀公部使移檄奬予先後無虚嵗嵗已夘公以明經需次將貢闕下時端為行人㑹以大慶恩當貤封公非公志也讓不欲居或有勸之者乃就封嘆曰大丈夫不能資適逢世議功名於時而顧因兒子以為榮榮亦辱矣其立志如此嗟夫以公之志令得出入禁闥何難以諫死職不然而當疆塲一面馬革裹尸其素所蓄積也又不然而膺民社之司亦必能抑强扶弱俾百姓安於田里而無嘆息愁苦之聲乃令泯泯汶汶以老胡以生之又胡以抑之僉憲君習於庭訓居官愛植節即百折不易古云是父是子不誣矣公生於正德十一年二月十八日卒於萬厯二十三年二月十二日享年七十有九配熊孺人有婦徳詳具别志子二靖鴻臚寺序班次端即僉憲君今起官廣東孫四一魁靖出一元一寧一清俱端出一元邑諸生銘曰文如豹兮力如虎睥睨一世凌千古壯志未伸氣未吐吁嗟所就竟如許越有仲子擴其緒慷慨恥與喁喁伍天其以是篤公祜南原佳城封若斧千秋萬􅑤於此處後有知公眎斯語淡然軒集巻六
