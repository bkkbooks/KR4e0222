夜漸深從他男女自穿針拙人懶乞人間巧且向良宵醉二參九日同魏懋忠馮用韞登顯靈宫玉皇閣三首祈靈漢帝有仙壇閬苑秋陰碧殿寒宦海幾人同對酒天涯九日此憑欄黄金臺向荒城沒白玉珂從古陌看回首紅塵悲莽蕩紫雲深處欲驂鸞瓊宫故是仙家地佳節相招此共遊古木蕭蕭松露冷長空片片海雲秋風塵忽老陶濳菊樽酒聊登庾亮樓秩散正宜同汗漫何妨落日更淹留玉皇髙閣俯人寰畫棟丹梯靜可攀雙闕參差連漢殿千峯迢遞接燕關樓頭秋色當杯墮檻外晴雲入座閒松菊故園何處是蕭條三徑未能還彭太史冊封便道歸省騑騑四牡詠皇華河朔逶迤驛路賖已自西清分使節還從南斗度仙槎金函啣鳳疑青鳥綵袖擕雲映紫霞恠得髙堂人並健彭年原自是君家唐太史封鄭藩青門柳色散晴烟太史風流擁節年恩詔曉從三殿出使星髙傍兩河懸虎牢狐嶺開懷句豹袖羔裘憶鄭賢到處王侯應授簡詩成不讓栢梁篇七夕新月依稀夜向闌女牛此夕若為懽人間謾道相逢易天上猶然㑹合難河水盈盈情脉脉機聲軋軋露漙漙可憐何限别離者遥望仙橋掩淚看送張質卿太僕二首北風吹大陸此去躡層氷忽斷羣中鴈其如棘上蠅别筵頻勸酒深夜共挑燈仕路從來惡﨑嶇真可憎驄馬經行處曾清海上氛人猶談往蹟名乃掛彈文心事憑蒼昊閒情付白雲送君無限意聊與醉斜曛劉柱翁雙夀廿載人髙大隠名鹿門紫氣映東瀛靈萱特並莊椿茂玉樹雙聨竇桂榮伯氏南宫行曵履仲方北闕正持衡金陵江鯉仙莖露併入瓊筵佐夀觥陳南濱侍御奉母南還浮雲西北馳越鳥東南飛壯士各有懷何為常依依况有白髪親日夕望庭闈陳情叩天閽君恩許暫歸板輿親扶將滿路生光輝到日敞華堂開燕及芳菲春風發朱英照君舞時衣君良悦情意其奈心知違嗟我同門友漸看雲㑹稀今復惜君别何以効涓微處士忌磽磽願君聊息機珍重報國身努力奉春暉送馮用韞學士歸省君王方問道學士乃寧親綠野看雲近黄金結綬新更緣瞻岵意得慰倚閭人綵服皆宫錦猶餘漢苑春壯年能解綬拜命即辭榮盛事歸橋梓私心憶弟兄傳符明主賜樽酒故人情别後長安道應增鳴鴈聲自與君為友知君真可師亦慚非逺志謬欲託深期握手忍分去停杯悵别離無由生羽翼相望但相思知君非久别無柰亦分違從此風期阻漸看雲㑹稀南鄰想髙士東壁望餘暉莫向碧山去依依戀舞衣送王太初之金陵匹馬西風出禁閭皇恩新拜大鴻臚有官何必中丞節無地不堪君子居南北那非明主賜往來可柰故人踈秣陵舊蹟時登眺慷慨應傷六代餘芝陽丈候補都門賦贈孤臣來絶徼久客滯長安酒典鷫鸘服塵生獬豸冠途窮感嘅易金盡結交難惟有匣中劍西風洒泪彈芝陽被謗後撫臣疏其有功于滇仍乞補滇以酬其績乃竟得鬱林書此為别凄凉傷歳暮飄泊又春初裘敝因除目骨銷是謗書莫緣臣節苦便與世情疏迢遞蒼梧道新恩未可虗夀葢吏部母髙堂為夀日游子在京華豈不榮鸞誥誰其侍鳳珈見萱即憶母陟屺倍思家遥望稱觴處白雲映紫霞山行初晴山路滑澗水正泠泠秋老樹多紫雨餘巒倍青參差髙下寺迤邐短長亭村酒不能醉寒風吹更醒送王伯楨叅晉藩世事真堪噱王生又外藩浮沉原宦跡陟黜總君恩霄漢天誰問風塵道自存所憐白首别黯矣各銷魂得續橋社長書寄贈二首相離當歲晩相憶又秋初聞鴈悲游宦懷人念索居客情無復道清興近何如自是嵇康懶年來音信踈近得緘來信憐君生事閒楸枰敲落月桐韻志髙山舊帖臨池補新詩閉户刪堪嗟為客者碌碌鬢毛斑題江長信霧靈山圖𤣥武之精化為石墮地幻作霧靈山去地不知幾千仭巉巗砐砢絶人寰中有廣硎之水黑峪之關天為薊門設屏蔽不令邊人飲馬于其間誰哉當關胡乃失守藁厭人血谿量人首妖氛慘淡塞垣􅇕敵騎憑陵壯士走一戰深慚正正旗三捷敢欺明明后西臺御史李汝培鐵面皂囊何雄哉封書暮入明光殿戰地朝看驄馬來江君故是埋輪者乘驄直抵關山下空壁蕭條餘釡鬵藏尸縱横遍原野怒氣勃勃起神羊寒威凛凛入彈章至今六月山頭雪猶是當年簡上霜於戲江君誰貌汝豸冠繡服猛如虎只今東有倭西有虜潢池處處鳴桴鼓願君攬轡一澄清掃盡欃槍報明主贈唐憲副母夫人夀君家慈親世難得白髪蕭蕭仍健食江鷗海鶴比精神霞帔雲冠照顔色有子今為外臺臣黄金為帶朱為輪已向虞廷稱萬夀還從孟母祝千春送劉効忠巡撫延綏四首開府須人傑維垣屬列卿符分竹虎去軾擁畫熊行號令嚴刁斗威名變斾旌羡君還自愧白首竟儒生宦是劉生拙崇階亦漸躋廿年淹塞北千騎向延西小范誰堪並大名君與齊丈夫多遠畧早晚破回奚誰云邊塞地城郭近來空聞道延州將猶稱列郡雄此行期破敵慎勿但和戎好使麟臺上書君第一功青油明虎帳紫塞控龍庭漢馬嘶卿月邊人識將星英雄頭未白事業簡須青莫道書生老猶堪一勒銘五十口號二首五十今朝是凄凉感歳時浮榮仗馬似生事蠧魚知老覺年來甚病惟歸去宜主恩慚未報容易鬢成絲初度逢揺落庭柯葉正飛歳華已不待心事復多違久宦慚金馬應還理石磯生平何者是敢道去年非逐婦行送陳從龍侍御莫逐婦逐婦令婦悲試問婦何悲妾亦有所悲不緣寳悵閒鴛枕不愁艷質妬蛾眉妾有一寸丹日織五丈素織作不辭勞何事君不顧君不顧兮妾無緣妾無緣兮妾何言當初擬與同生死寜知棄擲今如此妾豈願學隨風花妾豈願作覆盆水隨風花逐水流覆盆水不再收妾意與君相綢繆何無何有為君求君不悟兮妾心憂出君門沾妾臆欲行不行長嘆息莫言去婦無顔色倘君尚欲當窻織應知去後能相憶送常對水二首三十年前曽聚螢與君清夜坐談經蹉跎愧我頭先白濩落看君綬始青此㑹且􅂸酩酊醉明朝何處短長亭天涯朋舊憐星散厭對驪歌不忍聴太原亦是先王地質樸猶餘太古風君去好擕循吏傳政成寜讓晉陽公桑麻處處深山裏絃誦家家明月中何日仙鳬飛漢室都人應避五花驄甲午元日憶用韞他日逢元日開樽我對君此時吾謝客翻恠爾離羣懶醉長安酒空瞻海嶠雲弟兄寥落甚嗒矣坐宵分王伯楨入都志喜世間萬事難具陳伯楨乃作外臺臣仰天大笑去不顧抛却金紫如埃塵吾輩亦是奇男子肯令行止由他人世間萬事誰能保伯楨復走長安道囊中白簡久糢糊腰下黄金尚美好光陰去去如流水六七年來復如是當日英雄安在哉空令姓字汙人齒路人共指關西子七尺骯髒猶如此春花正發𤣥都觀暮雲空鎻平津里伯楨與君别來久窮交醉汝一杯酒胸中磊塊能澆否陶令當年懶折腰陳生有日終開口飲君酒為君歌所得漫言比仲多西夏豺狼雖授首北海魚龍未偃波中原白骨莽相望赤子恐弄池潢戈丈夫報國須少壯問君意氣今如何戲柬用韞問君山中何者好君言無事常却掃朝看小婦理新粧暮督侍兒尋舊草有時舞綵奉親懽頻沾餘瀝醉更闌錦帳酣眠不覺曙何能清夢到長安純之丈以予十六年官六品貽詩見笑次韻解嘲宦久成衰相官閒趂病身方慚趙氏璧敢嘆漢家薪愚拙應輸我才名實讓人浮榮今已足有志在垂綸夀譚中丞母慈母丸熊舊仙郎符虎新去持開府節歸慰倚門人榴火當樽艷荷香入酒醇添籌從漢沔獻祝指峨岷早逐潘家馭休回王子輪願將稱夀意散作錦江春客有説予學禪者戲答不諳貝葉編且傾竹葉酒醉中有真趣真言吾何有聞四槐丈至纔憑尺素慰相思忽報輶軒已在兹握手乍看疑是夢論心久語却成悲君才豈合長林壑此意聊將付酒巵南北于今多戰伐即看明主問非彲連日同四槐丈飲沈御史園有感昨日看花花滿枝今朝花已半離披因憐聚散渾如此始信衰榮亦若斯令節正當三月候相逢况是七年時共君痛飲不沉醉即使重來未有期夜月同伯楨飲直卿宅兼訂㑹期弟兄三十輩今得幾人存偶逐冏卿騎同傾學士樽人占星聚里吾喜月當軒此後經旬約期君不負言題李納言萱庭日永巻滄洲縹緲接青冥中有仙家萱為庭庭前一夜春風起春日曈曨照堦戺森森萱葉何青葱裊裊萱花吐金紫共道此花應有神託根日與松芝隣松柯如石芝如菌芝為顔色松為身可比崑崙老桃樹一度花開三千春送莊太史冊封楚客才名天下聞封茅直向粤南分千年帶礪歸宗子萬里鶯花屬使君獨秀峯含桐葉色七星岩動劍鋒紋壯遊處處堪乘興賦就應淩五嶺雲寄王清泉刺史故人多逺識早已宦情微林壑但寥落酒樽無是非心輕五馬貴人羡一鴻歸予亦風塵倦秋來思振衣五憶詩魯應紹應紹忘年友憐君老一經興酣時卜夜談劇每移星昔詫𤣥言白今嗟墳草青望廬思笑語雙泪為君零王公招旅邸相逢日開樽尚自親誰知生别後遂作死離人疾病工為祟文章竟誤身故園臺榭盡零落不勝春常子仁子仁吾黨彦雅志在公車詞賦金同擲丰標玉不如龍年忽冉冉鶴夢竟蘧蘧幸有佳兒在猶能讀父書克孝吾宗老伯氏今世葛天民有酒即拚醉無財不厭貧可憐泉壤下猶是孝廉身諸子近蕭索相㸔更愴神克敬最憐克敬弟戅直無它腸不戀儒為籍却躭酒是鄉醉能消日月病乃入膏肓誰復為吾益思之倍慘傷淡然軒集巻八
