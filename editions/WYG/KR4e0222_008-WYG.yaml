body:
  text: 淡然軒集卷八明余繼登撰詩送邢小槐戸部寒蟬吟落葉凉秋忽已徂鴻鴈紛南飛游子懷故廬如何我故人嚴裝方戒塗憶昔結殷勤與子兩相於披心見情愫慷慨意有餘何以喻綢繆譬彼雙飛鳬天風起蘋末同心而異趨一鳬厲羽翰翺翔向天隅一鳬悲其羣翹首相鳴呼豈無盈樽酒遲子以須臾對之不能飲涕下沾我裾㑹合知有時柰此音徽疎千里若比鄰斯言安得如願言加餐食努力恢良圖上以報天子下以慰離居獨酌花下倒新篘明月來相對醉忘花影重却疑月影碎壽米坤泉戸侯七十米二子伯舉武進士仲舉進士秦隴推名族燕京領佽非家貧緣愛客宦薄為知機曠達今誰竝壽年古亦稀仙郎文武彦榆景自光輝壽少司徒王見峯公七十公原以終養家居者葵藿原傾日桑榆轉慕親祗緣寸草意早乞老萊身靜久忘簪紱情恬愛角巾朝端曾讓徳閭里盡歸仁叅伯誇難弟中丞有嗣人無營神自王不競性彌醇駿譽推三達鶴齡始七旬莫言今白髪遂爾厭紅塵世事多新態君王憶舊臣應知虗鼎席佇見下蒲輪致主心仍壯匡時道益振東山髙卧起曵履上星辰瀛洲亭對雨五月苦炎熱瀛洲亭亦然千林忽過雨雙溜看飛泉萍翠無停梗荷珠不定圓新凉生坐席庭草盡堪憐短歌送亷菴之狄道少年與君友君氣薄青雲胸藏六甲術書著五千文壯年慕君義與君結婚姻君志不得遂坎坷難具陳近日共君醉燕市知君磊落猶如此晩拜一官狄道丞西去鄉關數千里前年敵騎入臨洮殺氣慘淡陣雲髙鬼火燐燐遍原野至今談者猶魂銷惟君聞之氣轉豪壯懐直欲凌雲霄請纓寧肯讓終子大將或恐非嫖姚送君行飲君酒丈夫金印須懸肘馬頭皂葢且輝光腰下呉鉤正鳴吼飲君酒贈君詩一語一杯君莫辭金城迢迢在何處日行日遠遙相思相思但望關山月猶似長安對酒時讀史二首王孫昔未遇垂釣在江干腰下鹿盧劍夜夜衝星寒朝受丞相知暮登大將壇壇上隆凖公回席願交歡嗟哉絳灌徒怒髪自衝冠拔城始授邑捕冦方拜官譬彼南溟翼萬里振羽翰枋榆有斥鷃搶地但仰觀世事良若斯志士空長嘆公孫年六十猶是孝廉身射䇿偶見收遂為侍從臣主愛詐亦忠赫赫侯平津長孺不解事區區論積薪淮陽久不調壯志竟沉淪空令千載下為爾泪沾巾哭泊陽王丈六絶君是當年王子喬忽乗鸞鶴上雲霄蓬壺自有神仙侣空為英魂賦大招湛湛清心玉不如姓名蚤已薦賢書可憐九待公車詔依舊青衫未破除與君偕計上燕臺裘馬縱横亦壯哉君志未酬今已矣壎篪獨奏不勝哀樓成白玉白嵯峨欲借修文君柰何回首鄉園頻灑淚故人零落已無多恠君日日拚沉醉只愛沉酣不愛醒今日澆君君醉否悲風吹雨晝冥冥白馬青袍事事新君家兄弟更無倫那堪一夜西風惡鴻鴈行中少二人君仲弟先君數月卒上已日崔侍御招飲東郊同劉太常涉河游覽時李太僕王給諫病不能從侍御索詩戲成二十韻三月天正和良辰當上已有客期修禊招擕幾知己連轡出東郊頓覺異城市髙亭何巋然磐石下碨礧野曠天欲低雨過林如洗極目衆峯青入座羣芳紫林鳥驚窺人睍睆良可喜春光倐强半好景能復幾當杯且莫辭不見王與李感此三嘆息浮白更酌醴欲濟無方舟肩輿涉河水水上敞髙軒孤峙河之涘軒側聞流泉可以潄醉齒何處送行人笙歌亂人耳行者君自行止者吾仍止去住亦何常悲歡竟誰是游覽未終竟斜陽已移晷䇿馬悵還歸髙興殊未巳停杯問主人何日重來此山中遥望西山岑白雲日歸去驅馬向山中不見雲宿處游荷花池二絶一雨過荷池池花嬌於女莫便輕折却或恐作人語白鷺白於銀獨立池荷下風吹葉乍翻疑是弄珠者贈用韞以予送子意知子别予心嘿嘿兩無語黄鸝鳴上林數日不見君疑似經年别忽道别經年相思渾欲結行雲豈不駛何如車上輪征輪已不見猶自望行塵予歌皇華章子咏停雲什問子來時期何似行時急甘紫亭侍御買妾戲贈二首明珠買麗質光映使君家試問閨中貌何如檻外花無慚金是字偏稱玉為珈寵極無人妬良宵自破瓜才子近乘鸞深閨比合歡醉憐眉月映舞愛髩雲殘倦倚鴛鴦枕嬌扶獬豸冠喜聞夫壻道昨夜夣徴蘭魏見泉中丞寄詩見懐書此奉答懷人西望隔天涯喜得緘書慰所思紙上韜鈐方叔畧公寄有撫晉事宜扇頭珠玉惠連詩羡君指畫消烽燧顧我蹉跎感歳時心事慚為知已道年來雙髩欲成絲夏日病中得家信二首近得南來信園林已就荒有星猶是客無日不思鄉簷樹夏偏茂茅軒午正凉何能生羽翼一枕卧羲皇日日說歸去蹉跎直至今宦情諳始淡鄉思病逾深不羡桓生馬寜須疏傅金一樽堪自適花下可長吟許少薇奉常請告歸壽尊人賦贈東陽有逸老雅尚在沉冥狂詠曾譏鳳貧帷毎聚螢瓢聲猶厭聒鼠味肯知腥憤發窮三傳謀貽但一經仙郎真漢俊髙步涉虞廷起草推長䇿伏蒲犯怒霆奉常酬壯績朝宁仰儀刑豈敢薄鴻路其如戀鯉庭陳情頻抗疏予告喜揚舲子以卿為月親看壽是星椿萱榮暮景岡阜祝遐齡莖掌擕金露華筵倒玉瓶齊年俱鶴髪雙杖竝鳩形誥下鸞新紫符來烏自青循陔思久渴舞綵意方寜菰米秋偏美蓴羮晩更馨君侯誇養志明主待祈靈海内況多事能容愛獨醒送鄭大夫晉明備兵川南岷峨西南一片石巉巖久與人寰隔洛瀘潏泊萬仞流嵐煙瘴雨紛相射漢家丞相曾廓清至今梟獍猶充斥兩川幕府稱驕兵一夫裂眦爭脫幘驅逐大將如嬰兒妖氛黯澹天無色縱横漫說釡魚游跳梁尚懼荓蜂螫滅寇虗言壯士規借籌還仗書生力大夫胸中富碩畫司馬署中聲甚籍朝來受詔明光宫慷慨夕出長安陌春明門外羅祖席大夫此行何赫奕腰下雕弧月一彎袖中寶劍霜三尺馬蹄踏徧棧雲黄嶺􅆐啼徹江天白虎符應令魑魅愁神羊坐使豺狼辟吁嗟乎巴人夷女盈路側滿眼瘡痍盡蒼赤標柱休言漢將功理繩且效龔生䇿何時刀劍易犢牛頓見干戈易麻麥戲柬劉効忠兵憲當年意氣請長纓笑領銅符徼外行朔漠烽烟朝入塞漢家都䕶夜談兵荒城日映旌旗色古戍風傳刁斗聲回首空閨人寂寞流黄機上月華明宫怨屏帷向月夜窓幽坐對星河黯自愁獨有齊紈伴寂寞凉風又到殿西頭送寗雲田徃荆州青絲雙控五花驄遥指荆南意氣雄兩岸曉煙迷逺樹片帆落日掛晴空雲連吳㑹千山合水入巴江一派通君去正逢秋色好仲宣樓在月明中送丁勺原侍御左遷潞安司理二首樽酒論心日憐君意氣賖一麾辭漢闕五月向天涯匹馬孤城暮荒村落日斜賈生餘涕淚空自灑長沙春明門外路去去復盤桓不是悲行役其如吾道難風塵雙客髩道路一征鞍獨有青龍鋏時時馬上彈題沈節婦巻侍御欽華大母也矗矗山上石青青石上松托根既以異貞幹凌蒼穹不隨春色榮肯隨秋風靡春去秋來自歳年年年勁節常如此吁嗟乎沈母之操無乃是結髪事良人夙夜奉姑嫜燦燦紅羅襦上結雙鴛鴦殷勤不惜理蘋藻此生自分能偕老人事從來錯迕多連理摧殘何太蚤上有垂白親下有呱呱子嗟哉夫子心九原應不死夫君死兮何敢生夫心不死何敢死朝供菽水暮和丸一旦紅顔為君毁有兒作賦能凌雲自言持此報夫君平原未竟生前志長吉忽修地下文獨撫遺孫心最苦指點遺經泪如雨凉月娟娟照素幃嚴霜片片棲寒杼黄鵠歌成倍慘然夜夜愁聞綠樹鵑幽谷倐回白日照璽書贏得君王憐六十年前相永訣記得托孤言更切兒今有子已髙騫鵠立中朝稱俊傑豸服歸來稱壽觴北堂大母年方耋赭然顔上丹猶是盈盈雙眼血皭然心上冰飛作蕭蕭雙鬢雪三春桃李競妍華後彫惟有貞松節吁嗟乎石可泐松可折沈母之名不可滅紀夢萬厯丙戌六月初九日夢中所得句不知何謂漫錄于此相望潮水濶相思潮水深相思不相見愁殺望潮心十月一日滿天霜露下平蕪纍纍荒墳入望孤一陌紙錢空墮泪寒衣知到九泉無春日郊遊連騎出郊甸翛然林壑間開樽依綠樹移坐對青山晴色當杯墮孤雲與意閒塵襟聊自適薄暮更忘還題費國聘市隠園四首避寵辭燕市為園在漢陰剪茅旋結屋種竹已成林泉石生幽興琴樽愜隠心風塵吾愧汝空自說知音大隠在城市清幽獨羡君鑿池堪受月架棟欲棲雲冠掛神羊影身藏霧豹文偶諳心所好不是為離羣幽意誰能識閒門且自扄荒涼仲蔚圃寂寞子雲亭以爾心能逺因之地亦靈騷人時問字太史漫占星十年丼澹泊三畝隔讙呶宦拙難招隠文成半解嘲才名髙漢署心事足衡茅前代稱禽向憐予獨繫匏九日柬用韞為問梁園客其如佳節何繁花當戸好秋色向人多忽動龍山興髙吟藍水歌倘君能汗漫載酒欲相過陸敬承有臺曰來爽暇日登之漫賦四首登君來爽臺直北見宫樹春條敷其華韡韡團朝露秋風撼霜柯零落非其故倐忽陰陽移榮悴猶朝暮人命良若斯胡為苦馳騖不如飲君酒豁然抒情愫志士愛修名達人貴真趣登君來爽臺東望平津宅髙門臨交衢軒車填廣陌大命忽以徂寥落非疇昔芳樹摧為薪空庭惟鳥跡盛衰更何常華豪竟奚益不如飲君酒長歌浮大白世事難具陳壯士腕空搤登君來爽臺南望長安道車馬何紛紛輦路無宿草懷璧意自衒彈鋏食難飽名利無終極紅顔鬱枯稿攘攘競歳時凄凄傷懷抱不如飲君酒與君共傾倒一醉空百憂當生以為寶登君來爽臺西望西山岑飛泉流陰壑初日照陽林岩棲者誰子容與山之潯蟬蛻遺世累放志獨髙吟我欲徃從之雲谿阻且深不如飲君酒洗盞更復斟古人有遺言金門堪陸沉寄李汝培太僕四首悵别春明路忽驚歳月除龍門何日御鴈字近來踈慷慨汲公疏寂寥楊子居巫咸憑借問天意竟何如西去風塵惡南歸道路賖主恩憐太傅不遣到長沙江上秋濤水瓊臺春日花知君能自適無夢到京華自是天難問誰云宦易工紅顔辭露冕白日卧秋風蹔跨揚州鶴聊閒鮑氏驄君身非阮籍肯復泣途窮君已將身隠誰能為國謀投珠悲按劍積羽詫沉舟莫嘆塞翁馬恐驚海上鷗難兄有令弟相對可忘憂贈道士玉皇香案吏貌古帶煙霞世上應無住壺中别有家掃松烹白石和露煮黄芽絶勝風塵客依依老歳華楊公亮出叅閩藩歌以送之楊公亮磊磊落落偉丈夫修眉大顙仍虎鬚一日千里名家駒胸中奇字幾千巻片言落紙紛明珠三十挾筴上公車賦成咄咄淩子虗平明簪筆直金馬午夜燃藜校石渠昻藏難入今人格骯髒不受時名趨自向人間丼匏落懶從天上借吹嘘吁嗟楊生亦太迂生也工瑟世好竽世人何賢生何愚漢庭誰復憐才子風塵直向天一隅青絲雙挽白玉壺送君醉君三百觚酒酣慷慨歌烏烏浮雲黯淡天糢糊欲行且復留須臾勸君更勿賦歸歟有舌尚存亦足矣有腰不折胡為乎男兒墮地蓬桑弧南北東西惟所如况君有手龍可屠春霖一灑七閩蘇流波不返白日徂容易白髪生頭顱試乗六傳清炎海猶勝扁舟老鑑湖吁嗟乎若雌若黄何時無為牛為馬從人呼安知此行非良圖豫章之材廊廟需竟看還子承明廬李夫人魂耶夢耶迫而察之恍忽兮其不可即近耶逺耶予實要汝奚徘徊其若疑泣耶訴耶胡不前令予心其轉悲休洗紅休洗紅洗紅紅不鮮休棄妾棄妾妾堪憐妾命薄如水嫁得游俠子游子夜夜游不歸賤妾獨上流黄機織成袨服與郎着殷勤願得郎心樂郎心不樂妾安託長歌行舞腰細歌聲長調緩聞激羽音飛繞畫梁玳瑁席翡翠妝斗轉銀河樂未央短歌行洗大白歌短歌歌短調更促樂極哀轉多白日暮朱顔皤曦輪不迴君柰何送蕭以台使秦兼歸省君家仲氏昔校文躡履曾凌華嶽雲華山道士久雲卧月明彷彿挹清芬君今持節秦中去此去經行華嶽路白社原分大國茅青驄遥