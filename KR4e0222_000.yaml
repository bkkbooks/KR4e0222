body:
  text: 淡然軒集别集類五明提要臣等謹案淡然軒集八卷明余繼登撰繼登字世用交河人萬厯丁丑進士官至禮部尚書諡文恪是集分奏疏二卷序記三卷志銘及雜文二卷詩一卷繼登卒後其友人馮琦選而刻之繼登當神宗朝以災異屢見上疏極陳一切誅求開採之害民者又請神宗躬郊廟册元子停礦稅撤中使時將討播州楊應龍因請罷四川礦稅以佐兵食復上言近者天地人皆不和怨毒凝結臣子不能感動君父故天地人皆以非常之變警悟陛下不可恬不為意云云語皆切中時弊其疏具載此集中詩文則應酬之作未免失于刋削然大抵平正淳實無萬厯中佻薄之習亦尚不失典型也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7de2400e8b9f8b8a5e47b22ab1753337d3ca154cd6648d1465508e565ef8e91d
