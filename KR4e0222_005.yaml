body:
  text: 淡然軒集卷五明余繼登撰雜著恩命録敘納言李君言其先大夫舊川公之賢也曰先大夫博學工文詞每試輒冠諸生諸生治博士家言者皆推轂先大夫為盟主先大夫性嚴重督不佞光于學一語不合譙呵立至以是不佞俯首受書兢兢焉不敢自後於常人先大夫數竒數上有司數不售晚乃以明經薦闕下喟然謂不佞曰吾拮據詩書之業蘄得一當以議功名於世而今已矣小子勉之于時不佞已舉于鄉顧不利于春官暨博一第而先大夫不及見矣益用惴惴思所以報先大夫者惟庭訓是遵是力兩宰巖邑再徙而至今官天子不以奉職無狀八載之間兩承恩命皆先大夫遺教也古人以及親而仕三釡為榮不佞既不及以升斗之祿奉先大夫又不及當先大夫之世徼一命章服以華其躬所恃以為先大夫寵榮者惟是天子之訓詞在今將授之剞劂以光昭來嗣唯子一言以引其端某竊聞古昔之制父得貴子子不得貴父即有瑰意琦行之士不獲資適逄世亦泯泯汶汶沕暗而名不彰當其時人子所為報其親者亦至祿飬而止不幸而仕不逮親祿不逮飬則終身怦怦抱風木之悲焉今制凡一命以上能其官者滿一考皆得以其貴貴其所生故非甚不肖者未有不克自砥礪冀幸人主之一言以內遂其私今之人子未仕則奉親以菽水仕則奉以祿不及祿則奉以榮名世之談者猥以名非賢者所先昔者孔子論孝不越揚名以顯父母至推本所由顯揚者曰立身行道夫能行道而後能立身身立而後名揚名揚而後父母顯名豈易易者哉上之人操其權而不以假人下之人藉上之權而不可以幸致上不假人而名始重下不可幸得于上而名愈重故凡為人父孰不思徼子之重以為重而情或不能就乎其名凡為人子孰不思藉上所重以重乎親而名或不能就乎其情納言君為郎官即名其親為郎官為大夫即名其親為大夫舊川公身未離泉石而載觀制詞所褒豫令人主惜才有生不同時之恨聲照海宇光賁玄扄人父所不可必得者而公能得之于子人子所不可必得者而納言君能致之于公即孔氏所稱顯揚者非耶夫人子之情至無已也然此身無可以自效者不能不有所假夀年假之天祿與名假之人主自天者非力所及而自人主者可以力致力所不及者末如之何矣力可致者願與君共朂之雙夀榮封詩敘洛陽孫子源成進士者十四載由邑令入為廷尉平為冬官尚書郎而其兩尊人尚健無恙也子源又得以其貴貴其兩尊人如其官子源既有淮上之役將歸而修定省之儀諸與子源遊者多聲之歌詩介子源以獻諸酌者豫小子得受而讀之短咏長言瑟瑟然纍纍然散如霏玉雜如繁絃鏗鍧焉如出金石即意别調殊總之徵實以覃思按節而成響揚令德之輝而效齊年之祝也夫詩言志也言生於情則真情生於愛則歡歡愛之心不洽而欲歌以言之雖工不情不情不歡不情不歡之言孝子不以事其親貞士不以贈其友蓋言之難也子源洛人請言洛事夫以賈生之才又逄明主乃卒鬱鬱不得志弔屈賦鵩身且不勝其幽憂拂抑之悲安能娛親蘇季子綰金印擁車騎揚揚過里中氣勢燀赫稱得意矣然始固不禮於親故其言曰貧賤則親戚輕易之其心豈尚有望乎由斯而談藉令其時有播為歌詩以誇頌者父子之間未必融融樂也子源尊人故業儒即以儒督誨子源非如蘇氏之親好生業而厭薄經術子源弱冠舉於鄉才豈讓賈生然不敢以才自豪意常有以自下者兩為令人稱其廉平為廷平時佐其長有所平反持身如持玉守職如守瓶子源服膺庭訓猶然若是其尊人之質行可知已夫江海能下而百川歸之人能下而百福歸之故今年已望七而雙白同榮躬食子源之報無已時昔人有言美意延年此之謂矣即河洛當天地之中人生而淳朴宜其夀考然取與子源尊人比指當不多屈也故能令聞者愛若父母慕若芝蘭愛慕之不足故咏之咏之不足又長言之忽出縱發皆出真致斯所謂言生于情情生于愛者耶子源行矣歸而坐兩尊人于堂發函出諸大夫所為詩歌一闋為上一觴生人樂事何以易此豫小子既無能佐子源之觴又無能為歌詩以厠諸大夫之什姑述所為欣慕之意而引諸卷端如此楚客吟稿真迹跋贈侍御華景先生性嗜書博覽載籍無所不窺尤究心騷雅之業及鍾王書法片言隻字務合矩度比自鄧州挂冠歸益與諸大夫觴詠自樂篇什日富先生歿三十餘年而先生季子京兆質卿始檢諸蠧蝕之餘勒諸貞珉以傳不朽間以一帙寄豫方豫與質卿讀書祕館見質卿工詩能作數尺字竊嘆服謂質卿能乃今觀于兹刻則質卿之能皆先生庭訓之餘也質卿有子方齠齓即能為儷語作字復矯健不俗則張氏之于詩于書亦若裘氏冶氏世專其業矣先生之詩調若筆法諸君子已有定評登不敢贅敬綴數語于末簡如此交河縣志後序萬厯戊子豫以使事過里中邑侯馬公持所為邑志示豫期相與訂成之豫數披閲見其搜羅今昔無間細大良工心誠苦矣苐嵗年既邈文獻無徵以三二君子之見聞而捃托二百年之典故父老傳聞不無疑誤乃稍為刪繁就簡以庶幾古史闕文之義卷列為七帙釐為二將授剞劂侯既為序矣復命豫序之蓋豫覽志感事而有杞人之憂三焉豫聞諸長老云𢎞正以前俗尚敦朴士以質行相髙野無惰農市無淫工啇賈無綺靡之奉下不敢干上少不敢僣長今何如矣美衣偷食即誦法孔氏者猶然無論啇賈農棄業為賈賈棄業為遊食輕􅏽之適聲伎之娛即無擔石者猶然無論豪富一語不合不難奮脰一朝生忿不難忘身貪忮好氣即詩禮家猶然無論市井甚者子凌父弟凌兄小人凌君子富凌貧少凌長俗至無禮而恬不知怪轉相效焉世變江河莫可挽也此一邑之田以畝為畝比邑之田或三之是以邑之一而當比邑之三或二之是以一而當其二按田以賦按賦以徵貧者不得不鬻田富人邑無富人不得不鬻之比邑之富人今大較以邑田計之土著者十四寄籍者十六以膄田計之土著者十二寄籍者十八以賦役計之寄籍者十一土著十九比邑之豪日操其贏餘以盡邑之腴田邑之腴田日盡于比邑之豪如百川之入閭尾不復返也此二邑諸色目生齒日繁用夏日難雄心漸熾少年無賴不作家人生業三五為曹遊間徵逐或貫酒呌呼為歡而持左道以恐喜人意者能令人信其説而不信度忍背公而不忍背其師説諸色目與諸無賴合而黨與盛諸無賴與諸左道合而黨與愈盛故鴟張之雄不以救死而以作姦鼠竊之盜不于村落而于城市忽焉鳥散忽焉烏合問之則衆不可問不問則漸不可長久之將河決魚爛而莫可收拾矣此三語曰明者睹未形故具獨睹之識者多摧虺之計而弭未形之患者非駭鳥之機今觀侯之治行如興學校明教化以導民均田畝平賦役以惠民減課稅以通商民嚴保甲以禁姦民此其平易近人無赫然矯虔之竒率人所視以為不足為者而繇其道能使民安其業而閭閻無愁嘆之聲究其歸將默化潛移擴然大變其俗而使民不可與為亂驟而舉之不為急循而行之不為緩朝令夕效而人莫能名其利一時行之百世賴之而人莫能識其端又念此法行則民安此法不行則民不得安我為政則法行即我不為政而利害碁布明如列眉有能尋端而復故者焉則法行厚于惠下而薄于徼名周于計目前而深于慮久逺此其意豈獨成一邑曠闕之典而為是觀美者哉家大人纎嗇治生家政有經矣猶然稽其管鑰籍其出納以遺後之人為貽謀計侯之意亦若斯與昔人有言前事之不忘後事之師也豫不佞妄意作者之志而漫綴數語末篇以告夫後之司牧者夀萱圖敘世之至艱至苦者莫如人母矣彼男子得以經營四方衣食其妻子婦人以夫為天不幸而偕老之願不終而又無素封之業丹穴之利則所恃以撫諸藐孤者舍機杼之外無勤焉即勤矣未能必其子之成立成立矣又未能必親見其成而身食其報故曰至艱至苦也故人子于母念無可為報者惟有居則積學仕則奉公兢兢無敢踰越冀徼升斗之祿尺寸之榮以奉母一日之歡既得遂其歡心則又惟有稽首籲天願其母夀考康寧庶幾得常沾祿養永享光榮而已豫與崔侍御德嚴交知其母太孺人之賢若太孺人者所謂至艱至苦者也太孺人事封君甚謹封君自五十即善病病兩載竟不起於時侍御才弱冠又有四弟兩女弟齠者齔者孩提者傫然也封君性故豪不治家人生産而藥餌所需復減其産什三太孺人于時即欲以身殉封君而顧諸傫然者環膝下啼且號也輒又自度微未亡人誰其撫此者於是抆泪易慮攻苦茹荼日夜就機杼軋軋不休以督侍御于學而哺飬其諸孤也蓋又數年而德嚴為博士弟子以至成進士令渭南入為侍御其令渭南也得以考最晉太孺人今封而諸子女亦得以時畢其婚嫁兩季復有聲于􅓺校間太孺人喜而後可知也曰吾始望不及此此可藉手以報夫子矣而機杼之勞猶昔也蓋昔以供衣食而今以供施豫豈其有文伯母之思乎抑不以既貴而忘艱苦之習乎故曰賢也太孺人今春秋六十有三諸大夫有繪圗為夀者德嚴以示豫中為萱旁翼以松以竹以桂夫萱有母道喻太孺人也松喻其操竹喻其節也桂有子道喻侍御兄弟也豫既從諸大夫後得與稱觴之役因略述太孺人之所宜夀者如此而復為四歌以佐酌人萱之歌曰旭日上兮扶桑照君家兮髙堂堂有萱兮翠為衣萱有華兮金為粧挺孤莖兮特秀羌獨異兮羣芳日映萱兮有曜萱永日兮無疆松之歌曰北堂有松兮何孤孑徑色亭亭兮真竒絶新霑兮雨露舊歷兮氷雪鬼神護兮虬根深霹靂行兮霜皮裂君不見五大夫兮久摧殘三貞女兮寒煙不滅竹之歌曰有竹有竹兮檀欒兒孫茂兮根孤盤聲蕭颯兮秋風急影凄清兮夜月寒五色丹書來彩鳳千尺翠羽舞青鸞眷森森兮徑節報嵗嵗兮平安桂之歌曰有叢者桂甘露零兮枝分為五列萱庭兮言采其實栗以馨兮酌言薦之以永遐齡兮吳氏榮恩録敘南川吳君博綜百氏于書無所不窺好攻古文詞片語隻字不襲今人口吻以是有聲藝苑亦以是不利于南宫久之乃出倅邊郡詞人大都不屑吏事而君能竭心佐理治有異等之效兩臺使者交薦之滿一考得以例贈其尊人如其官君將以所得制詞授之剞劂題曰吳氏榮恩録而問序於豫豫惟人主不假人以名有以假之皆恩也人臣得假上之名以為名皆榮也然為人臣者不得以名為榮為人子者不得不以名為榮何者為人臣而以名為榮則有希名之心有希名之心則有希名之事蓋事至希名無所不至矣無論名不可以幸得即可以幸得奚榮焉若為人子而不得以祿及其親則不得不以名榮其親彼仕宦而兢兢然潔身修業尺寸不敢踰者非獨人臣之誼宜然亦冀徼天子之恩命以為其親光榮也故人思自榮其親必不肯自辱其身而家多榮親之子則世多奉公之臣此其道兩相成也吳君郡倅耳郡倅而徼榮于上者百不得一而吳君得之如操左劵此無他無希名之心也心不希名則事不近名不近名而名隨之故足榮也嗟夫今之吏治病在飾名而飾名之甚者莫甚於疆場之吏是往往飾偽為真以博天子之湛恩殊榮如取諸寄噫人孰無心彼其心不知遂以其榮為榮否彼其親亦不知遂以其子之榮為榮否然使為人臣子而盡如吳君也人貌榮名當無愧矣梓文昌戒言小引易參伯君選梓文昌化書於晉中以訓晉人豫觀九十七化中有似有者有似無者似有者可信似無者可疑夫欲化民成俗而使觀者謂有謂無半疑半信非所以示訓也若曰姑為是神道設教以感動愚氓偕之大道則何若取其事之所必有理之所可信者明白告詔令人憬然覺悟而曠然一變其俗哉暇因採其中五章俾臨令常君付之剞劂豫與常君曽從臾李參幕創建文昌祠於吾鎮之南復為是梓布之亦以吾地士風澆漓俗尚薄惡仰愧神言俯多鬼責蘄緣是以牖之也於戲人各有心心各有主豫與君聊盡其心耳是非從違則各在其人吾輩安能知之廣嗣一助小引淡然子曰天地之大德曰生此天地之仁也亦天地之心也人得天地之心以為心故心即仁仁即人孟子曰仁者人也仁人心也人能保守此心使滿腔子皆惻隱之仁則生理全具如榖之有種果之有核未有不生者也惟不勝其嗜欲之私瘠人以自肥戕人以自利則仁心喪失生理牿亡如種已腐核已壞即日培灌之而使之生不可得矣豫觀稗官小説見古之人有以仁心為質者生育之祥輒隨以應彼其一念偶發何嘗有心于求報此亦可驗心即是仁仁即能生其機不爽也因録數十條梓之布之人人為廣嗣者之一助秋塘遺草小引伯兄秋塘聰頴絶倫下筆言語妙天下善談謔輒傾坐客坐無伯兄衆即為之不歡其豪宕如此亦竟以此敗豫生也晚不及記伯兄顔色與其行事聞諸鄉先生言猶厯厯如睹一日過馬君汝調語及伯兄汝調出其家所藏伯兄五言近體三首七言近體四首小令二首讀之再過不覺潸然嗟夫以伯兄之才既不能涉文石之階議功于世又不能修竹素之業流譽無窮而自令淪落以死蓋不善用其才而反為才所用也亦足悲矣豫因是欲索其餘者校而輯之而二十餘年不得一語久恐逸去乃出諸書笥繕寫之以付梓人夫睹文豹之一斑者即知其大于貍故為數言引其端令吾後世子孫知有伯兄也應天府鄉試録後序萬厯十九年秋八月復當比士于鄉上命諭德臣可教往試應天士而以臣繼登輟講帷事副之既竣事當籍奏臣宜有言序諸末簡臣竊自念臣可教所為訓告諸士者至切矣臣即有言何加焉無已則請以人臣事君之義與諸士相正可乎諸士誦法孔子孔子語事君者多端而其言莫要于勿欺然勿欺亦甚難矣何者人臣受事職任不同自贊化調元暨展采錯事有能謀國如家不愛其情處國如家不愛其力者是之謂忠世主願以為臣矣若夫自贊化調元暨展采錯事之間無一事不可與君言無一念不可與君知斯之謂勿欺非純德不二心者不能也故曰難也臣嘗謂天之生人材質有限不可強至而所可自靖者心原繁有言臣無二心天之制也無論君臣分義必不忍欺即儋君之爵食君之祿不能極身無二盡公不還私顧一心以計國家之利害復一心以計身之利害是二心也兩心者不可以得一人殆難與事君矣此無他榮身肥妻子之念橫于心而為國家之念分也主上勤求治理屢下責實之詔期與大小臣工一德一心共臻太平之路德意甚盛然謂今之世而無不欺之臣臣何敢過誣天下之士大夫謂今之世而盡不欺之臣臣又何敢過信天下之士大夫為人臣子而至以欺名自扞文罔則將開人主不信之端夫既無能積誠于下以感孚人主乃俾人主不信其臣是始焉自懷二心終令主臣二心也主臣二心其患有不可勝究者有臣如此罪滋大矣諸士方俯首受書也見古之人臣有敢為欺蔽者不扼腕而非之乎曰吾獨不為耳聞今之人臣有務為欺蔽者又不扼腕而非之乎曰吾獨不為耳諸士今離奧泄而與計偕行即登對大廷為天子使且身自為之矣其務精白乃心勿為醜飾勿為偽善勿令天下復有以諸士之非人者而非諸士也留都豐鎬舊京其江山靈秀是地所自有無俟臣言都人士融浹棫朴之化文章藻麗為宇內嚆矢此諸士所長亦無俟臣言故臣直以人臣事君之義為諸士申告之臣非敢謂諸士獨少此也懼涉世之始志趨弗堅榮身肥妻子之念或得以易其生平如是則見利必溺見便必奪是欺之階也故先為不必然之説以堅其志而導之趨耳皇上明如日月威如雷霆臣下有隱情飾貌罔上行私者即遠在數千里外猶如目見三尺之法時加警焉一時臣工滌心改慮凜然思易其絃轍此諸士所明知也藉令萬有一得僥幸於文法之所不及生還鄉里然令父老子弟指而目之曰夫夫也是為臣而欺其君者良士羞以為友肖子羞以為親即戴面目視息於世詬彌甚耳寧死不願諸士有此行也臣才品最下經術至踈又守在間曹無所短長欺不欺何所可見獨兢兢守勿欺之訓時自檢飭尚得趨步時賢厠執經之末况諸士才力十倍于臣有如當官效職去智與巧直立而不撓素白而不汚行不毁方守不易操一稟不欺以報主上聖主當自知之無憂弗任矣臣待罪詞垣久行藏何敢預期然姑與諸士約自今日始有如臣之服官而或沉于欲涉於欺以干清議諸士無以見臣臣不佞願與諸士共圖之矣武舉録後序臣繼登往試士留都嘗誦所聞人臣勿欺之義以盟諸士今上不以臣為不肖復命副左庶子臣琦典試郡國材武士臣念今西夏叛人誘敵內訌兵連三時不解而東南山海之隩釁伏朝鮮方思與大邦為讎主上深惟疆場多事俞司馬請廣制額蘄得沈雄智略士以布列行間收蕩平之效德意甚盛顧臣豎儒也安所得方略以訓告諸士請即所盟留都士者與諸士盟臣聞舅犯有言繁禮君子不厭忠信戰陳不厭詐偽斯言出而使詐之説倡介胄之士遂以欺為所不諱臣竊意忠信詐偽此不可兩存不可兩用者也若詐偽可用于戰陳則是戰陳之間無所用于忠信而君子之懷忠履信者獨可用行禮不可用行師乎又何以云師貞吉也或者又言詐者詐敵非詐民也夫詐在心不在敵與民若于敵可詐于民可不詐遇民即不詐遇敵即詐則是一人之心乍偽乍忠兩存兩用此必不然之説不願諸士之聞之也臣嘗謂人心之欺至難制也而尤難制于功名之際然功名亦有分矣功為實名為虛實者難成虛者易就難成故人思以偽成易就故人率以偽就諸士試觀草昧之初熊虎之士必不二心之臣彼豈獨以法網不可欺為是凛凛哉豪傑之乘時翼運者志固以功為名不欲以名為功此其人即令之欺不欺也承平漸久剛毅之氣銷為愞熟愞熟之習化為譎詭謂不飾名則無以見功不見功則無以牟利智巧之夫於是有以名為功者以名為功有三端有舉事微當偽而增之名曰功者有實無其事偽而飾之名曰功者有已僨其事偽而覆之亦名曰功者此三者皆得利去是以始而為其事者為嘗試久而習其事者為固然始而受其欺者不能知久而知其欺者不能問臣足不履邊陲何繇悉邊事試以意與諸士度之自古有斬首捕虜數十百級而我士馬所失亡十不及一者乎有敵衆數萬闌入邊地浹旬矣我無能以一矢相加遺遂還軍去不虜掠者乎無寧惟是方款市時固言乘間暇修備也今既二十餘年矣諸所修備能加于往昔乎尺籍伍符無減于昔司農按符籍而輸餉不乏也何一有緩急而輒稱召募豈卒伍遂空如是乎如是則內帑所嵗輸者又安所出入乎夫自上視下下或可以欺上自下視下下必不可以欺下諸士當明其不然矣以是心而欲應主上拊髀之思宣力疆場建天山瀚海之勳胡可得哉夫欺非愚人之所能為也其能為欺者必智者也智以決勝則無不勝智以料敵則無不敵乃心思智慮不用以勝敵而以罔上此臣之所未解也無論聖天子明見萬里之外無所容欺即或念邊臣苦暴露功疑惟重繇此而剖符延世亦為世所姍笑有餘愧矣諸士執鞭弭而來也十六皆世胄也其先世皆所稱豪傑翼運以功為名者也故名至今不衰而子孫亦世食其報此非食其名食其功也詩人言無念爾祖肇敏戎功故臣願諸士之繹思矣且天下無事功或可以名圗天下有事功必不可以名立即今叛人據堅城不下何可欺曰已下東師覆沒不返何可欺曰未覆此必不能矣嗟乎爪牙士上所伏以固圉銷萌安靖四方者也乃一旦東西顧皇皇然若無所可寄則三載一舉士謂何臣實耻之此無他機械之智工而戰守之略踈也是欺之流弊也今天下積弱極矣所貴為材武士者謂能轉弱為強也強弱在氣厲氣在心有如將以一心鼓士氣士以一心自鼓其氣則激水之勢可以漂石射石之矢可以沒羽而謂不能敵愾奏公臣不信也諸士慎勿欺哉宣力效忠紓皇上兩顧之憂臣竊有厚望矣汾陽縣儒學記萬厯二十有三載中丞魏公撫晉之明年請改汾州為府設汾陽縣以附之移州學為府學而汾陽建學設官如制詔可於是中丞公檄冀南道分巡參政麻君督同知白象知縣蔡成已相郡東關巽隅得地一區闊八十丈長四之一諏日鳩工飭材庀具中為大成殿五楹左右廡各二十楹南角房各四楹北角房各三楹大成門三楹外為名宦鄉祠各三楹又外為櫺星門坊者一門外東西坊各一右為明倫堂五楹其上為尊經閣東西齋房各七楹居仁由義門各一儀門一東西號房各十楹儒學門三楹後左為敬一亭三楹右為啓聖祠三楹又後教諭訓導宅各十六楹前為泮池其城雉對峙者為青雲坊一費取諸撫院酒課暨修府支剩餘銀夫役取諸民壯於百姓無與焉計物與價計工與直價無溢值工無曠日經始於二十四年七月至明年三月而工成費金錢二千四百有竒役竣麻君以中丞公命徴豫為記豫既紀其嵗月而復申告多士曰學以明倫自三代至今未之有易非不欲易以窮理盡性此其本原化民成俗此其要務不可易也子夏老於西河非汾人所嚴事者乎彼以文學稱於聖門而其所謂學者不越父子君臣朋友之事後乃有髙談性命妄稱頓悟者其流之弊至謂人倫為幻景謂惇倫為鄙事此學之大蠧而兩觀之誅所必不赦者汾士生於賢聖之域服習賢聖之訓天性醇朴必不惑志於邪説此無足慮然不慮其有惑志而慮其無定志也以子夏之賢不免入聞聖道而恱出見紛華而恱而况於後之人孔子十五志學至三十始立四十始不惑不惑始定立未可以言不惑也是豈旋致而立效者也青襟之士羣聚學宫誦讀孔孟其志孰不欲為孔為孟乃紛華靡麗與接為搆又薾然靡執矣此不定志之故也故曰隱居以求其志求志者求定其志而已諸士方隱居之時學宜無先於此者志於道德志於功名原無兩志蓋道德虛位功名實用用之而正功名亦道德也孔子思東周顔子問為邦何嘗厭薄功名彼以功名為可厭薄者為世之一切以就功名者言耳自豫通籍而靜觀功名之士或趨勢或趨名或朝附勢而暮附名隂為勢而陽為名此其人百巧百慧自佹必得卒之有得有不得總為世所指笑惟志定之士不然目無勢心無名廉不言貧勤不言苦忠不言已效公不言已能世或信或疑或巧排而思中官或沉或升或齟齬而不通惟獨立行一意而不變若中丞公是也諸士觀其訓士與其服官者而其志可識矣夫士也既已俯首受書自異於凡民奈之何志不素定以至隨時上下如波流草靡宛轉無一特操哉此士之耻而教之不明也豫謬典三禮職司教化憤邪説之汩士而士無真心一志為國家分猷念者故思與諸士共圗之詩曰視民不恌君子是則是效豫不佞無足為視者諸士而思則效有中丞公在矣中丞名允貞大名府南樂人麻君名溶寧國府宣城人及諸有事茲役者法得並書於後欣州城記欣州於古為陽曲外控雲谷內蔽全晉最稱要害而地勢平曠無河山為之關閡有警則憑城為守城僅築土為之易於潰壞至嘉靖之季敵人無歲不至欣父老子弟時苦蹂躝蕭然不支矣議者屢欲甓以磚石而蒿目瘡痍之民不任力役又官無見緡議輒寢比和議成益復因循二十餘年郊無壘州無城城無守禦之備垝垣敝甲以待市而不虞其變萬厯丙申巡撫中丞魏公行部至欣慨然太息亟令主者揣厚薄度崇卑量經費凡既具矣與督府王公合疏以聞報可則先斥酒稅數干金為經費而部使者治兵使者暨郡守以下各搜其贖鍰若大盈庫糧銀佐之力因戍卒食因月餉費出自公物給以直上不煩科徵下不虞賠纍經始於某年某月訖工於某年某月城髙四丈二尺石基八尺周一千九百六十丈樓櫓埤堄靡弗壯麗役兵壯三千人糜金錢二萬六千七百有竒工竣署寧武道事參伯易君具始末請紀其事蓋自豫通籍見封疆之臣無嵗不報修築之功無人不受修築之賞至於足稱金湯足資保障者可指數何其飾名之易飾備之難也中丞公實心任事恥以虛名邀功其下吏亦實心應公罔敢以虛文塞責撫晉以來日尋隙漏日思補苴所為繕墩堡修亭障者所在皆然豈但欣之城欣民賴之已哉敵奉約束邊人釋戈負耒孰不謂可幸無事獨公凛凛焉設險固圉若敵旦夕且至者豈故過計衆人之見常在事後忠臣之慮常在事先無事不知備事至不及備是終無備也有備無患與患至無備者功相萬矣公之心敢自謂吾已興起吏治拊循士民簡練戎伍輯寧疆場可以不待城而固遂博安靜之聲遺後人以艱乎城中故有白鶴觀創自唐開元間每二月望羣鶴戾止因以得名見元遺山記中兵荒以後不復至者踰三百年城成而羣鶴如期復集觀上中丞公紀異詩有胎禽候月雉堞連雲之句夫羽族飛類得氣之先則欣民獲奠枕之安享緩帶之樂此其一徵已茲城為瑞當與和龍白鹿同符詎獨可名其觀哉古者慶祥即不必備述而一切工築無巨細必登於國史豫從史氏後當備書之是役也專理者為太原府同知賈一敬分理者為欣州同知邱允升太原右衛經歷柴貢總理者為太原府知府趙彥欣州知州張堯行法得並書鄢陵令何君德政碑記侍御陳君嘗言鄢陵令何君之賢也其言曰豫按中州嵗大祲人相食胔相鬻也主上憂念特發內帑賑之而有司且有私以自腴者獨鄢陵所積榖至萬餘石何君又周行境內視民空乏者發倉榖為粥食之不足則繼以帑金繼以俸繼以勸分矻矻然窮日夜力若視其家人子弟之阽于危亡也是嵗豫之地道殣相望而鄢陵無野殍則何君之力也豫心識之意其人必負有材諝者踰年而君以髙等入為西臺御史比與君晤則貌無過恭言無過詞恂恂真誠君子也退而竊嘆天下事惟真誠者為之而材諝自負者不與焉彼有所負必有所飾以自見上好耳則飾聽上好目則飾觀意無不飾則心無不用固不若真誠者不自負亦不自飾而一心於民事者之有益于民也昔人謂救荒無竒策言用竒䇿者不可用以救荒而救荒者以實意行之固無所用竒耳則何君之謂也又踰年而鄢陵之士大夫父老子弟列君治狀請為文勒石以垂不朽其言救荒大指如陳君言其他言君天性亷自奉無所紛華即雞豚蔬菜至瑣細也亦自蓄自植不以口腹煩民也訟者至庭諭而遣之再至再申諭之申諭不改而後加法焉憫其以無知罹憲網也榜嵗賦之數使民周知之為匭于公使自輸之恐猾役漁其利而民受其弊也決獄停法豫掾吏輕平者其深文巧詆之夫輒斥不用懼姦吏傷官法也北之溱洧南之潁以邑為壑民苦不得耕君督民為隄防躬行畚鍤間卒變沮洳為良田貸種具俾以時耕作謂水不障則桑麻不植于野野蕪曠民乃菅也新學宮周貧士置鄉孰明教化勤恤孤寡表揚節孝謂此師帥之任所以端風化之原示導民之路也種種約已裕民諸政皆材諝之士所視以為不足為不肯為者而君殫心為之亦以令之職當如是非以為德也彼其時民亦安之不見德也君既去而後知邑不可無君則思思之不已則思紀君往事之迹以為後事之師夫民心至神飾偽以動之則亦以偽應之其偽應也若感其既往也若亡固不若操其誠以託業于民者能使民之久而不忘也人有持餌以語孺子者曰若德我我飼若孺子必應既食而復欲其德我不可得也父母日乳哺之未有以為德者比離懷抱疾患痛癢切于身始呼父母而思也以舍父母無所可呼也思之至也鄢陵之于君何以異此今之吏治病在于不誠如積榖良法也乃取於民者金也而以之上聞則曰榖據其上聞無不有榖也而比其散也則無榖下明知之不敢言上明知之而不言此以為利彼且復然前以為利後且復然至于民飢欲死即有金錢無所得榖坐視其流離顛踣而無䇿以蘇其困則胡不引何君之事觀之也陳君按部時一嵗中斥鍰金萬三千為郡邑糴本此誠心愛民者故于君之實政亟稱之而亟薦之夫誠可以動人亦可以率人君且出按郡國矣有如以此心核羣吏某也誠某也否寓鼓舞于激揚人將洗心以象意指惠之所及者大矣豈獨被于鄢陵之民何君某曹州人己丑進士陳君某唐山縣人丁丑進士光祿寺續題名記光祿寺舊有題名石前光祿卿吳郡章公所置也嵗月既久標題已遍今光祿卿維揚李公礱石續之而問記於豫豫惟光祿所司自郊廟饗祀王人膳羞暨於羣下廩食朝使宴賜蓋重且巨亦煩且細矣人情恆謹於重巨而略於煩細見謂清卿不當親細事輒諉曰自有主者不知至難詰至不可詰至為弊竇者即在於至煩至細之中夫吾既為之長二乃以清貴自逸令民脂民膏日屑越於弊竇而莫之省憂職守之謂何聞有蔚公者在光祿三十年無一事自諉無一物自私有弊必核有詰責必引咎自歸當世賢之聲稱至今嗚呼由前而觀有不為蔚公者亦有不能為蔚公者可指數已然此其斤斤舉職者耳昔屠蒯語晉侯曰味以行氣氣以實志彼人主斟酌元化調劑羣品者惟有此志而志實于氣氣行于味大哉味乎所飬係之矣故周禮膳夫飬王后世子饋食膳飲皆有定品而其式一掌於太宰又王日舉食膳夫授祭品嘗食王乃食以天子之玉食何所不足而太宰乃為之式其左右便嬖豈曰乏人而膳夫乃為之主膳為之嘗食古人所為防微杜漸意深逺矣此職漸廢而大官膳羞至易為金錢説者遂謂金錢之可會也猶愈於膳羞之不可會是未逹於古人之意者矣夫王人之饋食必有職之者不於外必於內內寺之愛君不如外臣彼且從君之欲安敢為之節彼且逄君之欲又安肯為之節無以節之而惟欲之適欲亦何厭之有誠令舉周官之典修膳夫之職定品物之式明嘗食之義甘瀡醲鮮不縱其欲飲食醉飽必適其宜則以物飬性不以性飬物不鞔其中不滑其和君志清明君身強固由是執圭而饗上帝吉蠲而親祖考御明廷而宴賜羣臣清廟明堂之頌作鳬鷖既醉之風洽叶氣薰蒸宇內太和此其效豈獨斤斤舉職者比哉李公慷慨有大節方按畿輔時以直道結知人主再起而至今官鹽梅之具其所素蓄茲舉也倘亦有調鼎之思乎彼美惡懲勸之説前記已詳不具論論其大者以望公并致望於同事諸君子林天迪𣙜稅清源記豫薦鄉書出大宗伯文恪公林先生之門先生伯子天迪能文章明今昔之故為民部大夫聲藉甚甲午嵗大祲司農告詘上詔廷臣策之天迪應詔陳便宜娓娓千餘言天子以為辨令𣙜稅清源踰年而清源族賈願藏於市稅入溢往額會得代乃更為圗歌頌之復謀鐫之石為後事師以豫善天迪介門人江選部請紀其事豫惟清源海岱都會五方之輻輳而萬貨之藪也語云翡翠盛而貞姬惑士君子處泉貨之境蓋難言哉且其俗儇黠纎薄非若愚氓之可紿也其駔儈偵夫影射乾沒非一耳目之所能及也𣙜斯地者亡論墨夫即自處潔矣而關市之征人各為政縱潔其身何禆國計故箕斂隕名薪束招謗所從來矣天迪何術而得此於清源哉江子曰鄙人何知嚮其利為有德彼熙熙攘攘以利來也以利來必以不利往往則見謂厲已而詛來則見謂利已而歡情固然耳使君之𣙜清源也甫下車即宣言于衆凡吾所以來務在利若曹耳往昔清源𣙜額才四萬今已倍於昔化居蕭條又十倍於昔嵗有登耗必欲按籍而取盈人且望望然去之皮之不存毛將安傅今與若曹約第關無闌入貨無悖出法外無征已又宣言於衆廉賈五之貪賈三之貪生姦姦生弊與其懲于既弊孰若禁于未然今而後闌入者罪無赦悖出者罰有差衆聞而色喜復相戒使君神君乎無自速戾矣於是逺者近者推挽而至者錙錙銖銖罔敢作姦犯科竿牘不及門筐篚不及境稱使君平者如出一口豫習天迪不知其𣙜清源能若此劉劭曰清節之流不能𢎞恕大抵不廉者嗜利不平者嗜名廉以名取每以夷自視而以跖視人其究也民無所措手足故不平之害甚于不廉天迪世祿之家不患不廉患不平今能平矣豫與天迪遊見其含毫濡墨蔚為聲詩意謂文士耳今乃為能吏説者每謂文人不習吏事授之握算不知縱橫以今觀于天迪非然哉金龍四大王靈應記萬厯戊子豫承乏祗役周藩四月二十六日偕大行林公寅賓陛辭南發五月二十一日抵大梁行册封禮二十三日北旋先是過封丘封丘疫甚至市空無人豫不忍再經其地乃取道陳橋以歸是日日晡見有孤舟維于野岸輿人指曰此渡處也豫登舟促之解纜舟人漫應曰暮矣請俟明日再促之寂無應者僕人告豫河濵故多盜此野渡非停泊處豫曰可覔一民居豫將寓宿焉既而日漸暮咫尺不辨東西數里內無居人左右益惴惴豫解之曰盜者不過利人財耳豫一介行李原非宦遊在汴才兩日又餽遺無所受彼中役人當自知之奚虞盜為遂假寐舟中詰旦舟既發聞波濤撼舟舟與水敵湱然有聲聲漸猛如鐡騎千羣銜枚而疾趨也如萬章之松怒飈吼而為濤也又如雷霆震發而巖崖摧裂也豫異之以問僕人風乎曰恬無風也逆流乎曰順流而下也豫益異之問濟乎曰未也數問對如前時舟已向危豫訝問故僕人含泪而前曰事不濟矣豫曰何故曰舟已膠柁已折如斬諸維舟具俱沉波中矣豫念舟之所恃以行者柁也急流中而柁折奚恃以濟僕人將言而囁嚅者三豫詰之曰舟人祈豫禱于神而未敢言也豫笑曰孔子不云乎丘之禱久矣豫生平有愧于神正宜投之濁流不然神與豫何讐與魚鱉何親哉左右皆泣泣下沾襟豫復笑曰若勿恐豫為若禱乃具衣冠將望禱焉舟人曰此自有神無庸望禱也導豫至神所神可尺許為武夫狀而容甚雅豫再拜祝曰豫小子以使事既竣道于河以歸逄神之怒舟膠不渡豫小子罪也然以豫小子之故而震驚龍節豈惟豫小子之罰亦惟神之罰惟神其圖利之禱畢坐舟中憶杜子美曽有詩云蒼茫不曉神明意若為豫今日設者因自檢此心所繇以獲譴于神者不可得獨望汴中曽戲為二絶云驅車過夷門懷古三嘆息可憐虛左賔獨有竊符䇿又云朱亥誠勇士俠氣薄秋雲何事袖中椎不椎秦將軍豈以口語遭二俠怒耶審若是神亦不能為之辭矣復意神者聰明正直而依人者也故非人不因遂召舟人謀之一舟人至年七十餘與之語聵甚不能辨豫曰再召一人來曰尚有一人在河中拽舟矣豫大訝之問他篙師何在曰舟人十二祥符令攝去其四五人疫一人病一人老其壯有力者一人即拽舟者也豫令之上謂之曰汝奡蕩舟乎在中河何為其人叩頭太息曰知無能為然不敢坐而待溺豫問曰此中有他小舟可取以濟乎曰有然甚逺恐不能待豫曰豫不能待能飛渡乎第往取之其人浮水登岸而去時按中州者同年王公世揚所遣送役亦在舟中恐甚向豫泣甚哀豫慰之曰命也泣可濟豫將泣泣不可濟即泣奚為其人抆泪而去豫兀坐有頃舟忽震動座幾傾豫意此舟破矣恐怖顧左右問曰誰運舟者乎曰老者病者力不能執楫誰其運舟曰舟行乎曰行矣豫起視之舟果望陳橋行如有挽之者前之水聲不復聞矣舟中老人跪語豫適禱于大王大王有靈舟今果不操而發豫問大王何神曰金龍四大王也豫地舊有此祠然不知其靈應若是此時操舟無人舟秪自運雖發而甚遲去岸不半里而中隔一洲洲長可八九里日將午前所遣舟人以小舟至豫登小舟波浪頓息水平如掌鼓枻中流亦一竒觀也須臾抵岸岸側維一巨艦旁繫一小舟乃憲副趙公耀所夙戒者其遣役言久已泊舟於此候渡奚為自上流發也既而詰其故乃祥符輿人令艤舟於彼以省陸行之勞而舟人不敢違也豫既望陳橋進發因憶未出都門時每心念黃河之險比登途一二相知者言河當夏秋之交誠險而難渡今無難也暨至河果不踰時而渡心頗易之及歸遂為數輿人所誤幾葬河魚腹中天下事險不在難危不在大類如此􅋏然自失者久之既過里中乃伐石于山勒其事于祠下以紀神庥且以諗夫後之人使知易不可忽而小不可略也新建天津葛沽鎮兵營記萬厯壬辰倭入朝鮮破其國走其名王殺虜其民人據其城邑狡焉有內訌之勢議者謂津門咽喉要地倭乘汛揚帆則患首津門津門被患則畿內恇擾大司馬竭心而謀博採羣議乃徴諸近衛兵屯海上又奏遣大將京卿各一人募內地少年子弟可為兵者得數千人練習之以益壯軍勢時倭不犯東北者百數十年屯守不設營壘盡廢宿兵於斥鹵之地又盛夏疸熱淫雨日侵衆無所棲息疫癘時作人情大擾巡按侍御劉公疏言其狀乃得罷遣諸衛兵獨留募兵三千餘人統以偏帥以備不虞於是巡撫大中丞劉公備兵副憲梁公郡守劉公懲前慮後議於天津近地創立營堡屯諸募卒而推擇豫邑侯劉君俾經理其事守乃由天津而東往來海畔覽其形勢周視審度得地于所謂葛沽者東去海西去津門大約各五十里地既適中而形復髙敞侯為相方畫制命日量工以授諸佐者遂略基址稱畚築具財用費取諸撫院積扣民兵工食之餘不以煩有司工役取諸飢民之應募者不以煩閭里始于癸已仲春至季夏而訖工中為帥府左右翼為兵營稍上為中軍廳事繞以長隄環以潮水而又演武有所觀兵有臺箭垜旗墩碁布星列巍然津門之支輔海邦之重鎮矣事既竣邑侯以中丞公命俾繼登紀其歲月蓋竊嘆諸大夫此役有數善焉可以賑飢可以省費可以圗目前之安可以免日後之擾可以為久逺之計可以禦外患可以銷內患夫濱海之民頻傷于嵗至無以為生而春夏之交尤甚今懸直而招俾得以日工博日直以日直充日食比及終事麥已有秋是以數千金之費而活數百人之命也故曰可以賑飢凡役出於徴𣲖者五不當一出於平常召募者三不當一惟貧民則所餘者力所急者食急于得食必不緩於用力彼因力以就食吾因食以就功役無曠日工不踰時故曰可以省費且新募之兵非貧無資即豪有力者可以猝聚而不可以猝散不可猝散而欲使之散不能猝散而又不能使之常聚此近憂也帥以訓之營以聚之則雖未見聚之利而亦無散之害故曰可以圗目前之安今之倭夷尚伏海島不能逆其必來不能逆其必不來彼如不來聚兵何為萬一或來兵將復聚與其散而復聚毋寧聚而不散蓋散而復聚者不習而擾聚而不散者不擾而習故曰可以免日後之擾夫營未建則安之難營既建則給之難今既已擇海濱髙敞之地立為屯營以妥其居何不擇海濵間曠之地畫為屯田以為之業使彼時而耕耨時而畋漁時而肄習彼能自給庶不煩餉於官官不給餉庶幾常得其用始為募兵漸為土著故曰可以為久逺之計小人出力以衛公家必不如自衛其家誠令屯營之卒各有恆業以漸廣其居室畜其妻子聨為什伍結為婚姻常則相親變則相恤即一旦倭至將家與為敵人自為戰非徒以德上也將以完室家而全其親戚也此其與烏合之衆談敵而心怯望敵而色戰者功相萬矣故曰可以禦外患今餓寒困窮之盜所在實繁假令姦人乘之以弄兵潢池則一夫大呼千人立致于時欲借見兵則急不可用欲募新兵則緩不及用孰與聚數千訓練之卒於近地將與卒相習卒與卒又相習用之即調發不用即罷遣猶足待緩急而懾姦宄乎故曰可以備內患嗟夫古之為備者常在事先今之為備者常在事後備在事後誠無益于事然先事之後後事之先也事未來而不能備事既過而不知備將何時而備乎備而無用不愈於用而無備乎今兹之役備之道也然亦難矣何者天下之事每難于創始而易于鮮終蓋有事則有擾易人亦易慮故非前之人以後人之心為心將以事不在已也而諉之非下之人以上人之心為心將以事在已也而玩之非後之人以前人之心為心又將以事不由已也而敗之如此則功何能立又何能立而不廢哉豫因紀其事之始末而抒一得之愚以告夫嗣來者中丞公名東星山西沁水人副憲公名雲龍廣東瓊山人郡守公名敏寬山西安邑人侯名冠南江西廬陵人分委者為縣丞秦應光魏鰲典史劉守學千户宋璞百户韓繼業王守成吳承勳法得並書饒陽令楊公遺愛記饒陽當滹沱之衝滹沱善泛泛則東西所適無定勢壞人廬舍沒禾稼百姓患苦之嘉靖丙申大梁楊公為邑令喟然嘆曰河可防防河河不可防吾其防邑居乎或謂公民不可與慮始澤門之謳公獨不聞公曰大人舉事勞民而利民則為之勞在一時利在百世則急為之等勞耳自我則事半而功倍自後人未可知也見民之害不能祛已不任其勞而以遺之後人令職之謂何乃以次第就役先為隄于隍之內外而後為隄于郭門之外蜿蜒八里澗一丈髙視澗加十之五隄既成督民雜樹其上者以千計公役民以時均其力而不亟其成故民無怨公者而亦未有以德公也當其時所為德公而播諸輿人之誦者可指數已嵗丁酉饒不雨自春徂夏禾盡稿公為齋沐步禱于方臺龍祠禱畢雨大至稿者起嵗以有年戊申秋大蝗食成禾立盡公諭民捕蝗發倉粟易之所發才六百蝗遂滅不為災饒故編有羣長諸費之所取給公自奉約減斥去不用嵗所省常費凡數百緡饒十九社社長倚賦役為姦利公廉得其狀召諸社長各按田而賦按丁而役按賦役而籍按籍而徴諸長蹜趾無所售其姦饒民故食啇鹽富商挾資而結貴勢挾貴勢而撼有司有司散其鹽于民厚其直而急其徴期民大困公乃教民煎斥滷為鹽鹽既成遂為白之監司嵗輸鹽課而罷諸商人邑無賴不治家人生事又不能仰食粳竅往往作姦犯科公令户為之長長得察其户之人户之人無常業者長以告治其人有而長不以告治其長人無逰食盜賊屏息公之政不能具述即此種種豈不稱便利哉然政之所以移風易俗者則利在目前而治隄防河則利在數十年之後目前為德顯數十年後為德遲顯則沐其惠即思歌誦其德遲則不見利故不見德也比公去饒十餘年而嵗飢民相聚伐隄樹為薪食其皮始思公曰非公吾安所取資乎又二十年而河水大溢水囓隄邑民日夜荷畚插集隄上力與水敵城得不損始大思公曰非公吾其魚乎始思建祠祀公報公德則相與鳩金錢治材木月纍嵗積度費已具則列公治狀暨所為祠公者言之今邑侯閔公閔公曰有功於民則祀之此長令事乃勤苦父老吾為若成之又明年公子今侍御廉峰公為畿內督學使者民又益喜其小人曰方公為吾民歸也吾固祝天報公公果有子其君子曰我有子弟公昔教之公今有子其世世有大造于吾邑蓋公先治饒時時進諸生訓誨以性命之學曽揭一聮于學宫期以參贊天地體認聖賢有不及者復為惜隂歌勵之嘉靖乙未肅皇帝南狩道真定當道者才公檄公主諸供應諸中貴索例外不得大詬詈公正色拒却之公度忤中貴人或中以他事即拂衣歸邑民臥轅下留之不可曰吾為爾民歸歸無所恨故邑人言若此猶若以一邑私侍御公者而不知侍御公非一邑之私也未幾侍御按部過饒饒父老故嘗逮事公者爭逆侍御公於隄下願望見顔色指曰是先公所築乎指隄之林木曰是先公所樹者乎蓋諸無能名公而所為名公者獨以此言輒泣下侍御亦泣豫同年王君為豫道之如此嗚呼蓋公所為樹德于民者今始見之亦猶之西門公之渠矣昔者鄴苦河患西門豹發民治渠引河水灌田而殺其勢民苦治渠之煩而不睹其利也百嵗後害除利興民以富足乃感而思之曰是賢君之法式不可更也鄙人有言已嚮其利為有德饒民于公何以異此然豹之治鄴以術而公之治饒以實心史不載豹有賢子孫而侍御公能世公之業益恢而大焉則公實勝之矣孰謂古今不相及哉奈之何今之牧民者多不利民而自利即知利民率不能計久逺而圗近利其心亦以有近利即有近名彼沒世之名吾何利而為之故陂池溝渠之務闕焉不講而屑屑然務于卓詭炫耀之迹民安所恃以攸暨哉而又奚惑乎去後之思寥寥也若公之不有其名而名與澤流無窮已時豈不毅然行古之道者而可概見耶語曰前事不忘後事之師豫故因閔侯之請而採拾饒人之不忘公者志之貞石以諗夫後之君子公名東山閔侯名宗舜王君名命重修河間府管河廳公署記運河自山東入郡界逶迤而北至于天津上下蓋數百里儲峙之所灌輸朝貢之所往來冠蓋之所絡繹至衝要也舊以郡倅一人專領其事然郡去河逺不便臨視故别設分署於郡東南百二十里交河縣之屬鎮曰泊頭者以其地臨河且上下行河道里均也或曰此水部分司後司移張秋乃置府署焉無可稽已廳事大堂南嚮前為儀門門外折而東為鼓樓即為大門門前為董家店巷巷下為大河於義為宜於勢為便自隆慶戊辰大同張公謂大門稍逺不便肅客乃市民居拓其址别為大門于儀門外置寅賔館于大門之北而鼓樓之門遂為虛設至萬厯戊寅鳳翔袁公又謂天下公署未有為門不臨街衢而居於樓之內者乃益市民居于鼓樓之南别為大門樹棹楔于門之外而鼓樓遂塞矣至萬厯丁酉浙衢趙公以廳址久日漸低下淫雨之後水無所泄墻垣棟宇日就圯壞欲遂撤而新之乃出修宅嵗費並請於部使者黃康兩公又得河灘公費若干計可三百金度基市地鳩工飭材中為正廳三楹後為後堂三楹左右為胥役房前為儀門門右為土地祠左稍南為寅賔館西嚮又前為大門門左為州縣館折而東移棹楔於臨衢榜曰畿輔河防堂之西稍後前後為宅者三前為門其又西為書房者前後亦三或葺其舊或創而新力役于衆費出于公經始于丁酉年六月至次年五月而訖工既落成具始末徵言以紀嵗月豫竊嘆近之仕宦者以奔走逄迎為能以筐篋刀筆為務玩嵗愒月職務且廢不講况官署乎公計以為自今為則材物未大敝壞尚可得什之五及今不為則存者愈少自我為則工力未大糜費尚可省什之五自後人為則糜者愈多故不惑羣議不避衆喧而竭蹶為之卒之功成而民不擾身居其勞而居後人以逸公亦何所利哉公之先人中丞公以精勤舉職為世名卿公習見家庭之訓故居官所至不敢自暇自逸此其一事也觀治居而所為治河者可知矣使世之仕者而皆視官如家視官事如家事若公也者則天下可幾而理哉淡然軒集卷五
