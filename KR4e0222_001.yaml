body:
  text: 淡然軒集卷一明余繼登撰疏修史疏一為纂修正史事臣惟正史之體紀表傳志悉備紀志以載國家之政典但稽考於朝廷即可備史臣之纂述列傳以載一代之人物必博訪於四海乃可協衆人之公評伏蒙皇上先允輔臣陳于陛之請勑諭儒臣纂修夲朝正史以垂啓佑又允輔臣王鍚爵等之議行令郡國購求海內典籍以備纂修德意甚盛臣以庸愚濫厠副總裁之末自二十二年八月內開局以來日與諸臣在館翻閲中祕副録搜求故實將以次輯為志表帝紀等書無容别議惟是自開國以至於今二百餘年間祖宗道化之隆國家人才之盛應運而興光映後先其應載列傳者不可勝數矣苐人衆則其勢必渙時久則其事易湮若全憑祕録之隱括則志其略未志其詳欲兼採野記之紀聞多傳其疑非傳其信苟非聞見之博安能紀述之公伏乞勑下禮部移文直𨽻並各省提學官轉行所屬各府州縣地方其有碩輔名卿德業彰著者首先輯録此外有立朝大節生平卓行表表在人耳目者不拘官秩崇卑一併收采至於名儒良吏孝子貞婦與夫隱逸方伎之流可備紀載者逐一查訪或詳録其家乘或博詢之鄉評務要明白開具當時行事實跡編成書冊送部備考若有生不齒於時歿無聞於後者不許徇情濫褒致淆公論定為期限載入考成庶臣等得以藉手次第編摩不至耽延嵗時虛縻廪餼矣奉聖㫖禮部知道修史疏二為俯循職掌敬陳修史一二未定事宜伏候聖裁以昭大信以光大典事臣惟代之有史攟托故實偹載册書明示將來用垂法戒非一人之書而天下之公也非一時之書而萬世之公也故是非虛實之間子不得私諸其父臣不得私諸其君而後可以言公今諸臣奉命纂修首先帝紀行且就草矣臣竊即帝紀而言有不可不自為一紀者有可不必為紀者不可不自為一紀者建文君是已可不必為紀者恭穆獻皇帝是已夫建文之號當復諸臣詳言之皇上已允行之矣然附載太祖髙皇帝紀之末終覺未妥臣嘗考閲實録思成祖所以改建文五年為三十五年者蓋緣即位之初欲以子繼父為名不欲以叔繼姪為名故為是權宜之舉耳非有明詔革除之也乃後修史者不逹聖祖之意遂於建文元年以後書其年而削其號並削其行事之跡故此數年間獨紀靖難事而不紀所靖之難為何事若有所曲諱者今幸已復其號似當搜羅故牒採集傳聞詳載當時所用之人所行之事别為少帝之紀是是非非明白無隱則靖難之兵有名聖祖之心益白夫以聖祖所不自諱所不必諱者而臣子乃欲強為之諱非以天奉聖祖也且事須有實直道難枉今野史所記已多失真若不及今明為之紀令後世以久憤之心信傳疑之語則史臣之失職不足惜如聖祖何臣謂不可不自為一紀者此也至獻皇帝積德纍仁篤生神聖遂垂萬世不拔之基然其發祥之長亦不過如德懿熙仁四祖止耳四祖不紀而獨為獻皇帝立紀豈惟臣子之心不安即皇上之心亦必不安豈惟皇上恐獻皇帝在天之靈亦且有踧踖不自安者矣况紀號獻皇帝而所書者乃𢎞治正德之年紀名為帝而所載者乃藩王之事皇上以為於義於例當耶否耶且自古由藩封入繼大統者非一人試考史書未見有為其祖父作帝紀者彼非不能紀不欲以私害公耳臣竊以為四祖事只宜附見於太祖髙皇帝紀之前獻皇帝事只宜附見於世宗肅皇帝紀之前或别起一例亦宜與列聖帝紀有别庶使名實不紊體裁不淆不然以獻皇帝之子孫臣庶欲紀則紀矣如天下後世之公議何臣誠不忍使萬世之下有非議聖朝者謂可不必紀者此也凡此皆非臣下所敢擅定者伏乞勑下輔臣㑹同總裁纂修諸臣商議允當上請聖明裁决行令載筆之臣有所遵守天下後世頌皇上之至公無私如天如地真有髙出尋常萬萬者而於正史為益光矣捐俸以資賑濟疏臣等近接邸報見九卿大臣辭俸助賑荷蒙皇上俯從其奏且明諭五品以下不許辭臣等竊思人臣之立朝也若詔祿計官固分厚薄至同憂共念何間崇卑况以勢所不及而言四品以上俸資雖厚豈能遍數州數郡之民以勢所可及而言五品以下祿入雖微亦可活匹夫匹婦之命值此甚災之日又當極匱之時皇上憂民且為旰食宫闈憫旱皆已助資凡在臣工敢安常祿且臣等職居禁近既未嘗厯郡邑睹艱難情狀而繪鄭監門之圖官守閒曹又無能親職事得黽勉勤勞而效富青州之䇿執經纍歲啓沃無由待詔頻年優游何補即無事猶當奪祿豈詘時乃可素餐因此不自揣量願捐俸薪以佐㳙滴伏乞聖慈勑下該部淮照在京堂上官一體辭捐則臣等愚心不愧愚分少安矣奉聖㫖准捐俸戶部知道捐俸助工疏兹遇皇居鼎新工力浩大閣部諸臣各疏捐俸以濟工役臣職列閒曹久叨歲俸在無事之日尚且深愧素餐豈興役之時乃敢坐安常祿即較大臣之俸不無厚薄而原臣子之心何分彼此願照例捐俸一年少資工費宦跡靡定安敢遠及歲時祿入有常竊欲少輸㳙滴伏乞聖慈特勑戶部將該支俸銀扣解工部收貯應用以見臣子不敢安常之義不忘趨事之忱奉聖㫖戶部知道火災疏一為遇災修省恭請聖明臨御講筵並獻愚忠以備採擇以回天意事兹者乾清宫災臣伏睹皇上明降手札思愆咎之未盡深引過以自責是皇上警懼悔悟之心至真至切數年以來臣下所欲得之於皇上所不能必得之於皇上者而天出災變以感動之矣夫皇上英明果毅具堯舜之資近乃不樂讜言似未擴其舍已從人之度者特聖心偶未之悟耳一旦翻然猛省惕然覺悟必不敢復以莫違之成心忽難諶之天意是舍舊圖新之大機也昔人有言臺諌所不敢言者講臣得言之臣待罪講幄叨糜廩祿平時既無能啓沃主心遇變又不能陳說悃欵不惟負皇上抑且負天故敢少竭其愚臣講臣也猶憶供事之初皇上時御經筵非寒暑不輟日御講筵非風雨不免因竊自思以皇上至神至聖豈二三儒紳片時講誦即能有補於萬一而皇上留心問學如此者毋亦謂親宦官宮妾不如接賢士大夫之雍容處祕殿深宫不如居廣厦細旃之斂飭耽醉飽醲鮮不如味聖賢理義之雋永樂聲色諛佞不如聞格言法語之砭針乎是故自古人君講讀日勤則志氣日清而處事咸得其當講讀日懈則志氣日隳而處事多失其平皇上何不反躬自思以今昔而並觀之也昔講讀時昧爽臨朝者陛下也今嵗不一御矣夫人君象日日一日不照臨人且駭異十日而不見日將翹首東望不勝抑鬱無聊之思為人臣子而終歲不一睹天顏其瞻天仰日之心當何如者此猶其小者耳下不見上則所為上交者不得不憑章奏而章奏又有時而不行上不接下則所為下交者不得不憑批答而批答又有時而不下苟有煬竈之奸中扃外閉如國事何知皇上在御必無此事儻聖子神孫中剛明稍有不及皇上者而引今日為故事則權不旁落政即下移是皇上作法也豈以明聖而慮不及此也昔講讀時遇旱步禱者陛下也今不一至郊矣夫郊祀不親已非古人昭事之意豈有目睹天心譴怒至於焚燬宸居震驚聖躬視旱災為孰切者猶然不一詣郊壇深陳自怨自艾之誠以祈天佑而僅止於遣官恭代豈以代者之恭即能謝天譴而坰天怒乎未可必也此時而不親郊更無望親郊時矣昔講讀時時享齊居者陛下也今不一入廟矣臣竊度之方被災時皇上所望於九廟神靈之保護者豈不甚切而九廟神靈所為默佑於𡨕𡨕之中者豈不甚力幸無事矣乃惜咫尺之勞不躬詣祖考之前一申報謝豈惟皇上之心不能自安即列祖在廟之靈不能不望於皇上也昔講讀時推心以委大臣坦懷以任羣臣而今不然矣中有所主輔臣不能申其說意有所移九卿無能救其敗言疑其私人疑其黨大寮既因之而虛位庶官亦因之以另推自古未有堂陛隔絶如此其甚者也夫皇上養士二十四年於兹矣豈生於今者盡懷私植黨而無一可信可倚者乎亦薄於視士矣夫國家事如人一身血脉有所不周則必有壅閼痿痺之患今上蓄疑以待下下懷疑以事上至令腹心之臣惶惑而不敢斷耳目手足之臣逡巡而莫知所措陛下誰與治天下乎非所以示一體之誼成泰交之風也昔講讀時起用建言之臣優容直諫之士而今不然矣言官而言既怒其言而顯斥之不言又怒其不言而槩斥之當事者斥不當事者亦斥用者既斥斥者不許復用故兩月來無敢以言進者其心豈真以朝無闕政可遂相安於無言不過畏陛下之積怒不敢言耳夫不言極易事耳然人臣之利非社稷之福也今修省之日正不諱之時臣恐在朝之臣爭欲發憤悶效忠誠而言未必悉當詞未必悉婉皇上儻復厭其煩怒其激則諌道從此遂塞而陛下之善念阻矣惟陛下辨言之公私以為從違因以辨人之公私以為用舍不可槩以為言耳而槩視之也昔講讀時亦曽懲一二宦寺而罰止逺遣罪不株連今何如矣疑心一生視左右盡若可怒怒心一起視左右盡皆可刑鞭朴之慘滿前徴逮之使載道夫此輩豈不欲委曲承順少得皇上之歡心其逆聖意而被嚴譴者攝於威也夫攝之以威則愈不及而愈見其難堪寬之以情自無不及而自見其可恕惟皇上布大德赦小過治有罪釋無辜使人不懼死孰不感恩當死而生感恩必甚由是肘腋􅉏御其愛戴皇上當有甚於皇上之自愛者矣陛下亦何憚而不為此也凡此皆行事之偶失而其原皆起於聖志之未清其本皆由於聖學之久廢故臣惓惓以勤講讀為修省之要務也然臣不獨言之惟望皇上行之且亟行之夫聞之而能行行之而能亟於行是真能悔悟者也人情初悟初悔皆能奮勵而漸久漸怠不免忽忘故臣願陛下之亟行之也昔秦穆霸國之君漢武多欲之主而秦誓之書輪臺之詔載之經史為後世美談皇上儻不以臣言為迂而力行之則天下萬世頌明天子者為禹為湯而髙出秦穆漢武之上矣火災疏二為感時效忠敬陳致災之由伏乞聖明省覽改圖以消天變事兹者乾清宫災聖德謙冲引咎自責羣臣仰體聖心備陳修省之要矣臣復何言臣備員講幄執經而事陛下每覽經書所載古昔帝王即當太平無事之日而戰兢惕厲恆如天之無親而民之罔懷者何若是其凛凛也蓋知君者天之子也君雖尊常當畏天天者民之天也民雖微常能動天故曰小心翼翼昭事上帝又曰天視自我民視天聼自我民聼今歲一執圭璧事上帝而陛下不親也天授陛下以大位而嵗時虛之不一御也第諉之曰調攝夫果調攝也明明在上必自知之不然天無怒乎先後進言諸臣皆天生賢才為世用者陛下槩以為私而斥之且禁錮之矣恐間有忠肝義膽憂治危明之士抑鬱而無所告不免仰天而歎也歲額歲增孰非民力有司請損之而不可得不得不厚斂以充之嚴刑以迫之彼窮因之民鬻妻鬻子而無所告不免仰天而嘆也左右􅉏御一逆聖意動加鞭朴鞭朴不已必致死亡彼當垂死亡之時而無所告不免仰天而嘆也罰奸懲惡法何可廢彼其株連漫引之衆誣服於拷訊之下而無所告不免仰天而歎也天以天下臣民付之陛下乃監觀四方日聞嘆息愁苦之聲天無怒乎天之怒陛下不以言其警戒陛下亦不以言時出敵國外患以譴告之而陛下不悟也又出水旱盜賊以譴告之而陛下又不悟也於是舉紫宸太微皇上萬萬年所深居靜攝優游逸豫之地一旦付之烈熖之中天之怒亦甚而其仁愛亦切矣伏願陛下敬天之怒體仁愛之心惕然思翻然悔悟急下罪已之詔深陳既往之愆改絃解網與天下更始則不俟崇朝而臣庶騰歡帝天悅豫兩間交泰和氣薰蒸變災為祥其事甚易而其效甚速也今宸居既燬行且鼎新陛下不以此時收拾人心遽欲糜其財而勞其力恐易動之勢成而難諶之天復有大可畏者矣皇上聖神當自明知而臣猶敢喋喋者亦講誦陳說職掌當如此耳火災自陳疏為因災省咎自陳不職乞賜罷斥以回天變事兹者昊天威怒宸居蕩焚皇上自引咎愆臣寮各陳瘝曠况如臣者猥以謭陋洊沐寵榮八載講帷草年清秩雖從諸臣之後屢陳勸講之章而天聼彌髙清光愈遠執經而待志欲效夫㳙埃倚席不談功何禆於尺寸且行能淺薄不堪領䄂詞林兼學術空踈安望總裁史局素食真慚廪祿赤紱實玷班行深知䇿足之不前自分乞身之已後希賜罷免用戒踈庸豈惟深荷皇恩亦可少答天譴奉聖㫖余繼登著照舊供職吏部知道患病疏一為患病不能供職乞恩放還以便調理事臣以一介草茅荷蒙皇上簡置詞林晋侍講幄以至今官二十有一年矣臣雖至愚極陋亦思竭㳙埃之力以仰答天地之仁臣之志也緣臣七八歲時父母連喪兄長先亡將養無人飲食失節以是平生善病壯年尚可支持四十以後病即委頓每延醫診視謂臣氣血兩虛病不在肢體間當早屏居攝治不治將深臣竊意不然故數年來每遇病疾瘡瘍但注籍服藥痊可即出未敢言去自今年春復病內傷飲食減少臣猶自忽略謂可幸無事至三月三十日忽爾頭目眩痛手足酸軟痰壅胸膈兩肋如割復延醫診視皆言是元氣久虛痰火綢結表裏皆邪觸處悉病茲欲東補西攻無此妙劑惟有謝事歸田從容補養元氣或萬有一分之愈臣始悔臣過於自信不早聽良醫之言以至狼狽如此也然無及矣夫人疾痛則呼天呼父母臣早失父母陛下天也是以不得不哀鳴於陛下之前况臣職厠講筵非養病之地佐司邦禮非養病之官若使床褥呻吟尚縻廪祿則臣心愈不安而臣病愈深危亡可旦夕見也伏希天恩憐憫廣開好生之德即放生還早就醫藥倘延一日之生即皇上一日之賜也奉聖㫖余繼登係日講官著在任調理供職吏部知道患病疏二為患病益深調理無效再懇天恩放還以延殘喘事臣先以病乞歸奉聖㫖余繼登係日講官著在任調理供職吏部知道欽此臣伏睹綸音感極而泣即強自奮勵延醫治藥比常加倍服食期在必愈豈知脾胃久弱藥餌難調服藥既頻脾胃益弱始猶不能運化湯粥今併不能運化藥劑矣臣始嘆欲強者心不能強者命不得已再乞憐於君父之前臣資雖蠢愚性非懶惰自入仕以至於今二十餘年間未嘗告假一日告病一日以偷安里中豈以今官階漸崇職任漸大又有修史諸務顧欲托病以求安豈人情哉况臣厯正三品俸幾二年二個月苟可勉強支持需以歲月或得徼皇上之寵命為祖父之光榮為人臣子孰無是心而臣亦不能待也此又豈人情哉陛下可以諒臣之病苦矣臣伏枕氣結詞不能逹千祈萬懇惟望皇上慈悲憐憫早賜生還而已臣即不能報陛下願臣子子孫孫嵩祝聖壽於無疆也奉聖㫖余繼登著遵前㫖調理供職吏部知道恭慰疏萬厯二十四年七月十三日臣等伏聞仁聖懿安康靜皇太后崩逝大小臣民無不哀痛號呼情如喪妣矧皇上至孝因心合萬國以奉長樂之歡二十餘年矣一旦違養其悲痛又當何如者恭惟皇上一身宗社臣民之主所係至重又况靜攝之時豈宜哀傷之過伏望仰遵遺詔少抑聖情以慰海內之心以成天子之孝臣等下情無任惓惓奉聖㫖覽奏慰知道了禮部知道自陳疏為奉職無狀乞賜罷黜以警曠官事臣一介草茅待罪禮曹遞病遞起碌碌無所短長已一年餘矣頃以科場之事臣部儀制司郎中張世才為科臣指摘雖科臣忠厚疏中明言左右堂不及知若為臣開罪者但臣備員堂官豈可盡諉曰此尚書郎中事而與已全不干涉乎彼時不敢有言者懼涉庇護之嫌且以是非聽部院以處分聽朝廷耳今世才已蒙聖恩薄示調罰矣如臣獨靦顏以無罪無事自居豈人臣難進易退之義哉夫人或可以恕臣而臣則不可以自恕况同部而不與其事同事而不與其罰均之無可解者伏望皇上擴天地之量寬雷霆之威將臣特賜罷免以為苟祿曠職不善調停者之戒别選賢能以佐邦禮臣雖竄身田里養疴林泉皆皇上之極恩而微臣之厚幸也奉聖㫖余繼登著照舊供職吏部知道謝羊酒鈔錠疏為恭謝天恩事萬厯二十六年四月日伏蒙聖恩以臣三年考滿欽遣御前答應牌子李虎齎賜原封鈔二千貫羊一隻酒十瓶到臣私寓臣謹焚香望闕叩頭祗領訖伏念臣章句凡儒草茅賤士遭逢聖主叨厠詞林執經講帷何有沃心之益備員卿佐深慚典禮之司虛縻未效一籌荏苒已驚三載自井幽黜敢望明恩乃荷聖慈特加寵鍚發內庭之鏹楮勤中使以傳頒醇醪分玉府之珍肥羜出大官之畜儒紳增重蓬戶生光敢不竭駑力於㳙埃仰以答鴻仁於天地奉聖㫖覽奏謝知道了禮部知道覆諡法疏為觸事陳言懇乞聖明採納以明公論以定國是事祠祭清吏司案呈奉本部送禮科抄出京畿道監察御史喬璧星題臣不佞待罪西臺十有三載緘口咋舌非不可悠悠待遷顧臣言官以言為職者也持祿需次臣實耻之屬者一二時事義激於𠂻輒敢不揣黭劣敬為我皇上陳之試垂聽焉一議諡法夫諡以易名最號巨典二百年來清議韙之故有諡在百年之後者有在數十年之後者有幸獲而數罷者皇明臣諡類鈔可鏡已邇來人心不古毁譽失真彬彬實副盛名者雖十九乎然亦有阿附江陵而諡者矣有春部多疵而諡者矣近有行事差可其心孔艱而諡者矣又有諡與人不相符合者矣諸如此類更僕難數要之姸媸溷淆褒貶錯亂何以風宇內而勸來許耶謂宜勑下禮部除世逺論定者無用别議外將二十年以來獲諡諸臣開造書册送九卿科道衙門矢心天日逐一評品親注某也應諡某也應奪某也應改某也遺漏應補各臚列實蹟封送該部類奏恭候皇上豫奪務俾真正純白之士胥被華衮之榮而負慝作僞之徒不得售其欺世盜名之計誅奸雄於既往勸生者於方來鼓舞世道之一大機括也臣愚謬謂諡法之當議者如此等因奉聖㫖該部看了來說欽此又該禮科署科事左給事中羅棟等題為循職掌采公評摘舉缺諡名臣以彰幽隱以昭激勸事臣等伏惟公諭著而後國典重羣議定而後臣鑒明我國家磨礪臣工意至深矣生也髙下其官品有爵以馭幸死也軒輊其人品有諡以易名爵有時窮而諡無時窮故諡為至重爵猶可奸而諡不可奸故諡為至公諡者行之迹也大行受大名細行受細名非獨以彰往昔亦將以勸來兹據大明㑹典內一欵大臣應得諡而遺漏者不論逺近許科道官從公舉奏近該京畿道御史喬璧星條議諡法大約感時觸事見易名之典重故不厭精詳追慕前修見蓋棺之論定無嫌博取皇上勑下部議寮采參訂於下而是非不謬聖明獨斷於上而與奪無私在斯一舉矣惟議諡關禮科職掌安敢無言臺臣議舉其近者臣等請併及其逺者謹以故老之所傳說史乘之所紀載有勛績最茂品格最髙昭昭在人口吻間者二人兵部尚書兼右都御史伍文定太子太保兵部尚書毛伯溫是也文定少喜談兵長多竒節當宸濠發難之日倡義先登遂傾其巢穴挺身奮擊立盡其鯨鯢戰不逾時而元惡就擒社稷幾危而復安文定之功伐萬世猶憑之矣伯溫聲著西臺名留全楚當交趾作孽之秋餘勇可賈深入其險阻先聲所讋遂易其狡心兵不血創而酋長乞降荒服已擕而復附伯溫之威名四裔亦畏之也考其當年文定與王守仁實共死生伯溫與韓雍可稱伯仲今守仁得諡文成韓雍得諡襄毅二臣寂寂獨至今未補竊以為折衝禦侮甲胄有勞之諡法當亟議矣學問甚正出處甚明彰彰在人耳目間者二人吏部左侍郎張元禎南京刑部右侍郎吳悌是也元禎識洞本源接濓洛關閩之正脉動成爻象陳禹湯文武之訏謨雅受知於孝廟獨不合於宰臣入仕垂五十年在朝僅九閲歲士大夫想望其風采比於祥麟瑞鳳非虛譽也吳悌接統象山遡淵源於立大玩易涑水妙進退於觀時由循吏而抗節西臺避權貴而屏居里第入仕三十餘年閒居二十餘載士君子評論其氣象擬於嶽峙淵澄非過情也考其當年元禎與羅倫共相規切吳悌與羅洪先妙解靜修今羅倫得諡文莊洪先得諡文恭二臣亦寂寂至今未補竊以為勤學好問避逺不義之諡法當亟議矣其他若都御史魯穆希心𤣥曠羔羊之節久而不渝兵部尚書郭宗臯敦尚風節薑桂之性老而愈烈僉都御史楊繼宗天植忠孝尤確守四知之家法大理寺卿夏時正學成恬淡乃超慕孤山之髙踪刑部尚書李遷厯宦途四十年而家無長物禮部侍郎田一俊居詞林二十載而人無間言大理寺卿陳恪之清修絶俗尚寶司卿孟秋之髙潔邁羣中允郭希顏以忠諌殺身庶吉士鄒智以直言貶職御史劉臺之執持風紀中允張元忭之不愧科名以上諸臣合於例而應得諡者或循例議補格於例而不得諡者或破格議與似亦未可靳也夫明興二百四十年以來海宇為一天下如此其廣也而臣等所舉甚狹俊乂在列人才如此其多也而臣等所舉甚寡豈其責備太過而故以褊淺狹隘之心靳名賢華衮之榮哉亦為知識有限不敢以揣摩疑似之見輕國家命名之典也大抵知人實難而定諡尤難之難舉生平之行業總括於一二字之間以一時之議論流被於千百世之逺可不慎與不然則俄而議與又俄而議奪若吳時來之已事雖快人心亦傷國體不若慎重自今日之為得也皇上量同天地明並日月伏乞勑下禮部以臣等聞見所已真者與採取所未備者仍照臺臣之議開具書冊分送九卿科道等官博加咨訪必羣議盡協如權衡尺度之分明衆口具調如醎淡甘苦之齊一然後議覆上請施行則功德既已湮沒者倐然著迹於千古聲名既已澌滅者煜然生色於九原豈獨為昔日之諸臣榮乃實為今日之諸臣勸也於世道未必無關繫矣等因奉聖㫖諡法乃國家激勸大典以彰前賢以勵後進以定萬世之公論這所奏著禮部從公看議訪實具奏以憑裁奪亦有諡之美惡未當其人查來俱改正行欽此欽遵通抄到部送司案呈到部看得朝廷立諡法以助刑賞之所不及其來久矣古人嚴於懲惡故名曰幽厲即孝子慈孫不能改焉其後則善惡並諡瑕瑜不掩如鄭羲之諡文靈蕭瑀之諡貞褊非善者諡而惡者不諡也夫善諡以善惡諡以惡故人不敢借公典而僥私恩流弊至今賢者豫諡不肖者不復豫諡故人存幸得之心競肆鑽求之計以致易名之典不足為礪世之資今二臣先後具奏或明指其人或暗指其人或主於豫或主於奪無非集思布公之意第以一二字而槩一人之生平以一二人而評四海之人品聞見未廣妍媸易淆有私其所好好而不知其惡者有私其所惡惡而不知其美者又有中無定見隨人口吻以為短長者心各有主喙各爭鳴使非盡付之公評何以能調乎衆口合無依二臣所奏恭候命下容臣等將萬厯元年至今凡諸臣已得諡者盡行查出開寫文冊分送九卿詹翰科道諸臣令其虛心詳議若應諡而未諡者除科臣羅棟所疏姓名開具分送外其餘人衆難於遍查者果諸臣有真知灼見不妨明白開列如某當諡即明書行事如何公正心術如何粹白某不當諡亦明書行事如何謬戾心術如何奸邪只許指實條具勿拘對偶勿用浮詞勿以私好而過為褒奬勿以私惡而過為議評勿如矮人觀場而隨聲附和候通送到部類集具奏某官應豫即明注係某官所議至應奪者亦然統候聖明裁奪儻所議不當日後被人指摘得實者將原議官一併議處庶豫一人而衆皆知榮奪一人而衆皆知辱賢奸不淆於身後勸懲可禆於將來矣再照議諡係本部職掌類奏係言官條陳伏奉明㫖著禮部從公看議訪實具奏以憑裁奪夫類奏則不須看議看議則不專類奏應類應看竟當何從豫奪所關嫌怨易起更乞聖明酌定先下臣等遵奉施行奉聖㫖依擬行令九卿等官虛心詳議應諡的准與補諡若已諡的果於羣議不協方許改正追奪毋得過於苛求以傷朝廷錫豫之典其議諡類奏係你部裏職掌以後還照舊行請補禮卿疏一為禮卿久缺懇乞聖明亟賜簡用以重邦禮事臣惟國家設置六卿分曹而治均不可缺而禮部所司則朝廷之典禮藩府之名封諸司之文移四裔之朝貢由至重至巨以暨至繁至瑣無日無之一日缺人則一日廢事非代庖者所能獨勝也自本部尚書范謙於二十五年十月內病故至今幾九月矣廷推上請未蒙㸃用然猶有署部事左侍郎劉楚先與臣二人辦理尚且支持為難今楚先又奉欽依回籍閒住止臣一人在部臣識既庸愚才復短淺且年來多病氣血耗傷又當日撰講章恭進睿覽即使勉強驅䇿不免支東遺西顧此失彼臣今不早言坐待部務廢弛彼時陛下罪臣亦已晚矣况廷推諸臣皆在朝在野資深望重之賢伏乞皇上念禮曹非缺官之地宗伯非久缺之官欽㸃一員掌管部事庶倡率有人諸司振飭庶事不至停閣而典禮以次舉行矣請補禮卿疏二為部務繁重攝理非宜再懇聖明簡用正卿以重典禮事臣竊惟國之有禮猶墻之有幹也部之有尚書猶衣之有領也不植其幹則無所約束而禮不立不振其領則無所提挈而禮不行故自古帝王及我祖宗即至聖至神亦未有能廢秩宗之官者誠重之也今本部缺尚書幾一年矣當臣初署印時即具疏以請未蒙批發竊意皇上自有聖裁當無俟臣下之煩瀆者乃兩經㑹推伏候至今未得欽命臣實惶懼臣至愚極陋素望輕微又自去年三月患病至於六月血氣耗傷形容憔悴夫望輕則上下有所未孚病久則精神有所不及日復一日漸恐廢閣且查舊例禮部尚書未有兼講讀者非不欲兼以其有章奏之查覆文移之裁決事至繁巨勢不能兼也夫尚書不能兼講讀之事臣待罪講讀當日撰講章進呈御覽而顧能兼攝尚書之事乎故署印可暫必不可久也况四裔使臣其以進賀入貢至者歲時相望逺人不知聖意所在但見終年竟歲缺尚書不補將妄意堂堂天朝無一人堪為宗伯者傳之四方豈不辱朝廷而羞天下之士夫耶伏乞天恩亟㸃尚書主管部事庶司官有倡率之人事務無廢弛之弊朝廷收㑹通之效愚臣免瘝曠之愆考察自陳疏為自陳不職乞賜罷斥以重計典事萬厯二十七年復當大計羣吏臣備員卿貮例當自陳伏念臣草茅寒賤遭遇聖明待罪講帷循資而至今職分量久已逾矣竊自惟學術空踈才識短淺不堪佐禮况堪代庖此人人所共知也疾病牽纒氣血耗損形容憔悴手足重遲此人人所共見也臣之不職無能逃於衆人之耳目况能逃於日月之照臨哉是臣曠職最甚幽黜最宜伏乞天恩特賜罷免以明臣愚瘝官之罪以示清朝計吏之公臣即歸老林泉苟延殘喘皆皇上恩德也奉聖㫖余繼登直講署禮學行素優著照舊供職不准辭吏部知道覆雷火疏為巡視事祠祭清吏司案呈奉本部送內府抄出兵科等衙門左給事中等官桂有根等題臣等本日黎明同赴慈慶宫㸃閘工程接得燕山前衛指揮僉事于大朝手本禀稱本月二十八日晚刻落雨太廟內雷擊槐樹火光直出本監員役用水灑滅等情到臣臣等親到被擊樹下看驗樹上火燃形跡及地下灰木數塊是的臣等奉命巡視皇城則禁垣以內事體均當舉奏竊意今春多方乏雨麥秋早稿我皇上竭誠祈禱雨澤皇意肫肫為民百官萬姓莫不感激誦德乃比日隂雲聚散不時膏雨將沛未普昨晚電光閃爍雷聲迅烈且擊破太廟內大樹一株就中火起則雷霆之所震動九廟之靈將必悚然不寧我皇上驚聞之際亦必有惕然軫念者矣第雷火起自𤣥𡨕臣等何敢以恍惚之說上煩聖聽蓋嘗得之古籍有云隂陽和而後雨澤降天人孚而後隂陽調皇上臨御以來敬天法祖何所不極兹者雨暘愆期雷霆迅發可徒委於氣數之適然而不思以修省圖回也乎臣意慶賞刑威總關天心而匹夫匹婦均屬天鑒我皇上聰明睿知儻乘萬幾之暇穆然深思求所以整肅綱紀登庸衆正休養元元則聖明上格天眷自是雨暘時若年榖順成國家有道之長端在是矣伏惟聖𠂻裁察等因奉聖㫖太廟雷火擊樹上天仁愛示警朕心深切惕然遣官告祭奉安及修省事宜便著擇日具儀來奏禮部知道欽此欽遵抄出到部送司案呈到部伏念臣等典禮之臣奉職無狀不能叶和神人致雷火示警祖廟震驚聖心兢惕罪在臣等復何敢逃除祭告奉安擇日另行具題外其合行修省事宜相應照例題請恭候命下嚴行各衙門大小臣工痛加修省自本月十三日為始各青衣角帶於本衙門辦事停刑禁屠俱三日本部仍行文南京禮部令其傳諭諸司各修職業共圖消弭臣等竊惟修省有文有實而弭災以實不以文彼青衣辦事停刑禁屠修省之文也請以修省之實為皇上陳之易曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考故天子主天地宗廟之祀此禮之至重者我皇上不親郊廟積有歲時矣每常遣代諉以靜攝九重深密靜攝與否臣下不得而知祖考鑒臨知之必真果常攝而常代也宜無不可者不然祖考之神寧無望於陛下乎合無今次恭請聖駕親詣太廟祭告以慰安祖考之靈此修省之實也祖宗之心欲聖子神孫本支繁盛故定為十六歲成婚之期遵行至今未之敢越今皇長子睿齡十八已越期矣選婚一事於二十六年十二月既已告之祖考乃遣官候㫖日久未報祖宗之神寧無望於陛下乎伏乞特遣中使選擇淑女以備演習禮儀舉行吉典此又修省之實也天下者祖宗百戰所辛苦經營之天下也人民者祖宗二百餘年所培養生息之人民也民安則天下安天下安則祖宗之心安近來奸民妄窺朝廷時獻礦稅皇上戒之以勿擾而此輩不能勿擾非樂於擾民也不擾民則無所得利且恐伏欺罔之誅耳今海內蕭條民窮徹骨椎骨吸髓何能久堪乃撫按言之而不聼科道言之而不聼大小諸臣言之而不聼各疏言之而不聼合疏言之而不聼至引祖制以折人言祖宗時豈無礦課然有則開無則止不以纍民亦豈無稅課然稅有處課有額不許瑣及民間常用之物往牒可稽也若信亡賴之小人違士大夫之公議使祖宗之人民恇擾而不寧祖宗之天下危殆而不安祖宗之神能無望於陛下乎今三春亢旱四海飢荒皇上焦勞祈禱而井霖未渥怒霆先震天與祖宗之意可知己伏乞明詔大臣條上恤民事宜奏請聖裁稍布寬大之恩用蘇閭閻之困以明示我皇上遇災思咎畏天畏祖宗之意安民安天下之心此又修省之實也夫霆怒氣也火兵象也人怨於下天怒於上循理度勢必有窮苦之民㺯兵於潢池之中者民情既渙聯屬甚難禍亂已形收拾不易此時而猶泄泄然循修省之彌文欲以應變而回天豈可得哉奉聖㫖是奏內事關朕躬的己知道了祭告奉安暫遣官恭代你每大小臣工各要恪修本等職業實心匡濟時艱共圖消弭以回天意毋得徒飾虛文皇長子婚禮疏一為大禮踰期未奉俞㫖敬竭悃誠再申懇請事臣等因皇長子年已長成例當舉行冠婚大禮於二十四年十一月內循職掌按故事具疏上請伏俯候㫖未敢聒激至踰三月乃敢於二十五年二月內復申前請至今候㫖又踰月矣夫使事在可已臣等雖至愚昧何敢仰瀆聖聽顧禮有不容不舉而時有不可再遲者此皇上所明知也皇上神聖於國家典故無不覽閲亦曽見祖宗時有皇長子年十六歲而不冠者乎不選婚者乎臣等職司典禮若復緘默不言儻皇上責臣等以何不敦請致令過時之罪臣等即百口亦無以自解矣因此不避煩瑣齊沭申請伏乞皇上萬幾之暇少賜省覽或特降玉音或將前疏批發令臣等遵奉擇日舉行上以慰九廟神靈之望下以順四海臣民之心臣等不勝惓惓懇祈之至疏上不報皇長子婚禮疏二為仰遵明諭俯循職掌懇乞聖明早選淑女以備舉行婚禮事臣等於本年五月十六日伏覩聖諭內閣覽卿等所奏俱已悉知皇長子言及冠婚祖宗禮制天倫親情朕豈不欲早得傳行但念皇長子素禀清弱所以遲緩者正要培養豐厚誠愛重之意今春至夏朕屢召皇長子暨諸皇子問察習學之功見皇長子氣質比與去歲漸加充實且書倣對句頗有進益朕甚嘉悅皇長子欲先行三加冠禮次及冊立選婚朕思今未正名封而行加冠之禮冠服不便前已有㫖况二宮不日落成待煥然一新行此大典庶嘉禮有所天下傳聞以便臣民具瞻若其束髮之冠須待選有婚儀擇日冠巾與婚笄同行此亦舊制也諭卿等知之欽此臣等莊誦綸音罔不舉手加額踴躍嘆服仰見我皇上天性至愛睿慮周詳慶宸居之落成在邇大禮之舉行有日矣臣等伏思冊立冠婚典最𢎞巨一切儀章猶可從容備辦惟是選婚一節則非旦夕可就者蓋民間女子年近十五多已婚配如都城遴選未必相當須博求於比直河南山東諸處差遣往返動經數月習􅈺禮節又歷多時及今圖之猶慮延緩儻不預選一旦兩宮告成有誤吉期皇上責典禮之臣何不早請臣等即百口無以自解者用是罄竭悃誠齊沐上請伏乞聖慈允俞亟賜差官選擇務得賢淑以光大典至於合用冠服儀伏等物亦乞勑各該衙門先期造辦俟兩宮既竣方新九重壯麗之觀而三禮並行式慰四表臣民之望則主器得人國本永固和氣畢萃於庭闈喜頌交歡於海宇其為宗社無疆之福莫大於此矣奉聖㫖知道了皇長子婚禮疏三為選婚奉㫖未荷允行仰懇聖慈蚤賜遣官以求淑德以光大禮事先該臣等於七月內題為仰遵明諭俯循職掌懇乞聖明蚤選淑女以備舉行婚禮事奉聖㫖知道了欽此臣等竊念思出慈父命由大君皇上既知禮之必不可復遲時之必不可復緩自將特降諭㫖不俟臣下喋喋矣乃幾及三月未蒙傳示皇上萬幾雖煩必不遺忘至此無亦以典禮重大必待敦請再三然後行之以示慎重之意耶夫二宫落成行此大典聖諭宣布昭如日星近見工科都給事中韓學信題為大工繁巨工程不宜延緩懇乞立限責成以圖節省以肅禁近事該工部覆奉聖㫖是著內外總理提督等官上緊催儧毋得故為延緩冒費錢糧欽此竊料在工諸臣既奉嚴㫖孰敢不夙夜從事仰副聖心是大工之成已可計日乃選婚之事尚未差官自今及春為時幾何臣恐勢將無及已臣繼登自知誠不足以格主言不能以動天故兩請簡用尚書庶藉德望之臣可效贊襄之力而稽延日久㑹推無期若有所待而自諉有所諉而不言此人臣不忠之罪臣不敢也故敢罄竭愚悃仰祈天聼臣等典禮之臣以行為職不但以言為職故不但望皇上知之實望皇上行之伏乞恩命蚤賜允行博求淑質用備嘉耦使輪奐聿新之日聖駕還御之時即首舉冊立冠婚諸大吉禮則宫闈之樂事併於一時而臣民之歡聲騰於四海矣臣等曷勝激切屏營稽首頓首千祈萬懇之至疏上不報皇長子婚禮疏四為欽奉聖諭事萬厯二十六年十一月二十七日臣等於文華門接出聖諭朕惟冊立分封東宫及諸親王此乃祖宗訓章大典嫡庶長幼一定自有次序緣因皇長子禀質清弱氣體未充况皇后年在妙冲又屢遭不諱大難故不得已遲緩少俟耳非有别意亂危家國昨者大行皇妣之服已滿雖無三殿其二宮不日落成皇長子齡已過期體已充足爾該部便具選婚舊儀來看其冊立並加冠禮少候二宫落成之日行朕又思三皇子五皇子六皇子七皇子俱已長成若再少待恐又費一畨事不若亦於二宮完日一並加冠分封庶免煩擾內皇三子皇五子年歲稍長待分封之日可著出閣講書親近儒臣朝夕訓誨以開蒙塞禮部知道欽此欽遵臣等隨查大明㑹典大明集禮諸書但載皇太子納采問名以後諸儀其選婚舊儀未經開載竊惟納采等六禮俟選有淑女之後容臣等開注上請今先將選婚合行事宜酌議開列恭候聖裁計開一請聖諭一道曉諭官民人等有女子年十四至十六容貌端莊性資純美者報名在官以俟選擇一行欽天監選擇遣官選婚吉期一先期遣官以皇長子選婚告奉先殿行翰林院撰告文光祿寺備祭品如儀一請欽遣司禮監官二員給與勑書二道以便行事一本部遵奉聖諭出榜張掛京城內外官民之家先將淑女花名報官待選次咨都察院轉行直𨽻八府並河南山東南京鳯陽淮安徐州等處地方官預將淑女報官以待遣官次第選擇一各處選中淑女令其父母伴送到京所在有司給與應付腳力一各官開送到日本部照例題請欽命司禮監官赴諸王館選擇一諸王館選中女子恭候命下備查各父母身家有無違礙具揭報部轉送司禮監查照仍行欽天監擇吉具題進內看選恭候欽定命下施行一行各該衙門先期備辦婚禮合用物料奉㫖是其選淑女著在裏八府及南京河南山東刷選其鳯陽淮安徐州免其刷選皇長子婚禮疏五為欽奉聖諭事先該臣等開具皇長子選婚事宜上請奉聖㫖是其選淑女著在裏八府及南京河南山東刷選其鳳陽淮安徐州免其刷選欽此已經出榜曉諭及通行各該衙門欽遵外今據欽天監手本開稱擇到本年十二月十三日卯時遣官祭告奉先殿十六日午時遣官前去選擇等因前來所有原奉欽依欽遣司禮監官二員伏乞欽定給與勑書二道分投前去各該地方選擇緣係欽奉聖諭事理未敢擅便謹題請㫖奉㫖刷選淑女自著在京城內外及裏八府差官刷選南京河南山東罷寫勑與他皇長子婚禮疏六為欽奉聖諭事先該臣等於萬厯二十六年十二月初九日題請欽遣司禮監官刷選淑女奉聖㫖刷選淑女自著在京城內外及裏八府差官刷選南京河南山東罷寫勑與他欽此欽遵臣等即通行曉諭移咨都察院轉行五城御史及裏八府令將官民之家逐一用心體訪以副皇上慎重大禮之意今據中兵馬等司開報各淑女名氏造册呈送到部料八府淑女亦應節次報官伏乞欽命司禮監官二員先自京城次及裏八府分投選擇緣係欽奉聖諭事理臣等未敢擅便謹題請㫖奉㫖京城淑女少待裏八府報到之日一併差官刷選皇長子婚禮疏七為欽奉聖諭事先該臣等於本年二月初八日題請欽遣司禮監官將五城報到淑女先行刷選次及裏八府等因奉聖㫖京城淑女少待裏八府報到之日一併差官刷選欽此已經劄行各府將報名在官淑女造册開報前來以憑題請差官前往選擇續據真定府於本年三月初五日呈報淑女一十八名順德府於本月初七日呈報淑女二十四名大名府於本月初九日呈報淑女三十七名順天府於本月十四日呈報淑女一百四十七名保定府於本月二十一日呈報淑女一百七名永平府於本月二十二日呈報淑女十五名河間府於本月三十日呈報淑女二十八名廣平府於四月初十日呈報淑女三十一名各文冊俱已到部相應題請伏乞欽遣司禮監官領勑前來將五城及裏八府報名淑女一併選擇務得淑賢以光大禮緣係欽奉聖諭事理臣等未敢擅便謹題請㫖不報皇長子婚禮疏八為選婚候㫖日久未報懇乞聖明蚤賜遣官以昭大信以釋羣疑事臣等因淑女報名在部兩次題請遣官未奉明㫖大小臣工不能無疑多向臣言欲各具疏催請者臣等伏念我皇上方以憂旱祈禱焦思動火若復章奏紛紛不無煩擾不若臣等循職掌䖍誠申懇我皇上至聖至明知時之不可再遲禮之不可再緩必有毅然允行者矣况我祖宗家法以十五歲選婚十六歲成婚非無謂也蓋以人年十六則情竇日開防間日難是以即欲保愛其體尤欲曲體其情故立此一定之制俾聖子神孫萬世遵行而不越耳皇長子睿齡今已十八越期亦二載矣皇上天性至愛與列聖同符可獨深愛之而不深體之耶况人主舉事不但仰法乎前尚當顧慮其後今諸皇子已漸長成以次當婚矣不知至期將從十六成婚之舊制乎抑十八尚爾延緩如今日乎欲如舊制情恐有難於或異欲如今日勢恐有難於盡同不知皇上於清夜燕間之暇亦曽念及於此否也今士庶之家睹其子之成立即至貧窶者猶思稱貸以遂其室家之情為嗣續之計父母之心不約而同豈以我皇上見皇長子之氣體日充而不思蚤得佳婦以遂關雎之願以衍麟趾之祥也况及今刷選得人猶須按舊制演習禮儀非數月不能間熟比及間熟兩宫已告成矣此時若再稽遲豈不有悮明諭三禮並行之期臣等典禮之臣何所逃罪且在冊淑女嫁既不敢選又無期不無喁喁仰望之心今連日風霾雨澤欲降而不降天心欲回而未回皆是屯膏之象伏望皇上斷自宸𠂻特遣中使及時選擇上以完國家吉慶之典下以釋臣民猜疑之心臣等曷勝惓惓祈懇之至二十七年閠四月十七日上二十日傳奉聖諭昨禮部奏京城並裏八府報到淑女京城的著司禮監太監宋坤八府著司禮監監官邵從仁各供事該部知道皇長子婚禮疏九為遵明諭循職掌懇乞申飭督理諸臣早完大工以舉大禮事萬厯二十六年十一月二十七日臣等於文華門接出聖諭朕惟冊立分封東宫及諸親王此乃祖宗訓章大典嫡庶長幼一定自有次序緣因皇長子稟質清弱氣體未充况皇后年在妙沖又屢遭不諱大難故不得已遲緩少俟耳非有别意亂危國家昨者大行皇妣之服已滿雖無三殿其二宫不日落成皇長子齡已過期體已充足爾該部便具選婚舊儀來看其册立並加冠禮少候二宮落成之日行朕又思三皇子五皇子六皇子七皇子俱已長成若再少待恐又費一畨事不若亦於二宫完日一並加冠分封庶免煩擾內皇三子皇五子年歲稍長待分封之日可著出閣講書親近儒臣朝夕訓誨以開蒙塞禮部知道欽此臣等恭繹綸音於二宮落成而曰不日非謂以歲月期也於皇長子而曰齡已過期亦非謂可以歲月待也乃自奉諭之後又一年矣淑女之選已欽定矣臣等每隨諸臣閲視工程見兩宫雖有次第尚須修飾今天氣漸寒若再耽延又待明春則二宫之落成豈但不日而皇長子之年齡益復過期何以慰我皇上明㫖所云少待之心乎伏乞嚴諭在工諸臣上緊督理催造使工程早完一日則我皇上早還御一日早行冊立之禮以培宗社之安早舉婚媾之儀以衍本支之慶且諸皇子早得分封各具冠服隨皇長子趨拜於前此宫闈極歡極樂之盛事而普天臣民同歡同樂之至願也疏入不報辭尚書疏為異常恩命自揣難勝懇乞聖慈俯容辭免以安愚分以重邦禮事本月初十日該吏部題為南北大僚多缺㑹推候㫖日久懇乞聖明亟賜㸃用以全國體以圖治安事奉聖㫖陳蕖升戶部尚書余繼登升禮部尚書趙煥改南京吏部尚書郝杰改南京兵部尚書參贊機務寫勑與他葉向髙升南京禮部右侍郎臧惟一升南京兵部右侍郎未㸃的另推來欽此臣繼登不勝感激不勝惶懼伏念臣窮鄉下士弱植淺𠂻學術原自空疏性資又復迂拙荷蒙皇上拔置講帷十有一年矣空懷犬馬之心毫無啓沃之益曠官奚補竊祿足羞不意我皇上以兩年不輕授人之宗伯而舉以畀臣豈以臣尚堪驅䇿冀效鉛刀一割之用乎臣近年以來氣血因多病而日耗精神緣久病而日衰特以承乏署事未敢乞身勉強目前已慮不支冒進崇階益復難任况同推諸臣以資則先於臣以望則重於臣而臣獨以寡昧之才得之能自安乎且宗伯班高南省主典神人今天災地震人變物妖踵報叠至人神怨恫禮樂廢壞風俗薄惡教化陵夷此何等時而可以不肖之臣肩三禮之任哉臣聞德薄而位髙者危力小而任重者仆與其既危既仆然後從陛下乞有罪之身孰若知止知足蚤自控辭於君父之前也伏乞皇上俯鑒愚𠂻收回成命俾臣仍以舊職勉效馳驅庶上不傷陛下知人之明下亦遂愚臣審已之素臣曷勝惓切仰祈之至奉聖㫖卿器重學醇講帷著績簡司邦禮出自朕衷宜遵成命供職不准辭吏部知道淡然軒集卷一
