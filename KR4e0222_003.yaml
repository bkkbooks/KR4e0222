body:
  text: 淡然軒集卷三明余繼登撰序送查紹亭參藩山東序不佞方束髮時海寧紹亭查公已通籍為名司理竊意以彼其才自顯庸也乃遲回者餘二十年始以憲大夫備兵津門又二年始晉參藩政督東方漕務夫才賢而偃蹇阻抑不得馴致高位則不能無少望往往傳舍其官日冀得代去公沉抑久比再起家僅以次遞遷不越常調顧能屈能伸彌抑彌奮方其治津門也當南北舟楫往來之衝又水旱為災能精心經畫為一方圖便計裁省驛傳優恤窮簷奬進良吏禁戢靡宕妨生椎埋作姦之徒日鰓鰓然即理其家務無以踰此故兩載間亷頑貞淫起敝維風俾下邑大夫行公之意得各舉其職而無一切牽纒之患于公行依依不忍舍詣不佞請詞竊按山以東古齊地地連畿輔轉山東粟由汶濟而達京師其勢甚便故國家之視齊猶外府然齊故大國即史所稱車轂擊人肩摩何其盛也當其時南支楚北支燕西支三晉軍興之費無歲無之而猶號富強於天下今臨災琅琊猶故也山海魚鹽之利無改于昔也計歲所輸縣官費者不及昔之什一而户鮮蓋藏民稱凋敝安得所謂家殷人足如古昔者乎農民畢命耕作猶不能滿歲額煩使者執簿書繩之比歲凶至捐內帑佐百姓之急而一二不逞尚嗷嗷以時詘為辭嘯而過市掠富人粟此何以稱外府也夫督賦者主在足賦賦稅不充見謂溺職然以取盈之故而䖺䗤其民令顛頓溝壑若逋逃潢池此其憂不獨無賦之患矣賦者不從天降鼂錯所云生于地長于時而聚于民力者也蓄其力不違其時使人懷樂生之心則野無貧民國無逋賦故催科撫字兩者勢若相盩而機實相須也豫獨怪漢武帝日事征伐以虛海內于時諸臣不能輕徭薄稅與天下休息顧希上意指籠天下鹽鐡出告緡令以重困百姓卒之上未獲其利而民不聊生至今令人於邑非之故治賦有道橫征暴斂藝極無經者舛也纎取倍計竭澤而漁者拙也促期煩會急如逋亡令貧民稱貸商賈牟利計之左也驅遊惰之民墾生榖之土出山澤之利適徵會之宜如是而已昔人有言知取之為取而不知豫之為取夫能知豫之為取者可以富民可以富國可以操大柄而盈縮天下之元氣是皆公之所素裕者方公守安慶也逆卒稱亂大璫肆螫呼吸之間成敗立見而公不難密謀顯訟以熄其焰而折其威此其鎮定之才剛毅之氣久有大過人者又何難從容持籌而調停均節于無事之時也贈林大夫丹臺三載考績序今之校士者猥云吾取人以才耳不必盡以尺矱繩之豫竊謂不然夫才者材也將以適用也不尺不矱何以適用不適于用何以言才此義不明而才之名為齊給為便利才之流為夸誕為蕩悍晚近世士性能稍異往往溺其末流樂其名稱薄經常而競恢譎裂官常而恣胸臆曰吾非常之才安可繩以尺矱也夫信如才而可以齊給便利夸誕蕩悍稱也則古之宣慈惠和明允篤誠者何以稱焉又何孔子之所嘆以為難者而今滋多也故宣慈惠和明允篤誠才之質也齊給便利才之末也夸誕蕩悍才之賊也豫嘗持是説以語同志獨曾直卿氏以為然比直卿典試而所首舉者為漳南林君林君之文固溫醇爾雅守先民之尺矱者也豫謂直卿能得才即直卿亦自詫林君才未幾而林君以次出典深州直卿言州牧之職其率屬也如守其親民也如令筮仕而典州者難畿輔諸郡部使者之所沓至彼此異勢愛憎異情是非易淆毁譽忽變筮仕而典畿內之州者尤難豫謂直卿意難林君乎以林君之才何難恢譎其詞以解于世俗之耳目薄而不為也夫不肯越尺矱而為文乂安肯越尺矱而為政以尺以矱于治奚難焉深人杜君榮者豫同年友也為豫言君始涖事察謡俗問所疾苦􅊧積蠧省供億罷法令之妨民者行之踰月吏抱牘受成無敢短長民不畏吏會歲飢君周行阡陌間發倉粟以賑之緩征弛役釋禁輕刑一意與民休息行之踰年百姓安于田里無愁嘆之聲無流離轉徙之志爭相戒捐其小忿不以煩君爰書訟庭無事君乃進文學弟子與陳説經術剖析疑義俾不悖所聞歸之大道又以月旦屬諸父老為分别禮義科指出教民簡易册頒布之俾歸各訓誨其子弟以風易閭里行之三年民化其訓樂其業訟獄衰止桴鼓不鳴青襟之子彬彬然質有其文舉其鄉者倍于往昔于是部使者疏君治狀上之功曹主爵者奏君最按令甲得封其尊人如其官璽書既下會其尊人來省視君為具法服陳制詞帣鞲為壽融融樂也豫間以杜君語語直卿因共嘆君之治大都在平法令振困乏清犴獄興教化斯皆有司之尺矱無他奇也而君次第推行之期當于民心而止卒令事集民安名尊而親顯彼其並時之吏以才名自蓄者其精神之馳騖豈不欲陵君而出其上而一敗僇辱豈獨其性殊哉彼亦窺見世之一二揚詡為吏者用小治辨或好氣敢往輒得意去故不勝苟且之心而緣飾伎倆以庶幾于一快遂至此極也而耳食者猶然扼腕而惜其才以是為才才豈人祟耶國家亦奚賴若是才也者而用之也昔成𢎞之間禁罔疏闊居官者寬然行其志而毋務徇其名日計不足歲計有餘民以太和海內殷富今能吏日多姦軌日起法網日密民生日窮至勤主上操三尺以申令之而宣慈惠和明允篤誠之士猶不得與齊給便利夸誕蕩悍者較軒輊則才之名誤之也治行如林君而以高等褒顯其所風者大哉會杜君來徵言以賀用次前語歸之送憲大夫彭秀南擢浙江大參序秀南彭公備兵津門幾三載以治行最擢浙江參政行有日矣郡邑諸大夫服習公訓而惜其别也走使來徵贈言豫竊意津門在京師宇下為咽喉要地今倭夷猖猘闌入朝鮮破其國走其名王朝鮮不能支將乘矯汛而犯津門有急則京師恇擾公治津門久諸所擘畫如恤民飢清獄訟詰姦宄飭武備一切出令布憲皆惠民實政故數歲以來旱蝗為災民半菽不給而溝壑鮮瘠萑苻無警戎器既除卒伍不譁當此之時使公持籌於上諸大夫稟仰畫諾循令而從事則人樂為兵兵樂為力滄瀛之間隱然藩籬之固奈之何移公而浙也浙與津門地有輕重勢有緩急主爵者謂何令公釋重而趨輕舍急而就緩乎已而自念主上天覆宇內何知南北即以輕重緩急言人情每難所重易所輕備所急略所緩難則圖備則無患易則弗慮略則弗圖弗慮弗圖乃足虞矣公雖去津門而整齊振刷之具固在天子又僴然念重地之急也特置文武才幹之臣廣召募精訓練以坐鎮之即有倭患而倉卒足恃浙故嘗創于倭虔劉特甚雖其人勇悍能奮脰不顧然健者應募而北壯者老幼者生未嘗見冦欲其聞戰聲頓足犯白刃斷死於前難矣何者未嘗訓之無以作其氣也公為監司能布恩信稽尺籍伍符得士卒心兹借公而南欲公即所已試者而效之南乎况我之所重敵或難之我之所輕敵或伺之我之所急敵或避之我之所緩敵或乘之公在津門而備其所急則重地重公在浙而備其所緩則輕者亦重輕者重而重者益重矣顧豫之私憂過計而欲倚重于公者不在倭而在盜蓋倭如豺虎然豺虎窺垣有垣可扼艎􅀈既備漂忽難前獨今海內虛耗家鮮蓋藏歲一不登枵腹待食者十室而九待食而無以得食則待斃不能坐而待斃則轉而為盜矣蒼赤盡為蟊賊鉏䥳悉化為戈鋋一夫鴟張千人蟻聚萬一有冀幸之夫乘間而用之此姦雄之資而亂之始也計浙與三輔何異正昔人所謂無亂形有亂萌是不測之憂也豫計誠過敢以質之于公願公以參伯之重南而銷越之民萌旋復以中丞之節北而銷三輔之民萌則南北長無事矣公有意乎豫將計日俟之饒陽令閔君考績榮封敘閔君汶令饒陽之二年通前令上高時計滿三載當報政主爵者上君治行中賞率乃按令甲下璽書褒豫之贈其兩尊人暨其配如其官璽書下饒陽饒人士介同年王君來徵贈言不佞竊惟士方未遇無不自意安有屈首受書而不能取顯庸纍歲月之勞以榮其親者乎然今之資適逢世者何限至有紆青紫積歲時而父母不沾一命者則為吏之難也夫吏治難而令尤難令難而畿輔之令尤難畿輔密邇輦轂部使者數倍于郡國賢者易以騰聲不賢者易以蒙詬無論不賢者請言賢者共事而吾處其名則不賢者忌共賢而吾處其上則賢者亦忌賢者忌則陽與而隂敗之不賢者忌則浮慕而計壞之上意不吾嚮則因其不吾嚮而明言以毁其功上意吾嚮則因其吾嚮而微言以毁其名此猶其相與者請言其上者上有所欲急而吾偶緩之則指為廢格上有所欲緩而吾偶急之則指為廢令彼之所緩此或急之彼之所急此或緩之而吾以應此者應彼應彼者應此則一事而彼此之喜怒異民便于急上或緩之民便于緩上或急之而吾從上以拂民或從民以拂上則一事而上下之毁譽異微文小例動皆纏牽而欲三載之間孚下獲上送往事居一無所失以完吾名難矣故曰畿輔之令尤難吾不知閔君治上高狀乃王君則道君之治饒者矣君治饒競絿剛柔一無所偏主而一主于至誠先民而後身先實而後名在饒再閲歲妻孥不以入官舍蔬食浣服蕭然如旅人民有陷文罔者每曲意矜之不得已而後致之法即置之法而情常溢于法之外甚至狴獄纍繫亦歲給米糈生活之獨胥役為姦利即窮治無少縱細至筆札之微亦日有程稽勿令得剝削吾民邑有三功臣田租額故輕于民賦猾民利其輕而擅其利數世矣比均田令行民賦稍寬矣復欲以其租竄入民田中百計經營至抱牘走闕下君力持不可為分别所以異卒令不得逞其姦邑故下濕水則田為沮洳水去則沮洳者為腴田田無定額豪者往往私其腴田而匿其賦以賦纍窮畸民君亷得其狀為大搜伏田凡得田若干頃邑常以水故卒移養濟院于學宮之左而移演武場于邑數里外廢而不講者更數令君喟然曰兹胡以稱右文而無忘武備哉乃捐月俸為擇近善地易置之而又以其暇延禮逢掖士為剖析疑義校諸騎射于農隙以示威衆銷萌之意王君述君治狀不具悉其大都若此夫邑故僻壤無行李之往來故君無境外之交以借資而釣譽其精神之注厝獨孜孜于便民之事又巧宦之視以為不屑為者故民受其利而人不忌其名身居其實而上不疑其偽以日月得上功有司寵施其親世之所難而公得之易兹可不謂榮幸哉漢世政尚綜核吏治蒸蒸盛矣乃其所尊寵者不在趙京兆之流而在潁川渤海彼潁川渤海固敦本尚實崇禮厚俗無他竒也主上哀憫元元抑矯虔吏而痛繩其墨者其意指猶漢法也君既以舉職當上意博榮施則無難於畿輔之令當無復有難君者華紱恩綸固未可量矣王君曰有是哉請書之為異日左劵邑侯馬瑞河交奬敘邑自清宇林侯之後缺無令者亦越三時握篆視事付之鄰邑之二蓋數年之煦育不勝三時之朘削矣晚得馬侯以趙博士擢令吾邑趙與吾邑俱畿內地侯固稔知邑之地瘠民貧賦重而役繁也而又當亢旱之後朘削之餘百姓嗷嗷朝不及夕甫下車即問民疾苦竭心思求便計乃條為十八議上之郡守監司暨諸直指使者豫之者十九不豫者十一不佞聞而嘆之此十八議者謂不便于民耶則民便之矣夫令也令一邑苟利于民專之可也矧論定而議議而復請請而復行顧猶然有不豫也者此何以説也如必惠自上流令不得議則令可默默無事已乎又安所稱令也卒之不豫者不勝豫者未半載而奬豫之檄交至於是諸搢紳士洎父老子弟來徴贈言不佞竊惟智者不逆上以任譽志士不嘗試以徇名侯計以紓民之困而不計上之豫否是令之職也非以博名高也不慕名高者不樂諂言不佞安敢以諛詞進聞之聖人舉事必藉于權而成于斷權者事之幹也斷者事之機也權一者能制計定者難惑請言令令者如大將建旗鼓以令衆而左右進退惟其指使而不敢越之謂也故令行則治否則廢雖然亦難言矣令以一人坐堂上而利口機械之徒伺吾好惡而圖以竒中欲興利而言利者進欲除害而言害者進欲利害一切報罷而為無庸有事之説者進人情變態莫可究詰故能操利害之柄則令行科條煩蕪書䇿稠雜而能不沉于辨不溺于辭則令行勿朝鼓瑟而夕改竽勿議事擊鷙而當事首鼠則令行勿與知之者謀之與不知者敗之則令行其言是其人非則用其言詘其人其言公其心私則察其心并詘其言則令行有擅行不顧擊斷無諱牟利于身而結怨于百姓者必無赦則令行夫叢藉人以神神去而十日枯矣虎藉狐以威威行而百獸畏矣是故其威內扶者不怒而民畏當機立斷者不勞而成功故曰致治有常利民為本從政有經令行為上而上之知不知無與焉此勞人之特操而賢者之上願也不佞又聞之竭言不讓忠也聽言不二明也忠無隱情明不拒物侯儻不以豫言為過計繇此以議功名于世其所至非不佞所能量矣邑三尹邢晉川交奬敘今仕宦自長令而下若丞二簿幕上之人即見以為冗瑣而無當于用歸功奬能十不一二而嚴譴苛責十常八九彼見上之凌折之也其亷者救過不贍碌碌奉其職其卑者幸旦夕無事為囊槖計耳此無論上之人薄視之即其人自視亦以吾冗瑣耳惡能勝其任而愈快也嗟夫人之才品豈緣官秩而顧以崇卑為賢愚哉博平邢君既受牒為吾邑簿豫識君邸舍君曰某有先人之敝廬足蔽風雨不腆薄業力耕其中足以自老必不敢以官為利以自點也豫謂君曰夫才品在人有限不可強致而所可自靖者心此心不點則是非毁譽榮辱得失舉無以撓其中執此以往即盤錯重巨無足為難者况舉一職效一官也君既視事而精勤舉職亷平不苛能不愧其言蓋簿緣河設職主河不主民事然署不在邑而在邑之别鎮鎮去邑遠舟楫之所往來商民雜處于是有舍其職業不理而理閭閻之爭訟者鎮有榷稅輸之郡者歲數百金皆簿為之徴輸緩急之間不能無所染指故往往不為河決溺其職去則為豪姦挾其短長以敗噫兹豈官之罪哉君至一切謝絶民事云自有主者獨日夜行河率其徒役􅀈􅀈然視隙岸而繕治之每當秋夏之交至舍河上督畚鍤力與河敵河即暴發不至沒禾稼為運道梗君又悉輸稅之苦曰古之稅者㕓而不征今有有其貨而有其稅者亦有無其貨而有其稅者甚至有無其貨并無其人而有其稅者吾力不能為商人請命忍漁之哉故年來市㕓空虛而逃徙不至盡者君之惠也君所為精勤亷平類如此久之而部使者奬豫之檄交至奬多媺詞大都如前所稱説者邑諸君子欲從豫受詞往賀豫惟古人有言賞異等罰不肖舍是無以治天下然今賞罰之權提衡于部使者部使者在昔微行閭閻察吏治得失耳目皆以自任而後漸寄之監司郡守監司郡守倦于伺察而漸寄之私訪之姦耳目自任則部使者為政寄之監司郡守則監司郡守為政寄之姦民則姦民為政部使者為政是是非非百無一失焉監司郡守為政十不失五姦民為政則是非淆亂不可知矣蓋姦民而操上之權將睥睨長令隂詗而陽持之其視丞二簿幕蔑如矣彼小民見其易危一不當即羣起而嘵之亷近堂卑法日以削夫既樹之秩庶務之所倚辦而其勢至使上之人輕之下之人又輕之以至不敢自重則安可不藉一賞以示吾之獲上使人不敢狎視而思易踰也諸君子所為賀君之意其在斯乎若君之心則固不以官為利者而又何利其名也贈學士陸敬承先生視留篆序高皇帝定鼎金陵倣古𢎞文麗正遺意置翰林院延天下名儒若青田龍泉諸君子日侍左右相與闢草昧之路諸君子逢時遇主亦各輸所志黼翼鴻猷樹豐功而垂休問故雖宸極北御百數十年留院之長無所事事至比于隱丈人而天下視之如鼎彛鍾吕崇重而莫敢望焉豈非地以人重所從來久遠哉豫往歲偕宮諭陸君試士留都循故事宴於瀛洲之署升堂四顧恍然若有數君子者揖讓於前而庶幾遇之也君之言曰今天下諸司間曠幽寂無如留院最者吾得長是署吾意將甚適焉豫漫應之曰君自適其適宜無不可苐吾儕無樂君有此適也君曰何故豫曰君朗識淵𠂻博聞雄辨與之髙談竑議扢古酌今纚纚洋洋靡不各究其指能令聽者虛往而實還故吾儕視君為友為師為蓍為蔡安可令君一日圖南而自適也蓋又一歲君晉秩學士綰篆而南長留院事竟如往歲所言夫間曠幽寂之司吾儕不欲處君乃世固不能舍君豈君意自適其適而主爵者莫能違耶抑君以前上書不報近有所陳説又未甚尊行其言遂欲屏迹而南自處於若進若退間耶君往矣勿以守空篆苐坐私關吟卧自如亦勿徒尋六朝遺迹躡空觴咏以悠悠為愈快夫天下變故每若於卒來天下事功亦嘗苦於卒辦藏智蓄謀計當有待則當機應變用始有餘方青田龍泉諸君子伏在田間世疑於不用然其心未嘗不願宰天下垂功名于竹帛也主上神聖何難步武高帝今適深居靜攝未遑覽君之疏耳如一旦清燕之暇取君先後所陳説者紬繹之而概於中有詔召君處以啓沃贊襄之地君出所未用者以濟艱定傾與青田龍泉諸君子比績而爭烈當自留院起矣君戊子所舉江右士某君某辛卯所舉南畿士某君某來索贈言豫不􅈺於詞姑述先與君語者稍次苐而歸之賀劉諫議母胡太孺人貞節序豫二禮曹主在褒揚海內婦人女子之節烈者以惇倫勵世厚俗維風今國家道化所翔洽最久亡論郡國歲所上貞女節婦事後先相望即都門之內薦紳之家數月來有幽閨姱節者二焉一為馮太史母劉孺人一為劉諫議母胡孺人劉孺人别有序胡孺人者幼􅈺女訓十五而歸贈君又三歲而舉諫議君二十九而贈君死孺人於時不難以一死相殉而顧諫議君煢然也乃大痛曰死易耳誰其撫此者以續劉氏不絶之脈而報夫子於地下也於是謝妍華攻苦食貧日夕督諫議君於學比諫議君成進士讀中祕書至今官臺使者具孺人事疏聞於朝下之部部覆如其言得俞旨表厥宅里孺人益太息曰未亡人始望不及此其及此天也吾徼天之幸以報夫子足矣而忍自以為名哉聞者益賢孺人適李君蒼泉將鳩里人為賀徴言於豫豫惟婦節難在士夫家尤難田婦野女淡泊素甘心無二慮士夫閨閣其於紛華靡麗狎目薰心一旦寂守空閨母子形影相弔悠悠歲月歷數十年而介然漠然無盛衰之感此非心堅金石者未可易言故曰難也孺人伯姒居尊官顯榮赫奕獨孺人單門弱息歷百艱以有今日人見其老綏祿養晚載榮名無弗為之艷羡者而詎知其至難至苦匪易致者哉夫天人之際交相為報天之報孺人惟諫議君孺人之藉以報國家亦惟諫議君孺人身兼教育之事彼其自幼至今家庭之間所為諄諄訓誨者舍貞之一字當無他説矣夫從一靡忒不以生死易念婦之貞也純一不二不以利害易操臣之貞也諫議君幸得身為近臣出入禁闥於天下事無所不可言且值多所可言時上至衮職下至民生利弊知無不言言無不盡勿抗厲以為高亦勿避忌以為能使吾不負言之名而天下受言之利此善行孺人之志而報主上之職分也審如是則所為光顯孺人者又有出於貞節之外者矣送馮用韞學士奉詔歸省序萬厯癸已秋馮君用韞晉宫詹學士視翰篆䆮䆮嚮用矣會其尊人仰芹先生以河南大參入賀萬壽還移疾乞致仕用韞聞之即具疏請歸省視天子嘉其意豫五月休沐加賜金幣俾乘傳以歸豫造用韞問曰君胡為乎歸也曰家大人歸矣吾安能勿歸曰君家大人胡為乎歸也曰病矣安能勿歸豫曰君家大人能自二千里外望闕而趨陛辭而往頃得一再奉觴見其飲食笑語不異往昔此不病明甚無亦謂君家纍代仕宦而今又父為參伯子為翰長德業聲譽皆世所指目艷羡故鑒滿盈之戒而為是止足之計乎豫竊謂不然夫滿盈若器器有可以斗升量者以斗升注之則滿盈滿盈則足足則止不止則溢江海之大利盡萬物萬物得之以滋以生故衆流歸之百川灌之不見其止亦不見其滿盈人之器量亦猶是矣先生江海也昵而就之城府不設肺肝畢見徐而察之則澒洞淵泓蓋渟之無窮而資之無盡也夫天下無事即中材亦可以自效天下有事非卓犖之才難與應卒今飢饉薦臻羽檄交馳不可謂無事矣君家大人既身負其竒自宜畢智竭力排難解紛以樹尺寸報纍葉之寵榮奈之何當五十有五之年抱十不一試之略猥自託於止足之説遽求便安以自遂其私也夫世惟需才而才之用世各有所重才非大用者以退為世重知進而不知退則敗名才可大用者以進為世重知退而不知進則無功君家大人果才盡而退乎抑有才而不盡用姑以退為名乎不挾其才而進以就功乃挾其才而退以就名豈以其所重在此所輕在彼也且君家大人進則君即欲歸無可指以為名而國家于君父子兩得其實用退則君之歸適得借以為名而君家父子獨享其榮名彼榮名之不可滿盈也猶之祿位也欲以避祿位乃以就榮名與其退而就榮名有其名而無其功孰與進而就祿位有其名兼有其功也用韞曰子得其一耳穿楊之射百發百中猶貴善息吾弱冠登朝一蹴而至金紫即家大人不歸吾猶懼弓撥矢鉤也而况家大人病也豫曰夫所謂弓撥矢鉤者以末勢言也君雖顯庸乎而守間曹弄柔翰虛言無用今漸柄用矣是方其調弓均矢時也而即虞其撥且鉤乎且天之不易生者才也人之不易得者時也非功無所施才非時無以建功才如利刃不試則鈍時如隙駒既往不復君行矣勿謂少壯為可常勿謂歲月為可愒奉詔而往奉詔而還俟君他日功成名遂然後奉身而退稱君家大人百歲之觴為詞林盛事當自有紀述之者無俟豫言矣奉贈夢翁李老先生榮晉南少司馬序夢池李公撫畿南久廷臣以公名賢屢推轂公屢報罷戊戌冬始晉少司馬佐留樞事行有日矣真定徐令藁城錢令以豫為公宇下士具公治略來徴贈言蓋豫反覆公事而嘆公之難服主上之明也薊保晉三鎮為京師屏蔽自欵市至今獨薊鎮猶苦未寧耳晉不被兵保鎮益無患無患遂無備無備遂無兵公意敵可猝來而兵不可猝整備不可猝辦故始至鎮即簡將練卒補乘飭具節約浮冗修理亭障經營於久廢之餘而振起其積弱之勢此公之難也趙魏六郡民鮮蓋藏暵旱艱食不難轉徙為盜縱之則亂急之則愈亂公為諭諸長吏察疾苦省勞役發倉廪勤賑恤不驚不擾徐為措畫而萑苻無警田里皆安此又公之難也中使銜命開採戒令勿擾公禁之不得抗章攻之不得引身避之又不得力難坐制其橫勢難坐視其橫一操一縱其道委蛇不令喜不令怒卒使我無其迹而民受其惠此又公之難也邊臣守禦三韓間兵連不解羽書狎至方調兵朝鮮又調兵津門兵固公所素練也然練之則足分之則不足自海上戒嚴敵且生心公以其足者分以備倭而以其不足者留以自備日討軍實日辦軍資以義激其行者而以恩撫其居者令行者無怨居者無虞此又公之難也貧民半菽不具而軍興轉輸百需取給焉百姓嗷嗷所在思亂公為躬厯郡邑拊循而慰安之減騶從損供億未至咸不聞有公至者既至而德意所流溫於挾纊乃始歡然幸公之至也故即力盡不勝役財盡不勝求而嘆息愁苦之民卒無呼譟而起者此公之力也又公之難也方公疏上忤上意衆謂且得罪去而上知公信公推心不二委任不疑晉公副都御史再晉今官浮言不能搖讒言不能中蓋海氛未靖畿輔重地不可一日無公故留公必海冦既平始晉公秩以酬公勩故曰主上之明也或謂知公不宜令之南置之散地豫謂不然天下有變自外起即至猖獗有所限隔而防禦之易自內起即至微眇易於嘯聚而削平之難防變於未變則從容暇豫而其圖易防變於既變則倉皇舛錯而其勢難今倭雖去屬國雖安而姦人以利事惑上聽者紛紛四出此范文子所謂內憂不可謂無事也留都根本地長江上下悉為盜區數年來所為防倭計者其略可睹已識者有隱憂焉公既身當其難而拮據於多事之日必能圖難於易而計畫於未事之先所為用公者意在斯乎則益服主上之明矣贈劉斗墟敘世之仕宦於時者孰不思自顯庸也以顯其親此人情之必不能無者而豪杰之士或不然蓋人不可徇則身有所不暇計法不可撓則榮親有所不暇及若吾邑侯斗墟劉公其人也公守合州值有採木之役公主在集事而虞在擾民卒之民不擾而事集會忌者讒之子直指公見直指白所以不擾狀無少遜謝直指恚甚何物守乃強項如是即以擾聞上怒逮公赴詔獄公毅然就逮緹騎卒冀賂稍折辱之公曰守惟無賂故逮逮則逮耳守故無賂也會州民數千百人隨公攀號爭醵金錢為道里費公悉却不受逮者為感動善視之比獄具不如直指言守得釋僅鐫三秩既而起黃安令再令吾邑一以愛利為治行比邑人有亡其馬者謂吾邑人盜買也且指與盜通然邑人實不買馬令某遣人逮邑人且急索賄邑人罄所有賂之不能滿其欲計無復之遂雉經死令某怒未已復逮繫其子并欲逮子家屬公曰買馬無左驗而株連不已是吾民可魚肉也父母之謂何執弗豫令某愈怒為汚衊語中公或曰某豪有力能毁譽人公將滿獨不能忍一人以徼寵于先人公曰吾知有吾民耳終不以一命隳吾守卒不豫兩臺監司即不惑于蜚語然無肻薦公者久之鄰州獲買馬者并獲盜事始白比邑所遣人論如律臺使者益知公寃服公執爭露章薦公遂得以考最追封其先大夫如其官余子曰當公之抗直指也慮不顧身矣而身卒以顯其撓豪令也計亦不顧官矣而顯卒逮親事有因敗而成功因毁而成譽者類如此總之公無心也公之心誠于為民而已善乎曽舜徴之贈公也曰吾輩居恆抵掌謂天下事任真心為之靡有弗效即未必效也而真心終不可化夫惟真心也故不可化如可化是是非毁譽之心非真心矣豫聞公在合州州民失火比屋延燒公直趨火所祝曰民無知勿災民罪在守守當其災民懼焚守爭挽守去守固不去曰欲救守當救火民爭呼救火天為反風火乃熄歲甲午郡邑旱甚榖價翔涌人心皇皇公布衣蔬食行祈于郊會有言某所龍神是洪武初遡河而來者神最靈有禱輒應公為文禮請之將至郊公郊迎時從禱者數百人見有蛇盤伏道側共提擊之公以為神止勿擊令左右盛水于盎祝之曰果神也入此水吾得禮奉之祝畢蛇蜿蜒入水中四顧舁者無驚怖狀既至郊壇置神座前有頃復蜿蜒繞神身據神兩肩下視人移時乃去遂大雨遠近霑足及境而止境以外旱如故嗟夫公之真誠至于格神天感風雨而乃不能動人猶令倐伏倐起也豈人勝天哉卒之天報善人非天卒勝也真心效也公今晉工曹入留都竊意天下之至蠧財至不可詰者無如工役之事彼閭閻脂膏出之民者十入之官者五出之官者十入之工者三夫出之民而入之官者此公所習知其出之官而入之工者不知公何以為計而節縮之也公之行也豫不能與邑之父老子弟攀卧留公特表公居官之槩以當輿人之誦不敢飾一詞焉送馬瑞河邑侯擢守霑益敘邑侯瑞河馬公治吾邑幾兩考矣察三輔治行無如公最諸往來境上問謡俗者無弗知公賢兩臺諸使者無論奬豫之檄即露章而薦無虛歲乃並時之吏率用積次得遷去而公獨鬱鬱守一官不得調有疑之者間以問豫豫曰不調固宜夫仕尚巧而公拙是安得調問者請其狀豫曰巧吏尚嚴酷為能務以刑罰繩下而公依于豈弟日煦育之至笞箠不妄加人巧吏急于簿書期會緩于民所疾苦公所孜孜在為民興利除害往來阡陌開通溝瀆務多積貯以備惡歲廣賑貸之本巧吏朘民為儲峙以飾供億或為境外之餽廣交要譽而公獨捐俸餘新學宫置學田治塗建橋建久長之利巧吏多陽浮慕其屬而隂把其罪冀移過以自解公一以至誠馭下吏務在成就安全有不當上意者調護之尤謹巧吏視上官意嚮有可中其欲者不難瘠下以肥之公屢忤當事忍于甘誚讓而不忍厚算苛求以剝取錙銖之利巧吏或偽增戶口收取異等之效公再審編輒核䆮耗減孱弱不憚損其戶數巧吏先文法後教化公按里為社社立三老羣鄉之子弟訓誨之表貞闡幽示民為善之路公之政不能具述要皆世所厭薄不為者大較拙矣問者曰如子言誠拙然巧者勞拙者逸勞者罔功逸者有成拙者竟勝久之公以積勞晉霑益守于是問者詫豫謂拙勝言效豫曰否以公之賢上之不得被徵召為臺諫次之不得入郎署才得一州又萬里外蠻夷之所錯處是不免為巧吏所揶揄安與較勝哉問者曰不如子言霑益荒服非如畿輔在宇下也北望長安君門綿邈吏治得失非如三輔郡縣朝布令而夕上聞也部使者兩歲始得代文罔疏闊非如畿內直指持斧四出耳目繁視聽廣也而又貨財之所出囊槖難厭部落易凌人有忿心往往起而捍吏則見謂夷人之性易動難安輒用斬殺束縛從事夫夷非易動也使民有不安其處者易動之勢也主爵者計以為用武健吏不如用良吏公久以循良著稱故推擇為牧使安之耳矧霑益視建昌若東西家然在公實為便地何言拙宦不如巧且吾聞之巧者恃人拙者恃天人不勝天則巧不勝拙故拙者勝嗟夫仕宦之路如轉轂然巧而拙乎拙而巧乎豫不敢知然豫偶覽輿圖見霑益之南有地曰交河者以盤江蠟溪合而名之也宇宙之大為交河者無幾乃公起家交河而今之典州又得交河則公于吾邑視若朱氏之桐鄉戀戀不能忘而造物者又或若象公意擇此地以畀公令顧名思舊不忘以交河之治治霑益也是天之置公抑又巧矣公之行也邑搢紳來徵贈言豫因論次與問者之説歸之以質諸公而為公别贈大中丞見泉魏老先生六載考績序魏公見泉撫晉以來滿再考矣此近日撫臣所未有也朝臣以公名德廷推公可大廷尉可佐院務可南北卿二者數數然也不報公念其尊人封中丞公年踰大耋疏乞歸養苦情苦詞即令伯之表不切於此亦數數然也不報或遂謂公素直道屢抗章言事上心恚公故以此羈公豫曰非也公自西臺躓而復起屢遷而至今官此上知公也知而用之用而羈之必不其然蓋所為中格而不報自有羈公者非上意也然所為公計即未可知所以為晉人計則善矣晉故邉鎮敵人昔所蹂躪自貢市以來寢戈息燧惟欵是恃士馬日以凋殘垣墉日以圮廢轉輸日朘以供苞苴將吏日偷以待遷擢彼此相倣後先相襲若謂固然恬不知怪自公之鎮而墨吏望風解印綬去不則改心易慮從公於道又不然則已露章彈之矣公以身律監司監司以律長令長令奉意指各治其郡邑各詢疾苦各務節嗇務本尚實興廢起敝閭閻有恬愈之樂田野無愁苦之聲此公之有造於晉也烽煙雖不作而公防邊愈至日討將吏而訓練之簡其不任者易置之士馬羸弱者易之器械朽敝者治之城堡墩墻之當創理者繕修之於是鎮始有將將始有兵兵始有騎乘器具要地始有城邊地始有墩堡垣墻無事則為桑土之圖有事足為守禦之備此又公之有造於晉也世之偽儒謬為詖説以釣竒炫世相習相煽自南而北俾新學小生日漸惶惑而沉溺公為創立三祠祠其鄉之先哲羣諸士於中親為論説勒之石示以惇倫尚實之是崇虛騖詭之非諄諄諭其子弟令子弟歸諭其父兄務使邪説以息學術以正教化以興風俗以醇濳移默導而無其迹此又公之有造於晉也公剛腸疾惡見司餉之臣有以出納干公議者不難按蹤迹紀奏之怨有所獨歸而無所避勢有所反噬而無所辭使此為覆轍後為殷鑒膏脂不屑越於貪人金錢得霑被於邉戍此又公之有造於晉也全晉課稅名為公費實皆私蓄公意費一也用之公則公用之私則私故不以稱使客而以飭武備不以資問遺而以充軍實實樹鎮戍藩籬之固隂省帑藏徵發之需此又公之有造於晉也豫嘗泛觀天下之人才士十一清士五十之一直士百一然才者未必清清者未必直即清矣而或至絶物直矣而或至陵人是又譬之嶮崖瀑泉無所用之矣公清操直節世所共信而為國為民一念發於真誠故所至舉職不徒以亢厲為高即拜疏移疾閉閣待命而一切庶務不廢經營自入晉至今無二慮此又人所不可及者公在晉久人多為公怏怏而晉人戀公如孺子之慕慈母惟恐失之故曰所以為晉人則善也豫不善諛人公亦非受人諛者因晉藩臬諸君子之請而托公撫晉之槩如此主上方勵精理道與衆更新諸沉抑外寮者漸以登進今司功氏列公治狀必且褒勞加秩以驛書召公無疑豫以為公在外能扼公之身而不能扼公之澤不下於民在內則諫有所不必聽言有所不必行至於力所不能及不知公有何轉移調劑之方豫且觀公之後矣贈斗墟劉侯考最遷秩敘古今談吏治者莫盛于漢然觀班史所載循吏如黃次公朱仲卿輩寥寥才數人耳又皆以愛利教化為務噢咻如慈母然無它奇也其當時之吏如奉職盡節直法行治以摧折擊斷為名使豪強重足而不敢犯豈不稱其任而愈快哉乃不得與前數人者比績而並列以是知吏道所尚在彼不在此也今俗日趨于偷吏日競于法即使民有所赴而然有所畏而不得不然亦非太平之原父母之誼矣吾邑劉侯聰敏識事發姦摘伏批郤導窽常有餘才而不盡用其才一主于仁愛化導以安全愚民方下車時或有言邑吏舞文能上下其手以出入人罪者猾役與吏為姦沒徵稅以自腴而責償于善良者姦民飛詭善隱田租者遊民不能自食或鼠竊以幸旦夕之命者輕薄惡少無市籍商販作務而鮮衣偷食不難聚黨剽劫者左道之徒百千為羣以誑惑愚俗者侯曰以吾力去此如從竈上掃除耳第民者從教而不從令善治民者使民見德而不見刑于是每詣學宮與博士坐堂上羣諸弟子考德問業親自飭厲間問民所疾苦及吏治得失有盡言相正者不為忤輒謝不及後當自改不以顔色拒人恐不復聞吾過也諸生有明經飭行者欣然奬借不啻已出以勸誘其餘度邑之村聚為社社凡十八推長年有行者為之長取高皇帝諭俗六言而演其義俾聚其社之人訓誨之即窮鄉僻處亦時躬蒞其社自為講説勸以為善防姦節用殖財之意又鄉置里正父老得平決訟詞有訟者俾各就其父老平之其處議兩造稱平即聽其決始而飾詞相加既而內悔願自省改者率置不問以是善者愛信之頑者瞿然而願化向惟見利今知有理義矣向惟骫法今知耻矣裕于財者稍稍能出粟周其鄉之貧乏矣羣盜大者就擒餘漸戢而改慮矣言左道以恐喜人意者俗且疑信參之矣嗟夫筐篋刀筆吏之所為兢兢也即弟子師且倚席不談而侯獨以禮義為簿書以教化為期會使民興于行誼者日以衆多是不當與次公仲卿諸君子埒哉諸君子遇漢盛時皆增秩贈金或入為公卿侯今亦以考最贈其先大夫如其秩而又新擢南水部郎寖以貴顯不可謂不遇矣邑兩學博暨諸弟子來徵贈言侯之種種善政難具述兹特表其化民成俗者如此贈郡丞杜充菴考績敘郡丞主郡國盜賊凡萑苻出沒及椎剽為姦利者皆得督郡邑賊曹掾以時察之蓋佐其守以禁姦銷萌綏靖一方也而郡國大者則又置閫帥一人率其屬以威不軌而備非常于以佐守丞之所不及吾瀛固畿輔大郡也楚充菴杜公丞吾郡三年矣行將具治狀奏績闕下而閫帥時君率諸武辨求所為華其行者以不佞郡人使為之詞不佞竊嘆古之弭盜易今之弭盜難漢神爵間渤海盜起命龔少卿治之移檄罷捕盜吏諸持鉏鉤者皆為良民勿得問比解散則又假以倉廪以慰安牧養之用是盜賊悉平訟獄衰止異日秉政者用慘礉為務立捕盜條例盜起不發覺發覺而捕弗滿品者以溺職論坐課纍守上及監司當其時即欲罷捕盜吏不虞縱冦乎持文法者不以廢格詔書議其後乎幸勿束以文法矣主錢榖者能聽出倉粟假之乎即令許發廪矣又安所得粟乎故曰難也公四令大邑所至以亷平取效不愈快于武健以耀聽睹蓋成進士十餘年始以積勞擢郡丞公亦無褊心不少望益修其亷平之政為條教頒行民間諭以勸善防姦之意下吏仰畫諾奉約束無敢假徼遊名恇擾百姓者百姓亦凛凛服從其教化即有不逞朝發而吏夕禽之數年來歲屢祲小民安于飢寒無作姦犯科以扞文罔者齊魯晉魏中山之間民傷于旱所在蜂起無敢潛入郡地為冦掠者則以公之恩威所為讋服者素也於戲儻假公以便宜之權渤海之治奚難哉渤海政成漢主親召見晉水衡都尉職親近以示褒顯主上數下恩澤詔書捐內帑分賑窮瘠又慮飢民去為盜賊患苦百姓惓惓嚴飭有司無使滋蔓其垂意吏治民艱何啻漢宣公以考最詣闕下儻按考功書見公精勤舉職當必有顯擢以酬前功而責後效者矣昔王生教龔少卿即上問治狀不可有所陳説宜止曰主上之德當其時吏民富實安于田里故所為對宜止此今郡中無所積蓄歲稍稔民猶食半菽一遇水旱不徙則死夫飢寒切于身慈父不能有其子此公所明知者萬一陛見時得賜清問當極陳疾苦情狀無徒如王生所置對矣賀崔友泉榮薦敘豫同年易憲副君選嘗言其邑侯崔公之賢也曰公通才朗識無隱弗晰當幾能斷然亦惟是利于民者始為之於民弗利不苟變常便於事者始為之于事弗便不輕易法威以束胥吏而不以槩齊民惠以寬􅑏嫠而不以及姦宄色笑以禮諸生而不以假左右豫嘗一再會公於長安旅舍聆公言論丰采而知君選之言不妄也自公宰邑以來而悉公治行騰在薦剡者無歲無之久之以積勞晉秩郡倅分署豫邑之别鎮未兩月而巡按侍御陳公即露章薦之蓋猶以肅寧日治效也鎮諸君子將稱觴賀公而命豫修詞豫謂公先主治民今主治河治民者嘗苦其不足治河者嘗苦其有餘民不足則窮而為害河有餘則溢而為害故治民者當撫摩之嘗勿使至于窮而治河者當隄防之嘗勿使至于溢至于順其性則一也公既治民而效矣又奚難于治河哉或者言函牛之鼎不以醢雞郡倅視令誠尊然令之職兼倅之職專兼則得遊于職之內專則不得越于職之外以公之才而使束于行河一事他不得與焉是縳孟賁之手而觀其鬬羈騏驥之足而觀其走也無以自表見矣豫聞徐沛淮泗間河水橫流城邑為圮黎民其魚督河者皇皇然無以為計儻晉公崇秩使主其事得以自見其奇當必有良䇿異謀成宣房之功以紀績太常者又不止清一帶之流為部使者所薦揚而已敬以是復諸君子之請且以俟之異日淡然軒集卷三
