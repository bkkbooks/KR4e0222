body:
  text: 淡然軒集卷四明余繼登撰序壽陸年伯七袠叙方小子登之讀中祕書也海內兄弟執經而敬業者三十有一人又十四年為萬厯庚寅而諸兄弟列在交㦸內者才六人耳此六人中兩尊人稱具慶者又才三人三人者宫諭陸敬承馮用韞少司成楊貞復也貞復家東粵道里遠故楊伯氏不能時來獨陸馮兩伯氏能來陸伯氏之來也以就養而馮伯氏之來以官豫小子竊自意陸伯氏業儒不就而就敬承之封此其為人必遊心自恣放浪形骸之外馮伯氏少年登第數歲而至臬大夫為大夫者已十餘年此必以體貌相加遺盱然峻也既而隨諸兄弟修子弟禮謁見兩伯氏則陸伯氏貌甚莊諸兄弟亦以莊見嚴問則諾對則起三爵而壽三揖而退儼然以賔禮遇之暨見馮伯氏則歡然若舊藹然若父子家人舉白而浮信心而語蓋略分忘形而又能令諸兄弟略分忘形也小子則退而私嘆謂兩伯氏者皆壽徵焉何者以豫私視今之人未有不志于功名者也然有得有不得得之則操操則栗栗栗栗之形每睢睢而矜觀聽不得則侘傺而不平不平之發恢恑譎怪謷乎其不可制此豈其性然哉遇以時異性隨遇遷適人之適而不自適其適故態不同總之滑和非長生安體樂意之道也陸伯氏以靜為其性自為儒為封君貴人少而壯壯而老有得有不得而無適非靜無適非靜故無少年侘傺之情無謷乎不可制之態無封君貴人之氣勢馮伯氏以動為其性升而沉沉而復升意無不得而亦無適非動無適非動故內忘得失外忘町畦兩伯氏之性不同皆自適其適者也自適其適則性得性得則天全天全則和豫通而不失乎兌日夜無郤而與物為春故曰皆壽徵也今年陸伯氏滿七袠敬承將具舟楫迎養長安舍中諸門下士亦將介敬承為伯氏壽敬承所舉武闈士若干人來乞言豫小子何知長者姑述夙昔所為壽徵者復之若馮伯氏長豫小子五歲耳尚未及稱壽則請俟九十為卿士時豫小子然後為抑之詩以祝之賀御史大夫帶川劉公八十壽敘莊皇帝臨御之四年東西邊期大舉深入京師戒嚴有詔特開制府于通州起前左都御史兼兵部左侍郎帶川劉公于家統諸路入援兵馬公至明號令申約束壁壘旌旗精彩皆變敵偵我有備逡巡退去諸援兵解散而公亦乞身歸矣公歸二十又二年為今萬厯辛卯公春秋滿八十鄉之薦紳先生將飾羔鴈以賀而授簡小子登使修酌者之詞豫小子髮始燥時公已宣力疆場議功名于世今豫小子髮且種種亦竊妄意公老矣比戊子之夏豫小子以使事過公里候公起居見公齒髮形神無異壯夫又里中人言公每以歲時馳逐角射擊狐兔以為娛因嘆卓犖非常之才造物所獨厚其精神意氣與常人殊蓋常人之精神意氣常不足而非常之人常有餘夫以不足而覬心于有餘故用之而常見其不足惟有餘故隨其所用皆用其所餘而不見其不足公生平敡歷十七治戎國家歲苦邊則借公防邊苦倭則借公勦倭其節旄所指東自遼海漁陽西北則上谷雲中又西則榆林南則浙西七閩暨粵之東西大小百戰親執桴鼓立矢石間或躬擐甲胄身先士卒或以寡擊衆以弱卒抗方張之敵或彎弓橫戈以殿大軍衆或股栗失色而公精神益壯意氣益閒數遭口語或以功為過而公一不介意亦未始一語自明一聞詔命即怡然就道跡公所厯無論南北山川風氣燥濕異宜即馳騖于鋒鏑出沒于波濤搖撼于是非毁譽成敗利鈍之中在常人不勝其憧擾憂勞之態而公處之夷然不因以滑和不因以虧其生則公之精神意氣猶槖籥也豈非造物所獨厚以為社稷之衛者哉肅皇帝最知公屢承特簡兩起公于衰絰之中而授以兵柄故嘉靖之季公之勛庸最多自西敵欵關邊圉無事世無用于公而公亦無求用于世今敵人敗盟䖍劉內地天子􅍀然西顧勤拊髀之思廣羅才杰期以宣助國威安固疆圉豫意求嘗試之臣不若求已試之臣用新進之臣不若用老臣秦之伐楚不收功于信而收功于翦漢困先零廷臣無踰充國者公功在邊疆名在天下今之敵國固耳聞而心攝之矣主上儻還公舊任令得用其所有餘者一戰成功班師奏凱著續王朝立威塞外此正公鷹揚時也何憂邊患哉詩人頌君子無期之壽而先之以邦家之基夫常人之精神意氣不足故不得不斂之以自壽其身非常之人不直自有餘每用其所餘以建功立業令邦家奠安而身名俱泰此大臣之壽而詩人所謂無期者也豫小子不􅈺于詞敬以是為公壽而復諸薦紳先生之請壽甘母吳太孺人序甘侍御維藩豫禮闈所舉士也侍御始為令滿三載得封其母吳為太孺人乂五載入為侍御史又三載而太孺人壽滿六袠于時侍御方北按兩關南按楚王事鞅掌不及以時歸為太孺人壽獨心怦怦懷循陔陟屺之思焉今歲辛卯太孺人六十加一侍御方被命按吳得以其便抵里中稱膝下之觴而侍御君同門友官都下者咸欲介侍御為壽從豫受詞豫惟人子于母苟可自效其力無愛也然實無可效者何者子之願親不過曰福曰壽天下之壽考福祿視其親之德耳則是福壽者親之所自有也人子何所庸其力為人之子而于親之福與壽一無所庸其力于是不得不兢兢然立身行道蘄以榮名奉其親故人子之榮親以名其壽親亦以名昔雋京兆每行縣有所平反則母喜不則怒不食京兆欲就母名故為政不殘今去漢久遠而雋母之賢人能道之此榮其親以名者也魯侯宜大夫庶士于是詩人歌燕喜而頌壽母今去魯逾益久遠而魯壽母之名不衰此壽其親以名者也夫曼倩為京兆即多所平反不能出京兆外魯侯雖主一國然地不越數郡其所宜大夫士亦且有限而二母藉之聲稱當時榮施後世今侍御所按部自燕趙暨于吳楚大郡數十其身所平反何限藩臬之吏郡邑之長禀仰畫諾其所宜者何限諸所宜所平反戴恩德而頌太孺人者又何限太孺人身不出閨閣而名聞九重德載制詞舉手加額祝千萬年壽者半海內是侍御所得效于太孺人者以視古二母不知其何如然豫私意曼倩賢者獨史不載其母之年魯母誠壽而詩所稱率多媺詞無事實侍御俊才今且駸駸嚮用其遵用慈訓以膏澤蒼生者日以益盛太孺人視履强健日見其子廣錫類之孝錫庭闈之光者無已時即垂之史册播之歌頌恐又二母所不得兼者矣侍御歸帣韝上壽其以豫言為太孺人誦之太孺人將欣然舉君之觴又將北向而舉二三君子之觴一崑李封君七十壽敘曩豫分校禮闈得永春李開芳伯東氏制義讀之溫醇爾雅甚愛其為文比見其人則溫溫大雅蓋望之而知其為君子也夫文士之文直文耳考其人即如其文者百不一焉以此重其為人伯東官度支精勤舉職司農胥役視諸庾為外府歲時私其餘無常數伯東不欲以民之脂膏填溪壑節而弗與三載積羡幾萬石留以遺代者伯東不難以身為怨藪而名日起豫以此益重其為官豫既久與伯東交得悉其家世始嘆伯東之砥行不獨天性然也蓋得其尊人一崑先生之教多焉先生博學工文詞以明經久待銓次乃能絶意仕進獨與其弟少崑先生日奉其母太夫人溫凊朝夕融融然適也先生家素裕為義田以贍族人至親戚閭閈之寒欲衣飢欲食窮之欲周者皆歸先生先生以緩急資之無吝色至于自奉則簡淡朴素結社觴詠之外無所紛華夫天道損有餘益不足而人每席有餘之資以求滿其所不足先生辛勤鉛槧即博一官未足以償其初志顧重親而輕功名輒棄去不就華衣美食極聲色之娛亦富人常態乃儉于身而厚于人天以有餘奉先生而先生欿然自處于不足之地故今伯東有聲郎署先生以伯東貴冠服煒然稱封君而太夫人猶健無恙仲子舉于鄉將與伯東接武競爽庭闈燕喜福履融鬯則天所以益先生而先生不知也客歲秋伯東從里中來言先生今年滿七袠蓋豫悉先生生平而後知伯東之所以能官因先生之教伯東而知先生之自為壽夫人之長生者非能續之使長也謂滿其生之數也太倉之粟歲歲灌輸至多矣然不積則不盈假令人人如伯東滿三載積至萬石又安有窮時財賦者國家之命脉也人身之精神命脉賦豫有限以有涯隨無涯則日靡日損而流貫有所不浹先生既以節嗇之理為身又以節嗇之理教子蓋深于有餘不足之說者形不勞曷敝精不用曷竭觀今天之所為福先生知其所為壽先生者矣老氏云修之于家其德乃餘由此言之先生之壽固未可量也請以是藉手伯東而佐先生之一觴王母張太孺人八十壽叙先是直𨽻按臣言臣所部有文安縣孝子王某者生甫朞月其父某棄家去不返孝子長有識輒自傷曰天下豈有無父之人哉吾不難殉吾父獨奈何無以奉吾母也既受室才數月即辭其母往踪跡其父逾八年貧無資困者數矣賴有天幸不至殆卒感異夢得與其父俱歸今事雖往宜旌之以勵薄俗天子是其言為表其閭而孝子之名遂大顯孝子有丈夫子六人其少者曰贈觀城公觀城公四子兩舉進士兩進士者今户部郎中應霖尉氏令應期也户部君主度支久大司農以為才推擇司遼左餉户部君有難色豫謂君難遼左耶君曰臣子之職事不避難吾何有于遼左苐遼邊地去吾鄉遠勢不得奉吾母偕行吾母老矣吾安能無陟屺之感也豫甚服其孝因知君有太孺人云君去遼之明年為萬厯辛卯太孺人春秋滿八十太孺人有壻御史中丞蒲汀姜君語豫曰自不佞為王氏壻與户部君兄弟同研席者十餘年太孺人以子畜之今幸得以便歸登堂為壽敢徼一言于子豫因問太孺人閫儀狀姜君言太孺人性勤儉又至孝事其舅姑暨其繼姑甚得其歡心豫因嘆婦人之德不難于勤儉而難於孝婦人之孝不難于事舅姑而難于事繼姑彼子如伯竒賢如閔損不能得之于繼母而太孺人能得之于繼姑甚矣太孺人之孝也昔萬石君馴行孝謹而諸子孫皆孝以孝聞于郡國王氏自孝子以孝為子孫率太孺人遵用其教以事其尊人而户部君兄弟皆化于孝夫孝之道可通于神明神明所祐則家其用昌身其用寧故太孺人行年八十坐視其子孫之成立而形神不少衰非偶獲幸致也天生户部君兄弟立身揚名以報孝子生太孺人以生育訓誨户部君兄弟而又使壽考康寧得身食其榮以報太孺人是太孺人之身天所保艾不限于司命者世之談母儀者操一機杼吝一黐糈即斤斤焉侈其勤儉而冀壽考之來如持左劵以方諸太孺人蔑如矣此大小之辨也太孺人之壽也户部君兄弟各從官所出祿餘市甘脆純綺以進而伯季在膝下者率其諸孫曾舞綵于堂進百歲之觴又㑹中丞君過里中執爵而就子列煌煌乎華觀哉使邑之父老子弟望廬而嘆曰天之報施孝子如此則太孺人之壽所為風者大矣封給諫雙橋劉翁暨配范太孺人偕壽敘雙橋劉翁家世業儒翁少以儒名試輒利久乃弗利翁益下帷發憤誦讀不問生業范孺人操作佐之至朝夕不給淡如也不為輟業翁性質直諸所為事親交友一禀于至誠有田若干畝饘粥所資庚戌大蝗所過無遺穗翁整衣向蝗祀之蝗飛去不為害其至誠能動類如此翁有子今左給諫濟滄君讀父書頴悟過人翁撫之嘆曰造物令吾售也不至今日至今日弗售也命也吾有子能竟吾志吾尚矻矻胡為乎㑹莊皇帝御極詔博士弟子年高有行誼者豫冠服郡即以翁應詔牧伯為致章服如制翁既脫博士籍乃一意督給諫君于學而范孺人日從㬰之給諫君遂成進士讀中祕書有聲于諫垣歲辛卯典試東方士便省其兩尊人依依子舍不忍去翁孺人覺之促之行曰若起諸生歷清華居耳目之職官以諫為名當日取天下事為主上别白言之以庶幾報萬分一奈何以老人為念且兩老人健善飯又吾家望長安如在宇下若苐往吾當乘春和就養長安舍給諫君乃還報命今春仲遂具板輿迎翁孺人于邸舍㑹給諫君滿一考最得封翁如其官母范為太孺人時翁七十加二孺人亦如之里中諸大夫宦于朝者欲介給諫君為壽而不佞修酌者之詞豫惟士方俯首占俾未有不欲自致顯庸者致之不得而求得于子則涉世久長故父母而食子之報者百一耳人情久抑而不得遂一旦得于其子不怙勢以凌其鄉人即聚物以自愈快其不然而不以是兩者纍其嗣人又百一耳為人父母而不得食子之報人子無可奈何于天食子之報而纍及其子人子無可奈何于親翁孺人雙白同榮親見其子之成立躬睹制詞身披法服生平蒿目而不得致者自其子得之而意常有以自下郡大夫賓禮之學宮辭不往時或有所造請猶引諸生禮避匿之兢兢然若恐開罪于鄉之人貽給諫君纍者給諫君竭鍾釡之入供為㫖甘而翁斥甘㫖之餘周其閭里居處服御深自貶損無加于為諸生時是造物嗇翁之前豐翁之後而翁居嗇以嗇居豐亦以嗇老氏論嗇謂之重積德而要其歸以為長生久視之道翁其得老氏之㫖者乎老氏又言修之于身德乃真修之于鄉德乃長修之于國德乃豐翁之居身若鄉其大較可睹矣幸出其緒餘以訓誨給諫君使毋以貽父母憂而避德怨毋以避德怨故而諱謇諤倡衆正之風矯羣枉之路令服給諫之能者誦庭闈之教則翁之德嗇于為身而豐于為國其所為壽者大矣李母程太宜人八十壽敘納言李君有母曰程太宜人者當君為令時封太孺人後為納言晉今封封三年為萬厯辛卯太宜人壽七十有九矣諸大夫與納言君遊者願舉百歲之觴而授簡不佞登使為之辭不佞與太宜人同梓里閨閣懿行知之頗詳蓋有合于壽理者四焉太宜人之歸于贈參議公也不及事其舅姑獨得事其大母臧孺人當其時臧孺人春秋高而參議公有一弟一妹尚幼參議公又為諸生習博士言不問家人生業閫以內咸倚辦太宜人太宜人躬勤機杼操井臼上奉大母下贍食指外佐參議公于學內撫育其弟妹畢其婚嫁甚得臧孺人歡心臧孺人嘗執其手謂曰孝哉婦也吾無以報婦願婦有婦如婦孝也夫婦德莫先于孝孝者百順之原而福之基也是宜壽參議公博學能文一試輒受廪于庠然數上有司數不利心不能無少望太宜人常持時命之說寬釋之參議公學無輟業卒以明經入貢者太宜人力也夫為人婦者日望其夫子顯庸耳安計其時有利有不利哉太宜人甘心隱約無觖望信命樂生外物不以滑其和故其天全而神無卻是又宜壽太宜人仁心為質能恤窮賑急下至臧獲大不至笞小不至詈納言君始綰綬時即諄諄戒之曰若未仕時見吏務為嚴峻者每於邑非之意恨不自為也今若乃自為之矣其麗法求中勿令人更於邑非若哉納言君遵用其教兩宰劇邑嚴而不殘兩邑之人聞之亦無不舉手加額誦太宜人仁祝太宜人壽者夫仁生理也人所歌舞天必從之是又宜壽太宜人生而端重幼習女紅不妄笑語以此為婦則為母儀今老矣日惟靜坐一室性尤簡淡無所紛華即家人無敢以喧譁之色靡麗之服見者昔人有言端慤凝靜者天福之夫天亦安能屑屑然日求端慤凝靜之人而福之哉天下之理陽主動隂主靜順之則吉逆之則否太宜人之端重靜之體也靜則有常是又宜壽故曰有合于壽理者四焉故今行年八十而耳目聰明手足强健不杖不扶望之者知為壽徵也諸大夫曰信如子言皆太宜人所自為壽矣納言君獨無所為太宜人壽者乎曰有之方納言君之以治行徵也宜入為臺諫㑹有齮齕之者乃得郎署踰年而晉今官夫納言誠尊重然宣德達情主在修故事胸臆約結有竒安施又遷轉率不越其曹人或為君怏怏而君顧甚歡豫間問其故君曰吾嘗讀靡盬之詩嘆為人臣者之不能為人子也藉令吾得拜臺諫東西南北惟主上所任使吾欲順吾親而舉吾職吾又安得行吾志而奉吾親哉今吾官不出長安長安望吾鄉一水洋洋不數日可達吾思吾母即奉而北吾母思吾鄉即奉而南吾母甚適也母心適吾願足矣官之冷暖奚計焉豫聞君之言若此此即君之所為太宜人壽也夫母之于子欲聚廬而處者情也欲違親而仕者勢也非其情也非其情而强抑之以令其子人子亦非其情而强抑之以從其親于是有循陔之思有陟屺之懷猶澤雉蓄樊神雖全不王也納言君之母子寧有是乎既以祿養又以志養故曰此君之所為太宜人壽也太宜人之自為壽不逆其理納言君之為太宜人壽不逆其情由此言之太宜人之壽非不佞所能量也奉賀李母程太宜人八十壽敘凡人情有所德則思報報則祝祝願不已則冀望以不可必得之福人思以此自報其所天報人者亦思以此報人之天母者子之天也詩曰欲報之德昊天罔極德無極報之之心亦無極故子即至愚靡不欲其親之千萬年壽者夫人之壽以百歲為期其不能千萬年亦明矣而人子必以冀其親者心無窮也報人者亦然故詩人之頌魯侯曰萬有千歲眉壽無有害夫德魯侯則亦祝魯侯壽已耳而必及其壽母亦若欲其母之萬壽無害者何也則思報人之天者也友人納言李公筮令于齊與校文之役所得齊魯諸名俊往往輒成進士公亦輒以所得于慈訓者教之仕則公于諸士師之乎實子畜之故諸士視公亦師之父之而其視公母程太宜人亦猶其大母也今年春二月太宜人春秋滿八十時公門下士于君泰寰方為西臺侍御史而何君乾室適以大計至于是兩君思為太宜人上萬年之籌而過不佞使為之詞豫念兩君皆嫺于文奚不自為一言以發祝願希望之心而顧俾豫代為之言也又念魯侯宜大夫庶士則感德而思報者惟大夫庶士為甚乃壽母之頌不出于大夫庶士而出于詩人之口豈以詩人之詞能揚徽美備采擇而垂無窮之問哉故詩雖不具言魯母作如何壽而至今百千餘年魯夀母之名尚藉以不朽慚豫小子何能為役獨念當太宜人設帨之辰有聞人顯者稱門下士與諸子若孫鞠􅛏奉觴祝壽考而頌萬年則李壽母之名當藉二三君子而傳之百千萬年與魯壽母並稱燕喜矣豫客歲之春曾從諸大夫後升堂而觴太宜人述太宜人母儀內則有合于壽理者甚備故兹不具論而論兩君所為感德思報祝願冀望之意如此以先諸酌人賀姜母劉太孺人七十壽敘世所指吉祥善事無越富貴壽考故人情于此罔弗希覬者然一有希覬即屬非望惟人子舉以冀其親而人不議其非若曰此必至之情不容已者也獨奈何親之于子而亦以是冀之也子幸而成立日望其為達官貴人即貴矣日望其富厚以自腴又日望吾壽考安寧焉而久食其報見世有富貴熏灼者不勝其艷羡焉而舉以責望其子子不得則閔閔然如農夫之望歲焉繇是不肖者率溺志其中即賢者亦不能不貶損其志以就親心之所欲而蘄奉一日之歡則教之失而俗之靡也自豫與蒲汀姜君並官交㦸之內知君有母劉太孺人又知太孺人母儀甚備姜君無它兄弟獨子耳婦人之情無弗憐愛獨子者溺于愛則疏于教而太孺人兼用愛勞以佐義方之訓君既釋褐服官政又時時以約已便民之意砥礪其志節勿使沈于俗而浸淫于富貴利達之中不愛紛華以示意指而勸其亷故二十年來亦有祿入以給滑柔而甘㫖無加味也用御史晉今封寵榮光大而翟䄖不恆御也獨聞君為長令能以愛利為行則喜聞君為御史惠文所至聲稱燀赫則喜聞君守廷尉輔法而行多所平反則喜聞君槖中蕭然不以黃金歸介壽則又益喜人見太孺人年開七袠髮不加皓而加澤貌不加癯而加腴以為是姜君能以祿養致然而不知其是能以職養者也君惟以職養不徒以祿養故能守其榮名厚祿以奉太孺人故能順適太孺人之志令優遊于榮名厚祿中而載其恬愈以究于高年夫曼倩由母為良吏而雋母以曼倩顯孟博由母為賢人而范母以孟博顯以太孺人方之奚愧焉此皆不爵而榮不祿而富不久視而壽而况太孺人又富貴壽考如此其備也恢乎天壤蓋無幾矣豫不嫺于詞不能談壽理姑因諸大夫之請而妄意太孺人所為壽與姜君所能為太孺人壽者如此壽邢槐忩年伯七十不佞之成進士也與文安邢公照同籍因公照識其尊人槐忩先生先生世以戴氏禮教授于鄉鄉之學禮者皆出先生之門先生賦質醇粹為文典贍自視取一第如取諸寄乃門下士多以資逢世公照亦舉甲苐官行人而先生猶然守博士籍也可不謂命哉公照為行人滿三載例得貤榮先生先生不應守舊業如故久之乃以明經為博士又以博士高等為定陶令令定陶未朞月㑹意有所不可輒自免歸郡守監司相與挽留之竟去不顧時公照方以度支郎督餉寧武聞先生歸意或有它恙亦移疾歸侍食飲而先生固無恙也又時時督公照出公照出之明年先生春秋滿七十㑹公照奏最晉封先生如其官諸與公照厚善者欲以言賀先生而先生門下士大理少卿姜君來徵言不佞竊聞古人有言人之性壽夫性者生也人生而具耳目心思口體則亦有耳目心思口體之用如耳之聰目之明心思之智慮口之言四體之便利皆性也然愚者不能用智者能用而又極其用不能用者無所貴壽極其用者自汩其壽夫唯在用與不用之間者為能達生而年壽得長焉夫聽不能聰視不能明心思不能慮口不能言四體不能便利此其與木石何異世亦奚賴若人者而用之也故無所貴壽智者聰明馳騖意慮經營率足以從其所欲欲無涯而用亦無涯迷而不悟役而不休智殫力竭未老先衰然後鑑形羞貌興啜嗟之思焉譬之大尊酌多而速盡此自汩其壽者也先生之才睥睨一世即不遇于時而亦不欲因貴于公照志將有所用也卒之訓士士服治民民安窮經之用庶乎見一斑矣悠悠世路曷其有極濃艷薰灼亦復如是故上不見齟齬內無所屈抑而一旦飄然掛冠如棄腐鼠兹可為庸俗道哉耳不極聽乃有餘聰目不極視乃有餘明心思口體不極用乃有餘間今稱七十人古所稀矣髮不加短而益澤形不加癯而益健此非有所增益也為能滿其生之量也然先生以能用者自用以不極用者寄之公照與諸門下士以大其用自用者可以不極而寄諸人者則無所不極是先生以不極之用壽身而以無所不極之用壽天下也先生嚴不佞不敢以諛言進敬論先生所為壽者如此以先諸酌人誠齊許公母邱太夫人九十壽敘邱太夫人者憲大夫誠齊許公母也方公為侍御時真心直道侃侃不撓豫心慕之然猶未悉其能孝比讀公陳情疏而後知太夫人之賢與公之孝也太夫人舉三子公為中子以嗣其仲父後久之嗣父舉一子公為訓植之底於成立為諸生而嗣父亦以公為令最封如公官嗣母稱孺人太夫人固猶然未沾一命也既而公之昆季先後不祿太夫人無所恃以為養公乃疏言其狀乞身侍太夫人上憐而許之公得復為太夫人子㑹公被新命備兵津門於是備板輿迎太夫人於宦舍而太夫人壽適滿九襄郡伯陳公暨諸長令為公屬吏者欲以時為壽而命豫修酌者之詞豫惟人情嚮其利則見德見德則祝祝則欲其長久而安寧故人子思壽其親德人者思壽人之親其心曷極然壽非人力所致也天實司之天之所福在德所視聽在人人孰不各愛其子而太夫人不難以其賢子為人後此其心天鑒之矣天以公畀太夫人而太夫人乃俾其為人之子天終欲以公畀太夫人乃復為公嗣父而生子公嗣父無子而有子然後太夫人無公而有公夫既與之以賢子必與之壽考以食其子之報此天道也况公自為令至敡歷藩臬所至有惠愛為德於民民之戴德思報者靡不舉手籲天祝公百年祝太夫人千年天之所報未有不永者也人之所願未有不報者也今太夫人九十耄矣聞從關中來歷遠道犯風日而起常蚤卧常遲無倦容無難色蓋天之所厚氣王神全壽考之徵已見於此非可以尋常夀算拘也豫考古之奉母以養者在漢有雋曼倩曼倩為京兆每行縣還其母輒問所活幾何人即多所平反母喜笑為加食不則母怒為之不食彼雋母誠賢然喜怒之異情也加食與不食之異度也雖以訓子不無滑和公之亷頑貞淫禁奸剔蠧惠每寓於威之內德常行於法之先出以飭治入以侍食太夫人聞之當欣欣色喜日為加匕著甚適已此又公之感人格天而為太夫人壽者也太夫人坐邀綸命之賁期頥當未艾矣豫為公宇下士不敢以飾言進直述太夫人必得其壽之理如此以復諸大夫之請且以質之於公寧封君六十壽序昔人有言水之性清土者汩之故不得清人之性壽物者汩之故不得壽夫人生也有涯而物無涯貧思富賤思貴富貴思永久思而不得則戚得則復患失之於是相創相劘以至耳不可聽目不可瞻筋骨沈滯六臟百骸抑鬱失宜則汩之者之害也是故惑人棄生以狥物賢者節物以貴生節物者非能離物而能不汩于物則後泉先生是已先生少業農農之外無勤也暇則與野老田夫斗酒相歡自以為樂也有子登甲第官禁近歷水部大夫而業不遷也再沐恩綸官視其子稱尊貴人不以為華也祿入得日具甘膬給縠紵而蔬素無改於舊也令子假道歸問寒暄依依膝下則譙讓之不欲以私恩稽王程也兩具安車虛子舍以待則默不應以示不如田野之逸樂也世之逰心淫思艷冀而不可得者彼且為土苴彼且為浮雲彼且為駢拇枝指而一不入其靈臺則孰能汩之者嗟夫萬物章章以害一生生無不傷以便一生生無不長故神不汩則王精不汩則凝氣不汩則充耳目不汩則聰明筋骨不汩則堅强六臟不汩則賅而存今甲子既逾而志慮步履無異少壯則節物之功而貴生之效無異術也繇此以往即耄耋期頥猶近言之矣先生滿六襄時令子方壽先生而不佞登則敬述先生之所為壽以授諸酌者淡然軒集卷四
